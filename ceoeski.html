<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>AROS CEO</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;600;700;800&display=swap');
:root{
  --bg:#060610;
  --bg2:#0e0e20;
  --bg3:#161628;
  --border:#1e1e38;
  --text:#f0f0ff;
  --text2:#8888aa;
  --text3:#444466;
  --green:#00e5a0;
  --green-bg:rgba(0,229,160,.1);
  --green-border:rgba(0,229,160,.25);
  --red:#ff4d6d;
  --amber:#ffb800;
  --blue:#4d9fff;
}
[data-theme="light"]{
  --bg:#f0f0f8;
  --bg2:#ffffff;
  --bg3:#e8e8f2;
  --border:#d8d8ee;
  --text:#0a0a1a;
  --text2:#555570;
  --text3:#9999bb;
  --green:#00a870;
  --green-bg:rgba(0,168,112,.1);
  --green-border:rgba(0,168,112,.3);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Manrope',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* HDR */
.hdr{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.hdr-logo{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--green);letter-spacing:2px;flex-shrink:0}
.hdr-info{flex:1}
.hdr-title{font-size:13px;font-weight:800;color:var(--text)}
.hdr-sub{font-size:10px;color:var(--text2);margin-top:1px}
.hdr-right{display:flex;align-items:center;gap:8px}
.theme-btn{width:30px;height:30px;border-radius:50%;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px}
.oy-sel{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:5px 10px;color:var(--text);font-size:11px;font-weight:700;outline:none;appearance:none;-webkit-appearance:none}

/* OY FILTER */
.filter-bar{padding:12px 16px 0;display:flex;gap:8px}
.filter-bar select{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:9px 12px;color:var(--text);font-size:13px;outline:none;appearance:none;-webkit-appearance:none;font-family:'Manrope',sans-serif;font-weight:600}
.refresh-btn{width:38px;height:38px;border-radius:10px;background:var(--green-bg);border:1px solid var(--green-border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;flex-shrink:0}

/* JAMI CARD */
.page{padding:14px}
.jami-card{background:linear-gradient(135deg, var(--bg2) 0%, var(--bg3) 100%);border:1px solid var(--border);border-radius:20px;padding:18px;margin-bottom:14px;position:relative;overflow:hidden}
.jami-card::before{content:'';position:absolute;top:-40px;right:-40px;width:120px;height:120px;border-radius:50%;background:var(--green-bg);border:1px solid var(--green-border)}
.jami-label{font-size:10px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.jami-row{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:14px}
.jami-summa{font-family:'Bebas Neue',sans-serif;font-size:30px;color:var(--green);letter-spacing:1px;line-height:1}
.jami-foiz{font-size:22px;font-weight:900;color:var(--text);opacity:.7}
.jami-bar-bg{background:var(--bg3);border-radius:6px;height:6px;margin-bottom:10px;overflow:hidden}
.jami-bar{height:100%;border-radius:6px;background:var(--green);transition:width 1.2s ease}
.jami-nums{display:flex;justify-content:space-between;font-size:10px;color:var(--text3)}
.jami-nums b{color:var(--text);font-weight:700}

/* FILIALLAR GRID */
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.sec-title{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.8px}
.sec-badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}

/* FILIAL CARD */
.filial-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:14px;margin-bottom:10px;transition:border-color .2s;cursor:pointer;position:relative;overflow:hidden}
.filial-card:active{opacity:.85}
.filial-card.loading-card{opacity:.6}
.fc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.fc-name{font-size:14px;font-weight:800;color:var(--text);text-transform:capitalize}
.fc-oy{font-size:10px;color:var(--text3);margin-top:2px}
.fc-foiz{font-size:22px;font-weight:900;line-height:1}
.fc-bar-bg{background:var(--bg3);border-radius:6px;height:5px;margin-bottom:8px;overflow:hidden}
.fc-bar{height:100%;border-radius:6px;transition:width 1s ease}
.fc-nums{display:flex;justify-content:space-between;font-size:10px;color:var(--text3);margin-bottom:8px}
.fc-nums b{color:var(--text);font-weight:700}
.fc-mini{display:flex;gap:6px}
.fc-m{flex:1;background:var(--bg3);border-radius:8px;padding:6px 8px}
.fc-m-lbl{font-size:9px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.3px;margin-bottom:2px}
.fc-m-val{font-size:11px;font-weight:800}
.fc-loading{position:absolute;inset:0;background:var(--bg2);display:flex;align-items:center;justify-content:center;border-radius:16px}
.mini-spin{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite}
.fc-prognoz{margin-top:8px;padding:6px 10px;background:var(--bg3);border-radius:8px;font-size:10px;color:var(--text2);display:flex;justify-content:space-between}

/* LOADING */
.loading{text-align:center;padding:60px 16px;color:var(--text3);font-size:13px}
.spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:60px 16px;color:var(--text3)}
.err-box{background:rgba(255,77,109,.1);border:1px solid rgba(255,77,109,.3);border-radius:12px;padding:14px;font-size:13px;color:var(--red);text-align:center}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-logo">AROS</div>
  <div class="hdr-info">
    <div class="hdr-title" id="hdr-title">CEO Dashboard</div>
    <div class="hdr-sub" id="hdr-sub">Yuklanmoqda...</div>
  </div>
  <div class="hdr-right">
    <div class="theme-btn" onclick="toggleTheme()" id="themeBtn">🌙</div>
  </div>
</div>

<div class="filter-bar">
  <select id="oy-select" onchange="changeOy(this.value)"></select>
  <div class="refresh-btn" onclick="load()">🔄</div>
</div>

<div class="page" id="main">
  <div class="loading"><div class="spinner"></div>Yuklanmoqda...</div>
</div>

<script>
var CEO_API   = 'https://n8n.arosmarket.com/webhook/aros-ceo-stats';
var FILIAL_API= 'https://n8n.arosmarket.com/webhook/aros-filial-stats';

var uid = new URLSearchParams(window.location.search).get('uid') || '';
var OY_NOMLARI = ['Yanvar','Fevral','Mart','Aprel','May','Iyun','Iyul','Avgust','Sentabr','Oktabr','Noyabr','Dekabr'];
var now = new Date(new Date().getTime() + 5*60*60*1000);
var curOy = now.getMonth() + 1;
var curYil = now.getFullYear();

// Oy options
function buildOyOptions(){
  var sel = document.getElementById('oy-select');
  sel.innerHTML = '';
  for(var y = 2026; y <= curYil; y++){
    var endM = y === curYil ? curOy : 12;
    for(var m = 1; m <= endM; m++){
      var opt = document.createElement('option');
      opt.value = y + '-' + m;
      opt.textContent = OY_NOMLARI[m-1] + ' ' + y;
      if(y === curYil && m === curOy) opt.selected = true;
      sel.appendChild(opt);
    }
  }
}

function changeOy(val){
  var p = val.split('-');
  curYil = parseInt(p[0]);
  curOy = parseInt(p[1]);
  load();
}

function fmt(n){
  var v = Math.round(Number(n)||0);
  if(v >= 1e9) return (v/1e9).toFixed(2) + ' mlrd';
  if(v >= 1e6) return (v/1e6).toFixed(1) + ' mln';
  if(v >= 1e3) return (v/1e3).toFixed(0) + ' ming';
  return v.toLocaleString();
}

function foizColor(f){
  if(f >= 80) return 'var(--green)';
  if(f >= 50) return 'var(--amber)';
  return 'var(--red)';
}
function barColor(f){
  if(f >= 80) return 'var(--green)';
  if(f >= 50) return 'var(--amber)';
  return 'var(--red)';
}

// Jami hisoblash
function updateJami(filiallar){
  var jPlan = 0, jBajarildi = 0;
  for(var i=0;i<filiallar.length;i++){
    var f = filiallar[i];
    if(f.plan) jPlan += f.plan;
    if(f.bajarildi) jBajarildi += f.bajarildi;
  }
  var jFoiz = jPlan > 0 ? Math.round(jBajarildi / jPlan * 100) : 0;
  var jBar = Math.min(100, jFoiz);
  var el = document.getElementById('jami-block');
  if(!el) return;
  el.querySelector('.jami-summa').textContent = fmt(jBajarildi);
  el.querySelector('.jami-foiz').textContent = jFoiz + '%';
  el.querySelector('.jami-bar').style.width = jBar + '%';
  el.querySelector('.jami-bar').style.background = barColor(jFoiz);
  el.querySelector('#jami-baj').textContent = fmt(jBajarildi);
  el.querySelector('#jami-plan').textContent = fmt(jPlan);
}

// Bitta filial card render
function renderFilialCard(f, idx){
  var el = document.getElementById('fc-' + idx);
  if(!el) return;
  var foiz = f.foiz || 0;
  var barW = Math.min(100, foiz);
  var fColor = foizColor(foiz);
  var bColor = barColor(foiz);
  var prognozFoiz = f.prognoz_foiz || 0;
  var pColor = foizColor(prognozFoiz);
  var qolganKun = (f.oy_kunlari || 30) - (f.bugun || 1);

  el.innerHTML =
    '<div class="fc-top">' +
      '<div><div class="fc-name">' + (f.filial || f.filial_nomi || '') + '</div>' +
      '<div class="fc-oy">' + (f.oy || OY_NOMLARI[curOy-1]) + ' · Plan: ' + fmt(f.plan) + '</div></div>' +
      '<div class="fc-foiz" style="color:' + fColor + '">' + foiz + '%</div>' +
    '</div>' +
    '<div class="fc-bar-bg"><div class="fc-bar" style="width:' + barW + '%;background:' + bColor + '"></div></div>' +
    '<div class="fc-nums"><span>Bajarildi: <b>' + fmt(f.bajarildi) + '</b></span><span>Qoldi: <b>' + fmt(f.qoldi) + '</b></span></div>' +
    '<div class="fc-mini">' +
      '<div class="fc-m"><div class="fc-m-lbl">Tushum</div><div class="fc-m-val" style="color:var(--green)">' + fmt(f.orders_summa) + '</div></div>' +
      '<div class="fc-m"><div class="fc-m-lbl">Qaytarilgan</div><div class="fc-m-val" style="color:var(--red)">-' + fmt(f.returns_summa) + '</div></div>' +
      '<div class="fc-m"><div class="fc-m-lbl">Prognoz</div><div class="fc-m-val" style="color:' + pColor + '">' + prognozFoiz + '%</div></div>' +
    '</div>' +
    (foiz < 100 && qolganKun > 0 && f.qoldi > 0 ?
      '<div class="fc-prognoz"><span>100% uchun kuniga: <b style="color:var(--amber)">' + fmt(Math.round(f.qoldi/qolganKun)) + '</b></span><span style="color:var(--text3)">' + (f.bugun||0) + '/' + (f.oy_kunlari||30) + ' kun</span></div>'
      : (foiz >= 100 ? '<div class="fc-prognoz" style="color:var(--green);text-align:center;justify-content:center;font-weight:700">✅ Plan bajarildi!</div>' : '')
    );
}

// Bir filial uchun fetch
function fetchFilial(warehouseId, filialNomi, plan, oy, idx, allFilialData){
  var url = FILIAL_API + '?uid=' + uid + '&oy=' + curOy + '&yil=' + curYil + '&warehouse_id=' + warehouseId;
  // aros-filial-stats uid bo'yicha warehouse_id topadi, lekin CEO uchun warehouse_id override kerak
  // Shuning uchun uid o'rniga warehouse_id ni to'g'ridan query da yuboramiz
  // Endpoint uid bo'yicha ishlaydi — CEO uid yuboring, u CEO warehouse emas boshqa
  // Yechim: filial_nomi va plan ni o'zimizda saqlab, bajarildi uchun alohida logika kerak
  // Hozircha uid bilan yuboramiz, filial stats endpointi uid dan warehouse_id topadi
  // CEO uchun warehouse_id ni URL da alohida parameter sifatida qabul qilish kerak
  // Eng sodda yechim: aros-filial-stats ga warehouse_override parametrini qo'shamiz
  // Yoki: har filial uchun o'sha filialning bitta hodimini topamiz — murakkab
  // ENG ODDIY: aros-filial-stats ga warehouse_id param qo'shamiz
  url = FILIAL_API + '?uid=' + uid + '&oy=' + curOy + '&yil=' + curYil + '&wid=' + warehouseId;

  fetch(url)
    .then(function(r){ return r.text(); })
    .then(function(txt){
      var raw, fd;
      try{ raw = JSON.parse(txt); fd = Array.isArray(raw) ? raw[0] : raw; }catch(e){ fd = null; }

      // Agar endpoint o'z warehouseni qaytarsa va mos kelmasa — plan sheetdan olganini ishlatamiz
      if(fd && fd.filial){
        allFilialData[idx] = fd;
      } else {
        allFilialData[idx] = {
          filial: filialNomi,
          warehouse_id: warehouseId,
          oy: oy,
          plan: plan,
          orders_summa: 0,
          returns_summa: 0,
          bajarildi: 0,
          foiz: 0,
          qoldi: plan,
          prognoz: 0,
          prognoz_foiz: 0,
          bugun: new Date(new Date().getTime()+5*60*60*1000).getDate(),
          oy_kunlari: new Date(new Date(new Date().getTime()+5*60*60*1000).getFullYear(), new Date(new Date().getTime()+5*60*60*1000).getMonth()+1, 0).getDate()
        };
      }
      renderFilialCard(allFilialData[idx], idx);
      updateJami(allFilialData.filter(function(x){return x;}));
    })
    .catch(function(){
      allFilialData[idx] = { filial: filialNomi, warehouse_id: warehouseId, plan: plan, bajarildi: 0, foiz: 0, qoldi: plan, orders_summa:0, returns_summa:0, prognoz_foiz:0, bugun:1, oy_kunlari:30 };
      renderFilialCard(allFilialData[idx], idx);
    });
}

function load(){
  if(!uid){
    document.getElementById('main').innerHTML = '<div class="err-box">URL da ?uid= topilmadi</div>';
    return;
  }

  document.getElementById('main').innerHTML = '<div class="loading"><div class="spinner"></div>Yuklanmoqda...</div>';

  var url = CEO_API + '?uid=' + uid + '&oy=' + curOy + '&yil=' + curYil;
  fetch(url)
    .then(function(r){ return r.text(); })
    .then(function(txt){
      var raw, d;
      try{
        // n8n ba'zan string ichida string qaytaradi
        var t = txt.trim();
        if(t[0] === '"') t = JSON.parse(t); // unwrap string
        raw = JSON.parse(t);
        d = Array.isArray(raw) ? raw[0] : raw;
      }catch(e){
        throw new Error('JSON xato: ' + txt.substring(0,100));
      }

      if(d.error){ throw new Error(d.error); }
      if(!d.filiallar || !d.filiallar.length){ throw new Error('Filiallar topilmadi. Sheetni tekshiring.'); }

      var filiallar = d.filiallar;
      var oyNomi = OY_NOMLARI[(d.oy_raqami||curOy)-1] + ' ' + (d.yil||curYil);

      document.getElementById('hdr-sub').textContent = 'CEO · ' + oyNomi;

      // Jami plan hisoblash
      var jPlan = 0;
      for(var i=0;i<filiallar.length;i++) jPlan += (filiallar[i].plan||0);

      var html = '';

      // JAMI CARD
      html += '<div class="jami-card" id="jami-block">';
      html += '<div class="jami-label">Kompaniya jami · ' + oyNomi + '</div>';
      html += '<div class="jami-row"><div class="jami-summa">0</div><div class="jami-foiz">0%</div></div>';
      html += '<div class="jami-bar-bg"><div class="jami-bar" style="width:0%"></div></div>';
      html += '<div class="jami-nums"><span>Bajarildi: <b id="jami-baj">0</b></span><span>Plan: <b id="jami-plan">' + fmt(jPlan) + '</b></span></div>';
      html += '</div>';

      // FILIALLAR
      html += '<div class="sec-hdr"><div class="sec-title">Filiallar</div><span class="sec-badge">' + filiallar.length + ' ta</span></div>';

      var allFilialData = new Array(filiallar.length);

      for(var i=0;i<filiallar.length;i++){
        var f = filiallar[i];
        html += '<div class="filial-card" id="fc-' + i + '">';
        html += '<div class="fc-loading"><div class="mini-spin"></div></div>';
        html += '</div>';
      }

      document.getElementById('main').innerHTML = html;

      // Parallel fetch
      for(var i=0;i<filiallar.length;i++){
        fetchFilial(filiallar[i].warehouse_id, filiallar[i].filial, filiallar[i].plan, filiallar[i].oy, i, allFilialData);
      }
    })
    .catch(function(e){
      document.getElementById('main').innerHTML = '<div class="err-box">⚠️ ' + e.message + '</div>';
    });
}

// Theme
var isDark = true;
function toggleTheme(){
  isDark = !isDark;
  document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
  document.getElementById('themeBtn').textContent = isDark ? '🌙' : '☀️';
  try{ localStorage.setItem('ceo-theme', isDark ? 'dark' : 'light'); }catch(e){}
}
(function(){
  try{
    var t = localStorage.getItem('ceo-theme');
    if(t === 'light'){ isDark=false; document.documentElement.setAttribute('data-theme','light'); document.getElementById('themeBtn').textContent='☀️'; }
  }catch(e){}
})();

buildOyOptions();
load();
</script>
</body>
</html>
