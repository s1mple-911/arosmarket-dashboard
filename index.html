<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>AROS</title>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<style>
:root{
  --bg:#0f0f1a;
  --bg2:#1a1a2e;
  --bg3:#252540;
  --border:#2a2a45;
  --text:#f1f5f9;
  --text2:#94a3b8;
  --text3:#475569;
  --green:#22c55e;
  --green2:#16a34a;
  --red:#f87171;
  --red2:#ef4444;
  --amber:#fbbf24;
  --accent:#22c55e;
  --accent2:#16a34a;
  --accent-bg:rgba(34,197,94,.12);
  --accent-border:rgba(34,197,94,.3);
}
[data-theme="light"]{
  --bg:#f5f5f5;
  --bg2:#ffffff;
  --bg3:#f0f0f0;
  --border:#e5e5e5;
  --text:#111111;
  --text2:#555555;
  --text3:#999999;
  --accent:#16a34a;
  --accent2:#15803d;
  --accent-bg:rgba(22,163,74,.1);
  --accent-border:rgba(22,163,74,.3);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px}

/* HEADER */
.hdr{background:var(--bg2);border-bottom:1px solid var(--border);padding:13px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.av{width:36px;height:36px;border-radius:50%;background:var(--accent-bg);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:var(--accent);border:1.5px solid var(--accent-border);flex-shrink:0}
.hi{flex:1}
.hn{font-size:14px;font-weight:700;color:var(--text)}
.hs{font-size:11px;color:var(--text2);margin-top:1px}
.aros-b{color:var(--accent);font-size:9px;font-weight:800;padding:3px 8px;border-radius:7px;border:1.5px solid var(--accent-border);letter-spacing:.8px}

/* TABS */
.tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--border)}
.tab{flex:1;padding:11px 4px 10px;text-align:center;font-size:10px;font-weight:700;color:var(--text3);border-bottom:2px solid transparent;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:4px}
.tab svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab.active svg{stroke:var(--accent)}

/* PAGES */
.page{display:none;padding:14px;animation:fi .2s ease}
.page.active{display:block}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}

/* DASHBOARD */
.progress-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:12px}
.pc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.pc-lbl{font-size:10px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.pc-plan{font-size:17px;font-weight:800;color:var(--text);margin-top:3px}
.pc-pct{font-size:26px;font-weight:800;color:var(--green)}
.pc-bar-bg{background:var(--bg3);border-radius:8px;height:7px;margin-bottom:10px;overflow:hidden}
.pc-bar{background:var(--green);height:100%;border-radius:8px;transition:width .8s ease}
.pc-nums{display:flex;justify-content:space-between;font-size:11px;color:var(--text3)}
.pc-nums b{color:var(--text);font-weight:700}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:13px}
.sc-lbl{font-size:10px;color:var(--text3);font-weight:600;margin-bottom:5px;text-transform:uppercase;letter-spacing:.3px}
.sc-val{font-size:17px;font-weight:800}
.sc-sub{font-size:10px;color:var(--text3);margin-top:3px}

/* LIST */
.total-bar{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.tb-lbl{font-size:11px;color:var(--text2);font-weight:600}
.tb-val{font-size:15px;font-weight:800}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.sec-ttl{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px}
.badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px}
.b-red{background:rgba(248,113,113,.15);color:var(--red);border:1px solid rgba(248,113,113,.25)}
.b-amber{background:rgba(251,191,36,.15);color:var(--amber);border:1px solid rgba(251,191,36,.25)}
.b-blue{background:rgba(96,165,250,.15);color:var(--blue);border:1px solid rgba(96,165,250,.25)}

/* CLIENT CARD */
.client-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;margin-bottom:8px;overflow:hidden;transition:border-color .15s}
.client-main{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;-webkit-user-select:none;user-select:none}
.c-av{width:38px;height:38px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:var(--text2);flex-shrink:0;border:1px solid var(--border)}
.c-info{flex:1;min-width:0}
.c-name{font-size:13px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.c-phone{font-size:11px;color:var(--text3);margin-top:2px}
.c-right{text-align:right;flex-shrink:0}
.c-amt{font-size:13px;font-weight:800}
.c-sub{font-size:10px;color:var(--text3);margin-top:2px}
.call-btn{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1px solid rgba(34,197,94,.35);background:rgba(34,197,94,.1);text-decoration:none;transition:all .15s}
.call-btn svg{width:15px;height:15px;stroke:var(--green);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.call-btn:active{transform:scale(.93)}
.arr{color:var(--text3);font-size:11px;flex-shrink:0;margin-left:4px;min-width:14px;text-align:center;transition:transform .2s}
.arr.open{transform:rotate(180deg)}

/* ORDERS */
.orders-list{display:none;border-top:1px solid var(--border);background:var(--bg3)}
.order-row{display:flex;justify-content:space-between;align-items:center;padding:10px 14px 10px 62px;border-bottom:1px solid var(--border)}
.order-row:last-child{border-bottom:none}
.o-left{display:flex;flex-direction:column;gap:2px}
.o-id{font-size:11px;color:var(--text3);font-weight:500}
.o-deadline{font-size:11px;font-weight:600}
.o-days{font-size:10px;color:var(--red);margin-top:1px}
.o-amt{font-size:13px;font-weight:800;white-space:nowrap}
.mini-spin-wrap{padding:12px 14px 12px 62px;display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text3)}
.mini-spinner{width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}

/* LOADING / EMPTY */
.loading{text-align:center;padding:60px 16px;color:var(--text3);font-size:13px}
.spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:60px 16px}
.empty-icon{width:48px;height:48px;margin:0 auto 14px;opacity:.3}
.empty-icon svg{width:100%;height:100%;stroke:var(--text2);fill:none;stroke-width:1.5}
.et{font-size:13px;color:var(--text3)}
</style>
</head>
<body>

<div class="hdr">
  <div class="av" id="av">?</div>
  <div class="hi">
    <div class="hn" id="hn">Yuklanmoqda...</div>
    <div class="hs" id="hs">AROS Market</div>
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <div onclick="toggleTheme()" id="themeBtn" style="width:30px;height:30px;border-radius:50%;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;flex-shrink:0">🌙</div>
    <div class="aros-b">AROS</div>
  </div>
</div>

<div class="tabs">
  <div class="tab active" onclick="showTab('dash',this)">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    Dashboard
  </div>
  <div class="tab" onclick="showTab('otgan',this)">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg>
    O'tgan
  </div>
  <div class="tab" onclick="showTab('bugun',this)">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
    Bugun
  </div>
  <div class="tab" onclick="showTab('ertaga',this)">
    <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><path d="M8 14h.01M12 14h.01M16 14h.01M8 18h.01M12 18h.01"/></svg>
    Ertaga
  </div>
</div>

<div id="page-dash" class="page active"><div class="loading"><div class="spinner"></div>Yuklanmoqda...</div></div>
<div id="page-otgan" class="page"><div class="loading"><div class="spinner"></div></div></div>
<div id="page-bugun" class="page"><div class="loading"><div class="spinner"></div></div></div>
<div id="page-ertaga" class="page"><div class="loading"><div class="spinner"></div></div></div>

<script>
var STATS_API  = 'https://simle.app.n8n.cloud/webhook/aros-stats';
var ORDERS_API = 'https://simle.app.n8n.cloud/webhook/aros-orders';
var uid = new URLSearchParams(window.location.search).get('uid')||'';
var userData={}, debtData={otgan:[],bugun:[],ertaga:[],summary:{}};
var ordersCache={};
// bugun/ertaga potential list (clean_debt > 0, not overdue)
var potentialList=[];
var beLoadedBugun=false, beLoadedErtaga=false;
var beLoadingBugun=false, beLoadingErtaga=false;
var bugunFinal=[], ertagaFinal=[];

var today=new Date(new Date().getTime()+5*60*60*1000);
var bugunStr=today.toISOString().split('T')[0];
var ertagaDate=new Date(today.getTime()+86400000);
var ertagaStr=ertagaDate.toISOString().split('T')[0];

function showTab(t,el){
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');});
  document.querySelectorAll('.tab').forEach(function(tb){tb.classList.remove('active');});
  document.getElementById('page-'+t).classList.add('active');
  el.classList.add('active');
  if(t==='bugun'&&!beLoadedBugun&&!beLoadingBugun) loadBE('bugun');
  if(t==='ertaga'&&!beLoadedErtaga&&!beLoadingErtaga) loadBE('ertaga');
}

function fmt(n){
  var num=Math.round(Number(n)||0);
  if(num>=1000000000) return (num/1e9).toFixed(1)+' mlrd';
  if(num>=1000000) return (num/1e6).toFixed(1)+' mln';
  if(num>=1000) return (num/1e3).toFixed(0)+' ming';
  return num.toLocaleString();
}
function fmtFull(n){return Math.round(Number(n)||0).toLocaleString('uz-UZ');}
function ini(name){
  if(!name) return '?';
  return name.split(' ').map(function(w){return w[0]||'';}).join('').substring(0,2).toUpperCase();
}

// O'tgan - lazy load orders
function toggleOrders(id,userId,walletBalance){
  var el=document.getElementById('ol-'+id);
  var ar=document.getElementById('ar-'+id);
  if(!el) return;
  var open=el.style.display!=='none';
  if(open){
    el.style.display='none';
    if(ar){ar.textContent='▾';ar.classList.remove('open');}
    return;
  }
  if(ar){ar.textContent='▴';ar.classList.add('open');}
  if(ordersCache[userId]!==undefined){
    fillOrders(el,ordersCache[userId],'otgan',walletBalance);
    el.style.display='block';
    return;
  }
  el.innerHTML='<div class="mini-spin-wrap"><div class="mini-spinner"></div>Yuklanmoqda...</div>';
  el.style.display='block';
  fetch(ORDERS_API+'?user_id='+userId)
    .then(function(r){return r.json();})
    .then(function(data){
      var d=Array.isArray(data)?data[0]:data;
      var orders=(d.orders||[]).filter(function(o){return o.kun_otgan>0;});
      ordersCache[userId]=orders;
      fillOrders(el,orders,'otgan',walletBalance);
    })
    .catch(function(e){
      el.innerHTML='<div class="mini-spin-wrap" style="color:var(--red)">Xato: '+e.message+'</div>';
    });
}

// Bugun/Ertaga inline toggle
function toggleInline(id){
  var el=document.getElementById('ol-'+id);
  var ar=document.getElementById('ar-'+id);
  if(!el) return;
  var open=el.style.display!=='none';
  el.style.display=open?'none':'block';
  if(ar){ar.textContent=open?'▾':'▴';open?ar.classList.remove('open'):ar.classList.add('open');}
}

function fillOrders(el,orders,type,walletBalance){
  if(!orders||!orders.length){
    el.innerHTML='<div class="mini-spin-wrap" style="color:var(--text3)">Order topilmadi</div>';
    return;
  }
  var color=type==='ertaga'?'var(--amber)':'var(--red)';
  var html='';
  // Hamyon qatori - birinchi
  if(walletBalance && walletBalance > 0){
    html+='<div class="order-row" style="background:rgba(34,197,94,.06)">';
    html+='<div class="o-left">';
    html+='<div class="o-id" style="color:var(--green);font-weight:700">💰 Hamyon balansi</div>';
    html+='<div class="o-deadline" style="color:var(--green)">Qarzdan ayiriladi</div>';
    html+='</div>';
    html+='<div class="o-amt" style="color:var(--green)">-'+fmtFull(walletBalance)+'</div>';
    html+='</div>';
  }
  orders.forEach(function(o){
    var dText=o.kun_otgan>0?(o.kun_otgan+' kun o\'tgan'):('Deadline: '+(o.deadline||'—'));
    html+='<div class="order-row">';
    html+='<div class="o-left">';
    html+='<div class="o-id">Order #'+o.order_id+' · '+(o.sana||'')+'</div>';
    html+='<div class="o-deadline" style="color:'+color+'">'+dText+'</div>';
    html+='</div>';
    html+='<div class="o-amt" style="color:'+color+'">'+fmtFull(o.summa)+'</div>';
    html+='</div>';
  });
  el.innerHTML=html;
}
function callBtn(tel){
  if(!tel) return '';
  return '<a class="call-btn" href="tel:+'+tel+'" onclick="event.stopPropagation()">'+
    '<svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.95 10.5a19.79 19.79 0 01-3.07-8.67A2 2 0 012.85 0h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L7.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 14.92z"/></svg>'+
    '</a>';
}

function buildCard(r,id,color,lazy,orders){
  var tel=(r.telefon||'').replace(/\D/g,'');
 var clickFn=lazy?('toggleOrders(\''+id+'\','+r.user_id+','+(r.wallet_balance||0)+')'):('toggleInline(\''+id+'\')');
  var subTxt=lazy?'Bosib orders ko\'ring':(orders&&orders.length?orders.length+' ta order':'');
  var html='<div class="client-card">';
  html+='<div class="client-main" onclick="'+clickFn+'">';
  html+='<div class="c-av">'+ini(r.ism)+'</div>';
  html+='<div class="c-info">';
  html+='<div class="c-name">'+(r.ism||'Noma\'lum')+'</div>';
  html+='<div class="c-phone">'+(tel?'+'+tel:'—')+'</div>';
  html+='</div>';
  html+='<div class="c-right">';
  html+='<div class="c-amt" style="color:'+color+'">'+fmtFull(r.summa)+'</div>';
  html+='<div class="c-sub">'+subTxt+'</div>';
  html+='</div>';
  html+=callBtn(tel);
  html+='<span class="arr" id="ar-'+id+'">▾</span>';
  html+='</div>';
  html+='<div class="orders-list" id="ol-'+id+'">';
  if(!lazy&&orders&&orders.length){
    var ocolor=color;
    orders.forEach(function(o){
      html+='<div class="order-row">';
      html+='<div class="o-left">';
      html+='<div class="o-id">Order #'+o.order_id+' · '+(o.sana||'')+'</div>';
      html+='<div class="o-deadline" style="color:'+ocolor+'">Deadline: '+(o.deadline||'—')+'</div>';
      html+='</div>';
      html+='<div class="o-amt" style="color:'+ocolor+'">'+fmtFull(o.summa)+'</div>';
      html+='</div>';
    });
  }
  html+='</div></div>';
  return html;
}

function renderList(pageId,list,color,badgeClass,emptyIcon,emptyText,lazy){
  var el=document.getElementById(pageId);
  if(!list||!list.length){
    el.innerHTML='<div class="empty"><div class="empty-icon"><svg viewBox="0 0 24 24">'+emptyIcon+'</svg></div><div class="et">'+emptyText+'</div></div>';
    return;
  }
  var total=list.reduce(function(s,r){return s+Number(r.summa||0);},0);
  var html='<div class="total-bar"><div class="tb-lbl">Jami</div>';
  html+='<div class="tb-val" style="color:'+color+'">'+fmtFull(total)+' so\'m</div></div>';
  html+='<div class="sec-hdr"><div class="sec-ttl">Mijozlar</div>';
  html+='<span class="badge '+badgeClass+'">'+list.length+' ta</span></div>';
  list.forEach(function(r,i){
    html+=buildCard(r,pageId+'-'+i,color,lazy,r.orders||[]);
  });
  el.innerHTML=html;
}

function renderDashboard(){
  var plan=Number(userData.oylik_plan)||0;
  var yig=Number(debtData.summary&&debtData.summary.yigilgan)||0;
  var pct=plan>0?Math.min(100,Math.round(yig/plan*100)):0;
  var qoldi=Math.max(0,plan-yig);
  var otSum=debtData.otgan.reduce(function(s,r){return s+Number(r.summa||0);},0);
  var buSum=bugunFinal.reduce(function(s,r){return s+Number(r.summa||0);},0);
  var erSum=ertagaFinal.reduce(function(s,r){return s+Number(r.summa||0);},0);
  var jami=(debtData.summary&&debtData.summary.jami_mjoz)||0;
  var html='';
  html+='<div class="progress-card">';
  html+='<div class="pc-top"><div><div class="pc-lbl">Oylik plan</div>';
  html+='<div class="pc-plan">'+fmt(plan)+' so\'m</div></div>';
  html+='<div class="pc-pct">'+pct+'%</div></div>';
  html+='<div class="pc-bar-bg"><div class="pc-bar" style="width:'+pct+'%"></div></div>';
  html+='<div class="pc-nums"><span>Yig\'ildi: <b>'+fmt(yig)+'</b></span><span>Qoldi: <b>'+fmt(qoldi)+'</b></span></div>';
  html+='</div>';
  html+='<div class="stats-grid">';
  html+='<div class="stat-card"><div class="sc-lbl">Muddati o\'tgan</div><div class="sc-val" style="color:var(--red)">'+fmt(otSum)+'</div><div class="sc-sub">'+debtData.otgan.length+' ta mijoz</div></div>';
  html+='<div class="stat-card"><div class="sc-lbl">Bugun</div><div class="sc-val" style="color:var(--red)">'+fmt(buSum)+'</div><div class="sc-sub">'+bugunFinal.length+' ta mijoz</div></div>';
  html+='<div class="stat-card"><div class="sc-lbl">Ertaga</div><div class="sc-val" style="color:var(--amber)">'+fmt(erSum)+'</div><div class="sc-sub">'+ertagaFinal.length+' ta mijoz</div></div>';
  html+='<div class="stat-card"><div class="sc-lbl">Jami qarzdor</div><div class="sc-val" style="color:var(--text)">'+jami+'</div><div class="sc-sub">'+(userData.warehouse_name||'')+'</div></div>';
  html+='</div>';
  document.getElementById('page-dash').innerHTML=html;
}

// Bugun/Ertaga: potential listdan orders API ga so'rov yuborib filter qilish
function loadBE(tab){
  if(tab==='bugun') beLoadingBugun=true;
  else beLoadingErtaga=true;

  var pageId='page-'+tab;
  var targetDate=tab==='bugun'?bugunStr:ertagaStr;
  document.getElementById(pageId).innerHTML='<div class="loading"><div class="spinner"></div>Yuklanmoqda...</div>';

  if(!potentialList.length){
    if(tab==='bugun'){beLoadedBugun=true;beLoadingBugun=false;}
    else{beLoadedErtaga=true;beLoadingErtaga=false;}
    var emptyIcon='<polyline points="20 6 9 17 4 12"/>';
    document.getElementById(pageId).innerHTML='<div class="empty"><div class="empty-icon"><svg viewBox="0 0 24 24">'+emptyIcon+'</svg></div><div class="et">'+tab+' da to\'lanadigan qarz yo\'q</div></div>';
    return;
  }

  var resultMap={};
  var pending=potentialList.length;
  var done=0;

  function checkDone(){
    done++;
    if(done>=pending){
      var finalList=Object.values(resultMap);
      if(tab==='bugun'){beLoadedBugun=true;beLoadingBugun=false;bugunFinal=finalList;}
      else{beLoadedErtaga=true;beLoadingErtaga=false;ertagaFinal=finalList;}
      renderList(pageId,finalList,
        tab==='bugun'?'var(--red)':'var(--amber)',
        tab==='bugun'?'b-red':'b-amber',
        '<polyline points="20 6 9 17 4 12"/>',
        tab==='bugun'?"Bugun to'lanadigan qarz yo'q":"Ertaga to'lanadigan qarz yo'q",
        false
      );
      renderDashboard();
    }
  }

  potentialList.forEach(function(debtor){
    // Cache dan olish
    var cachedOrders=ordersCache[debtor.user_id];
    if(cachedOrders!==undefined){
      processOrders(debtor,cachedOrders,targetDate,resultMap,tab);
      checkDone();
      return;
    }
    fetch(ORDERS_API+'?user_id='+debtor.user_id)
      .then(function(r){return r.json();})
      .then(function(data){
        var d=Array.isArray(data)?data[0]:data;
        var orders=d.orders||[];
        ordersCache[debtor.user_id]=orders;
        processOrders(debtor,orders,targetDate,resultMap,tab);
        checkDone();
      })
      .catch(function(){checkDone();});
  });
}

function processOrders(debtor,orders,targetDate,resultMap,tab){
  var filtered=orders.filter(function(o){
    return o.deadline===targetDate && o.kun_otgan===0;
  });
  if(!filtered.length) return;
  var userId=debtor.user_id;
  var totalSumma=filtered.reduce(function(s,o){return s+Number(o.summa||0);},0);
  resultMap[userId]={
    ism:debtor.ism,
    telefon:debtor.telefon,
    summa:totalSumma,
    user_id:userId,
    orders:filtered
  };
}

    .then(function(data){

        'Muddati o\'tgan qarz yo\'q!',true);
    })
    .catch(function(e){
      document.getElementById('hn').textContent='Xato';
      document.getElementById('page-dash').innerHTML='<div class="empty"><div class="empty-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></div><div class="et">'+e.message+'</div></div>';
    });
}

  }catch(e){}
