<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AROS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --surface: #13131a;
  --surface2: #1c1c26;
  --border: #2a2a38;
  --border2: #363648;
  --text: #f0f0f8;
  --text2: #8888aa;
  --text3: #55556a;
  --red: #ff4466;
  --red-dim: rgba(255,68,102,0.12);
  --amber: #ffaa33;
  --amber-dim: rgba(255,170,51,0.12);
  --green: #22dd88;
  --green-dim: rgba(34,221,136,0.1);
  --blue: #4488ff;
  --blue-dim: rgba(68,136,255,0.1);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* HEADER */
.hdr {
  background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:14px 18px;
  display:flex;align-items:center;gap:12px;
  position:sticky;top:0;z-index:100;
  backdrop-filter:blur(20px);
}
.av {
  width:40px;height:40px;border-radius:14px;
  background:linear-gradient(135deg,#22dd88,#4488ff);
  display:flex;align-items:center;justify-content:center;
  font-family:'Sora',sans-serif;font-size:14px;font-weight:700;color:#fff;
  flex-shrink:0;
}
.hi{flex:1}
.hn{font-family:'Sora',sans-serif;font-size:15px;font-weight:700;color:var(--text)}
.hs{font-size:11px;color:var(--text3);margin-top:2px}
.aros-pill {
  background:var(--green-dim);border:1px solid var(--green);
  color:var(--green);font-size:9px;font-weight:700;
  padding:4px 10px;border-radius:20px;letter-spacing:1px;
  font-family:'Sora',sans-serif;
}

/* TABS */
.tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);padding:0 8px;gap:4px}
.tab{flex:1;padding:12px 4px 11px;text-align:center;font-size:10px;font-weight:600;color:var(--text3);border-bottom:2px solid transparent;cursor:pointer;transition:all .2s;font-family:'Sora',sans-serif;letter-spacing:.3px}
.tab.active{color:var(--text);border-bottom-color:var(--green)}
.tic{font-size:15px;display:block;margin-bottom:3px}

/* PAGES */
.page{display:none;padding:16px;animation:fi .25s ease}
.page.active{display:block}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* DASHBOARD */
.plan-card {
  background:var(--surface);border:1px solid var(--border);
  border-radius:20px;padding:20px;margin-bottom:14px;
  position:relative;overflow:hidden;
}
.plan-card::before {
  content:'';position:absolute;top:-40px;right:-40px;
  width:120px;height:120px;border-radius:50%;
  background:var(--green-dim);filter:blur(30px);
}
.plan-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
.plan-lbl{font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.plan-val{font-family:'Sora',sans-serif;font-size:22px;font-weight:800;color:var(--text)}
.plan-pct{font-family:'Sora',sans-serif;font-size:32px;font-weight:800;color:var(--green)}
.plan-bar{background:var(--surface2);border-radius:6px;height:6px;margin-bottom:12px;overflow:hidden}
.plan-fill{background:linear-gradient(90deg,var(--green),#4488ff);height:100%;border-radius:6px;transition:width 1s ease}
.plan-row{display:flex;justify-content:space-between;font-size:11px;color:var(--text3)}
.plan-row b{color:var(--text);font-weight:600}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.stat {
  background:var(--surface);border:1px solid var(--border);
  border-radius:16px;padding:14px;
}
.stat-lbl{font-size:9px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.7px;margin-bottom:8px}
.stat-val{font-family:'Sora',sans-serif;font-size:20px;font-weight:800}
.stat-sub{font-size:10px;color:var(--text3);margin-top:4px}
.v-red{color:var(--red)}
.v-amber{color:var(--amber)}
.v-green{color:var(--green)}
.v-blue{color:var(--blue)}

/* TOTAL BAR */
.total-bar {
  background:var(--surface);border:1px solid var(--border);
  border-radius:14px;padding:14px 16px;margin-bottom:14px;
  display:flex;align-items:center;justify-content:space-between;
}
.tb-lbl{font-size:11px;color:var(--text3);font-weight:600}
.tb-val{font-family:'Sora',sans-serif;font-size:16px;font-weight:800}

/* SEC HDR */
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.sec-ttl{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.8px}
.pill{font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px}
.pill-red{background:var(--red-dim);color:var(--red);border:1px solid rgba(255,68,102,.25)}
.pill-amber{background:var(--amber-dim);color:var(--amber);border:1px solid rgba(255,170,51,.25)}

/* CLIENT CARD */
.client-card {
  background:var(--surface);border:1px solid var(--border);
  border-radius:16px;margin-bottom:10px;overflow:hidden;
  transition:border-color .2s;
}
.client-card:hover{border-color:var(--border2)}
.client-main {
  display:flex;align-items:center;gap:12px;
  padding:14px 16px;cursor:pointer;
  -webkit-user-select:none;user-select:none;
}
.c-av {
  width:40px;height:40px;border-radius:12px;
  background:var(--surface2);
  display:flex;align-items:center;justify-content:center;
  font-family:'Sora',sans-serif;font-size:13px;font-weight:700;
  color:var(--text2);flex-shrink:0;
  border:1px solid var(--border);
}
.c-info{flex:1;min-width:0}
.c-name{font-family:'Sora',sans-serif;font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.c-phone{font-size:11px;color:var(--text3);margin-top:3px}
.c-right{text-align:right;flex-shrink:0}
.c-amt{font-family:'Sora',sans-serif;font-size:14px;font-weight:700}
.call-btn {
  width:36px;height:36px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  background:var(--green-dim);border:1px solid rgba(34,221,136,.3);
  text-decoration:none;transition:all .15s;
}
.call-btn:active{transform:scale(.92);background:rgba(34,221,136,.2)}
.arr{color:var(--text3);font-size:10px;flex-shrink:0;margin-left:4px;transition:transform .2s}
.arr.open{transform:rotate(180deg)}

/* ORDERS */
.orders-list{display:none;border-top:1px solid var(--border)}
.order-row {
  display:flex;justify-content:space-between;align-items:center;
  padding:11px 16px 11px 68px;
  border-bottom:1px solid var(--border);
}
.order-row:last-child{border-bottom:none}
.o-left{display:flex;flex-direction:column;gap:3px}
.o-id{font-size:10px;color:var(--text3);font-weight:500;font-family:'Sora',sans-serif}
.o-deadline{font-size:11px;font-weight:600}
.o-days{font-size:10px;color:var(--red)}
.o-amt{font-family:'Sora',sans-serif;font-size:13px;font-weight:700;color:var(--red)}

.orders-loading {
  padding:14px 16px 14px 68px;
  font-size:12px;color:var(--text3);
  display:flex;align-items:center;gap:8px;
}
.mini-spin {
  width:14px;height:14px;border:2px solid var(--border);
  border-top-color:var(--green);border-radius:50%;
  animation:spin .7s linear infinite;flex-shrink:0;
}

/* LOADING/EMPTY */
.loading{text-align:center;padding:80px 16px;color:var(--text3);font-size:13px}
.spinner{width:32px;height:32px;border:2.5px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:80px 16px}
.ei{font-size:44px;margin-bottom:14px}
.et{font-size:13px;color:var(--text3)}
</style>
</head>
<body>

<div class="hdr">
  <div class="av" id="av">?</div>
  <div class="hi">
    <div class="hn" id="hn">Yuklanmoqda...</div>
    <div class="hs" id="hs">AROS Market</div>
  </div>
  <div class="aros-pill">AROS</div>
</div>

<div class="tabs">
  <div class="tab active" onclick="showTab('dash',this)"><span class="tic">📊</span>Dashboard</div>
  <div class="tab" onclick="showTab('otgan',this)"><span class="tic">🔴</span>O'tgan</div>
  <div class="tab" onclick="showTab('bugun',this)"><span class="tic">📅</span>Bugun</div>
  <div class="tab" onclick="showTab('ertaga',this)"><span class="tic">🔔</span>Ertaga</div>
</div>

<div id="page-dash" class="page active">
  <div class="loading"><div class="spinner"></div>Yuklanmoqda...</div>
</div>
<div id="page-otgan" class="page">
  <div class="loading"><div class="spinner"></div></div>
</div>
<div id="page-bugun" class="page">
  <div class="loading"><div class="spinner"></div></div>
</div>
<div id="page-ertaga" class="page">
  <div class="loading"><div class="spinner"></div></div>
</div>

<script>
var userData={}, debtData={bugun:[],ertaga:[],otgan:[],summary:{}};
var ordersCache={};
var ORDERS='https://simle.app.n8n.cloud/webhook/aros-orders';
var STATS='https://simle.app.n8n.cloud/webhook/aros-stats';

function showTab(t,el){
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active')});
  document.querySelectorAll('.tab').forEach(function(tb){tb.classList.remove('active')});
  document.getElementById('page-'+t).classList.add('active');
  el.classList.add('active');
}

function fmt(n){
  var num=Math.round(Number(n)||0);
  if(num>=1000000000) return (num/1000000000).toFixed(1)+' mlrd';
  if(num>=1000000) return (num/1000000).toFixed(1)+' mln';
  if(num>=1000) return (num/1000).toFixed(0)+' ming';
  return num.toLocaleString();
}
function fmtFull(n){return Math.round(Number(n)||0).toLocaleString('uz-UZ');}
function ini(name){
  if(!name) return '?';
  return name.split(' ').map(function(w){return w[0]||''}).join('').substring(0,2).toUpperCase();
}

function toggleOrders(id,userId){
  var el=document.getElementById('ol-'+id);
  var ar=document.getElementById('ar-'+id);
  if(!el) return;
  var open=el.style.display!=='none';
  if(open){el.style.display='none';if(ar)ar.classList.remove('open');return;}
  if(ar) ar.classList.add('open');
  if(ordersCache[userId]){
    renderOrders(id,ordersCache[userId]);
    el.style.display='block';return;
  }
  el.innerHTML='<div class="orders-loading"><div class="mini-spin"></div>Orderlar yuklanmoqda...</div>';
  el.style.display='block';
  fetch(ORDERS+'?user_id='+userId)
    .then(function(r){return r.json()})
    .then(function(data){
      var d=Array.isArray(data)?data[0]:data;
      var orders=d.orders||[];
      ordersCache[userId]=orders;
      renderOrders(id,orders);
    })
    .catch(function(e){
      el.innerHTML='<div class="orders-loading" style="color:var(--red)">Xato: '+e.message+'</div>';
    });
}

function renderOrders(id,orders){
  var el=document.getElementById('ol-'+id);
  if(!el) return;
  if(!orders.length){
    el.innerHTML='<div class="orders-loading">Order topilmadi</div>';return;
  }
  var html='';
  orders.forEach(function(o){
    var isOverdue=o.kun_otgan>0;
    var deadlineColor=isOverdue?'var(--red)':'var(--amber)';
    var daysText=isOverdue?o.kun_otgan+' kun o\'tgan':'Muddati yetmoqda';
    html+='<div class="order-row">';
    html+='<div class="o-left">';
    html+='<div class="o-id">#'+o.order_id+' &nbsp;·&nbsp; '+( o.sana||'')+'</div>';
    html+='<div class="o-deadline" style="color:'+deadlineColor+'">'+( o.deadline||'—')+'</div>';
    html+='<div class="o-days">'+daysText+'</div>';
    html+='</div>';
    html+='<div class="o-amt">'+fmtFull(o.summa)+'</div>';
    html+='</div>';
  });
  el.innerHTML=html;
}

function renderDashboard(){
  var plan=Number(userData.oylik_plan)||0;
  var yig=Number(debtData.summary&&debtData.summary.yigilgan)||0;
  var pct=plan>0?Math.min(100,Math.round(yig/plan*100)):0;
  var qoldi=Math.max(0,plan-yig);
  var otganSum=debtData.otgan.reduce(function(s,r){return s+Number(r.summa||0)},0);
  var bugunSum=debtData.bugun.reduce(function(s,r){return s+Number(r.summa||0)},0);
  var ertagaSum=debtData.ertaga.reduce(function(s,r){return s+Number(r.summa||0)},0);
  var jami=(debtData.summary&&debtData.summary.jami_mjoz)||0;

  var html='';
  html+='<div class="plan-card">';
  html+='<div class="plan-top"><div><div class="plan-lbl">Oylik plan</div><div class="plan-val">'+fmt(plan)+' so\'m</div></div>';
  html+='<div class="plan-pct">'+pct+'%</div></div>';
  html+='<div class="plan-bar"><div class="plan-fill" style="width:'+pct+'%"></div></div>';
  html+='<div class="plan-row"><span>Yig\'ildi: <b>'+fmt(yig)+'</b></span><span>Qoldi: <b>'+fmt(qoldi)+'</b></span></div>';
  html+='</div>';
  html+='<div class="grid2">';
  html+='<div class="stat"><div class="stat-lbl">Muddati o\'tgan</div><div class="stat-val v-red">'+fmt(otganSum)+'</div><div class="stat-sub">'+debtData.otgan.length+' ta mijoz</div></div>';
  html+='<div class="stat"><div class="stat-lbl">Bugun</div><div class="stat-val v-amber">'+fmt(bugunSum)+'</div><div class="stat-sub">'+debtData.bugun.length+' ta mijoz</div></div>';
  html+='<div class="stat"><div class="stat-lbl">Ertaga</div><div class="stat-val v-blue">'+fmt(ertagaSum)+'</div><div class="stat-sub">'+debtData.ertaga.length+' ta mijoz</div></div>';
  html+='<div class="stat"><div class="stat-lbl">Jami qarzdor</div><div class="stat-val">'+jami+'</div><div class="stat-sub">'+(userData.warehouse_name||'')+'</div></div>';
  html+='</div>';
  document.getElementById('page-dash').innerHTML=html;
}

function renderList(pageId,list,amtColor,pillClass,emptyIcon,emptyText){
  var el=document.getElementById(pageId);
  if(!list||!list.length){
    el.innerHTML='<div class="empty"><div class="ei">'+emptyIcon+'</div><div class="et">'+emptyText+'</div></div>';return;
  }
  var total=list.reduce(function(s,r){return s+Number(r.summa||0)},0);
  var html='';
  html+='<div class="total-bar"><div class="tb-lbl">Jami</div>';
  html+='<div class="tb-val" style="color:'+amtColor+'">'+fmtFull(total)+' so\'m</div></div>';
  html+='<div class="sec-hdr"><div class="sec-ttl">Mijozlar</div>';
  html+='<span class="pill '+pillClass+'">'+list.length+' ta</span></div>';
  list.forEach(function(r,i){
    var id=pageId+'-'+i;
    var tel=(r.telefon||'').replace(/\D/g,'');
    html+='<div class="client-card">';
    html+='<div class="client-main" onclick="toggleOrders(\''+id+'\','+r.user_id+')">';
    html+='<div class="c-av">'+ini(r.ism)+'</div>';
    html+='<div class="c-info"><div class="c-name">'+(r.ism||'Noma\'lum')+'</div>';
    html+='<div class="c-phone">'+(tel?'+'+tel:'—')+'</div></div>';
    html+='<div class="c-right"><div class="c-amt" style="color:'+amtColor+'">'+fmtFull(r.summa)+'</div></div>';
    if(tel){
      html+='<a class="call-btn" href="tel:+'+tel+'" onclick="event.stopPropagation()">';
      html+='<svg width="15" height="15" viewBox="0 0 24 24" fill="var(--green)"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1-9.4 0-17-7.6-17-17 0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z"/></svg>';
      html+='</a>';
    }
    html+='<div class="arr" id="ar-'+id+'">▾</div>';
    html+='</div>';
    html+='<div class="orders-list" id="ol-'+id+'"></div>';
    html+='</div>';
  });
  el.innerHTML=html;
}

function render(){
  document.getElementById('av').textContent=ini(userData.ism);
  document.getElementById('hn').textContent=userData.ism||'Hodim';
  document.getElementById('hs').textContent=(userData.warehouse_name||'AROS')+' · '+new Date().toLocaleDateString('uz-UZ',{month:'long',year:'numeric'});
  renderDashboard();
  renderList('page-otgan',debtData.otgan,'var(--red)','pill-red','🎉','Muddati o\'tgan qarz yo\'q!');
  renderList('page-bugun',debtData.bugun,'var(--amber)','pill-amber','✅','Bugun to\'lanadigan qarz yo\'q');
  renderList('page-ertaga',debtData.ertaga,'var(--blue)','pill-amber','📅','Ertaga to\'lanadigan qarz yo\'q');
}

function load(){
  var uid=new URLSearchParams(window.location.search).get('uid')||'';
  if(!uid){
    document.getElementById('hn').textContent='UID topilmadi';
    document.getElementById('page-dash').innerHTML='<div class="empty"><div class="ei">⚠️</div><div class="et">URL da ?uid= yo\'q</div></div>';
    return;
  }
  fetch(STATS+'?uid='+uid)
    .then(function(r){return r.json()})
    .then(function(data){
      var d=Array.isArray(data)?data[0]:data;
      if(!d||!d.user) throw new Error('Ma\'lumot bo\'sh');
      userData=d.user||{};
      debtData=d.debts||{bugun:[],ertaga:[],otgan:[],summary:{}};
      render();
    })
    .catch(function(e){
      document.getElementById('hn').textContent='Xato';
      document.getElementById('page-dash').innerHTML='<div class="empty"><div class="ei">⚠️</div><div class="et">'+e.message+'</div></div>';
    });
}

load();
</script>
</body>
</html>
