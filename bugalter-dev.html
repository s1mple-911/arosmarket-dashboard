<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Buxgalter — Aros Market</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg-primary:#f5f5f7;
    --bg-card:#ffffff;
    --bg-secondary:#f0f0f3;
    --text-primary:#1d1d1f;
    --text-secondary:#6e6e73;
    --text-tertiary:#a1a1a6;
    --border:rgba(0,0,0,0.06);
    --hero-bg:linear-gradient(180deg,#1c1c1e 0%,#2c2c2e 100%);
    --red:#ef4444; --red-bg:#fef2f2; --red-text:#7f1d1d;
    --amber:#f59e0b; --amber-bg:#fffbeb; --amber-text:#78350f;
    --green:#22c55e; --green-bg:#f0fdf4; --green-text:#14532d;
    --gray:#9ca3af; --gray-bg:#f3f4f6; --gray-text:#374151;
    --blue:#3b82f6; --blue-bg:#eff6ff; --blue-text:#1e3a8a;
    --shadow-sm:0 1px 2px rgba(0,0,0,0.04);
    --shadow-md:0 4px 12px rgba(0,0,0,0.06);
    --shadow-lg:0 12px 40px rgba(0,0,0,0.18);
  }
  @media (prefers-color-scheme:dark){
    :root{
      --bg-primary:#000;
      --bg-card:#1c1c1e;
      --bg-secondary:#2c2c2e;
      --text-primary:#f5f5f7;
      --text-secondary:#a1a1a6;
      --text-tertiary:#6e6e73;
      --border:rgba(255,255,255,0.08);
      --red-bg:rgba(239,68,68,0.15);
      --red-text:#fca5a5;
      --amber-bg:rgba(245,158,11,0.15);
      --amber-text:#fcd34d;
      --green-bg:rgba(34,197,94,0.15);
      --green-text:#86efac;
      --gray-bg:rgba(156,163,175,0.15);
      --gray-text:#d1d5db;
      --blue-bg:rgba(59,130,246,0.15);
      --blue-text:#93c5fd;
    }
  }
  html,body{
    background:var(--bg-primary);
    color:var(--text-primary);
    font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
    font-size:15px;line-height:1.4;overflow-x:hidden;
  }
  body{padding-bottom:env(safe-area-inset-bottom)}
  
  .header{
    padding:14px 16px 12px;background:var(--bg-card);
    border-bottom:0.5px solid var(--border);
    display:flex;align-items:center;justify-content:space-between;
    position:sticky;top:0;z-index:10;
  }
  .header-info p{font-size:13px;color:var(--text-secondary);font-weight:500}
  .header-info h1{font-size:22px;font-weight:600;margin-top:1px;letter-spacing:-0.4px}
  .icon-btn{
    width:36px;height:36px;border-radius:50%;
    background:var(--bg-secondary);border:none;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    color:var(--text-primary);
    transition:transform 0.15s ease,opacity 0.15s ease;
  }
  .icon-btn:active{transform:scale(0.92);opacity:0.8}
  .icon-btn svg{width:18px;height:18px}
  
  .container{padding:14px}
  
  .hero-card{
    background:var(--hero-bg);border-radius:18px;
    padding:18px;color:#fff;margin-bottom:12px;box-shadow:var(--shadow-md);
  }
  .hero-label{font-size:11px;color:#c5c5d6;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px}
  .hero-amount{font-size:28px;font-weight:600;line-height:1.05;letter-spacing:-0.6px}
  .hero-amount .unit{font-size:15px;color:#c5c5d6;font-weight:400;margin-left:4px}
  .hero-divider{margin-top:14px;padding-top:14px;border-top:0.5px solid rgba(255,255,255,0.12);display:flex;gap:10px}
  .hero-stat{flex:1}
  .hero-stat:not(:first-child){border-left:0.5px solid rgba(255,255,255,0.12);padding-left:10px}
  .hero-stat-label{font-size:10px;color:#7e7e95;font-weight:600;text-transform:uppercase;letter-spacing:0.4px;margin-bottom:3px}
  .hero-stat-value{font-size:14px;font-weight:600;letter-spacing:-0.2px}
  
  .alerts{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
  .alert-card{border-radius:14px;padding:14px;box-shadow:var(--shadow-sm)}
  .alert-card.red{background:var(--red-bg)}
  .alert-card.amber{background:var(--amber-bg)}
  .alert-card.green{background:var(--green-bg)}
  .alert-header{display:flex;align-items:center;gap:6px;margin-bottom:8px}
  .alert-dot{width:8px;height:8px;border-radius:50%}
  .alert-card.red .alert-dot{background:var(--red)}
  .alert-card.amber .alert-dot{background:var(--amber)}
  .alert-card.green .alert-dot{background:var(--green)}
  .alert-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.4px}
  .alert-card.red .alert-label{color:var(--red-text)}
  .alert-card.amber .alert-label{color:var(--amber-text)}
  .alert-card.green .alert-label{color:var(--green-text)}
  .alert-value{font-size:26px;font-weight:600;line-height:1;letter-spacing:-0.5px}
  .alert-value .total{font-size:13px;font-weight:400;color:var(--text-secondary)}
  .alert-card.red .alert-value{color:var(--red-text)}
  .alert-card.amber .alert-value{color:var(--amber-text)}
  .alert-card.green .alert-value{color:var(--green-text)}
  .alert-sub{font-size:11px;margin-top:6px}
  .alert-sub-amount{font-size:13px;font-weight:600;margin-top:4px}
  .alert-card.red .alert-sub,.alert-card.red .alert-sub-amount{color:var(--red-text)}
  .alert-card.amber .alert-sub,.alert-card.amber .alert-sub-amount{color:var(--amber-text)}
  .alert-card.green .alert-sub,.alert-card.green .alert-sub-amount{color:var(--green-text)}
  
  .tabbar{display:flex;gap:4px;background:var(--bg-secondary);border-radius:11px;padding:3px;margin-bottom:14px}
  .tab{
    flex:1;padding:8px;border:none;background:transparent;
    border-radius:8px;font-size:13px;font-weight:500;
    color:var(--text-secondary);cursor:pointer;
    transition:all 0.2s ease;font-family:inherit;
  }
  .tab.active{background:var(--bg-card);color:var(--text-primary);box-shadow:0 1px 2px rgba(0,0,0,0.05);font-weight:600}
  .tab:active:not(.active){opacity:0.6}
  
  .section-title{
    font-size:13px;font-weight:600;color:var(--text-secondary);
    text-transform:uppercase;letter-spacing:0.4px;margin:14px 0 8px 4px;
  }
  
  .list{display:flex;flex-direction:column;gap:8px}
  
  .filial-wrap{display:flex;flex-direction:column}
  
  .filial-card{
    background:var(--bg-card);border:0.5px solid var(--border);
    border-radius:14px;padding:12px 14px;
    display:flex;align-items:center;gap:12px;
    cursor:pointer;transition:transform 0.15s ease;
  }
  .filial-card:active{transform:scale(0.98)}
  .filial-card.has-unsent{border-radius:14px 14px 0 0;border-bottom:none}
  .filial-card.status-overdue{border-color:var(--red);border-width:1px}
  .filial-card.status-pending{border-color:var(--amber)}
  .filial-card.status-closed_done{border-color:var(--green)}
  
  .filial-badge{
    width:36px;height:36px;border-radius:10px;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    font-size:13px;font-weight:600;
  }
  .status-overdue .filial-badge{background:var(--red-bg);color:var(--red-text)}
  .status-pending .filial-badge{background:var(--amber-bg);color:var(--amber-text)}
  .status-closed_done .filial-badge{background:var(--green-bg);color:var(--green-text)}
  .status-open_today .filial-badge{background:var(--blue-bg);color:var(--blue-text)}
  .status-inactive .filial-badge{background:var(--gray-bg);color:var(--gray-text)}
  
  .filial-info{flex:1;min-width:0}
  .filial-name{
    font-size:14px;font-weight:600;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    letter-spacing:-0.2px;
  }
  .filial-status{font-size:11px;font-weight:500;margin-top:2px;display:flex;align-items:center;gap:4px}
  .filial-card.status-overdue .filial-status{color:var(--red)}
  .filial-card.status-pending .filial-status{color:var(--amber)}
  .filial-card.status-closed_done .filial-status{color:var(--green)}
  .filial-card.status-open_today .filial-status{color:var(--blue)}
  .filial-card.status-inactive .filial-status{color:var(--text-tertiary)}
  
  .filial-amount{text-align:right}
  .filial-amount-value{font-size:14px;font-weight:600;letter-spacing:-0.2px}
  .filial-amount-unit{font-size:11px;color:var(--text-tertiary);margin-top:2px}
  .filial-card.status-overdue .filial-amount-value{color:var(--red-text)}
  
  .days-badge{
    display:inline-block;background:var(--red);color:white;
    font-size:10px;font-weight:700;padding:2px 6px;
    border-radius:8px;letter-spacing:0.3px;
  }
  
  /* Unsent strip */
  .unsent-strip{
    background:var(--amber-bg);
    border:0.5px solid var(--amber);
    border-top:0.5px dashed rgba(245,158,11,0.3);
    border-radius:0 0 14px 14px;
    padding:10px 14px;
    display:flex;align-items:center;justify-content:space-between;
    cursor:pointer;
    transition:opacity 0.15s ease;
  }
  .unsent-strip:active{opacity:0.7}
  
  .unsent-left{display:flex;align-items:center;gap:8px}
  .unsent-icon{
    width:26px;height:26px;border-radius:7px;
    background:var(--amber);
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;color:white;
  }
  .unsent-icon svg{width:14px;height:14px}
  .unsent-text{display:flex;flex-direction:column}
  .unsent-label{font-size:11px;color:var(--amber-text);font-weight:600;text-transform:uppercase;letter-spacing:0.3px}
  .unsent-amount{font-size:14px;font-weight:700;color:var(--amber-text);letter-spacing:-0.2px;margin-top:1px}
  .unsent-arrow{color:var(--amber-text);opacity:0.6}
  .unsent-arrow svg{width:14px;height:14px}
  
  /* Standalone unsent card (filiyal status'siz) */
  .unsent-card-only{
    background:var(--amber-bg);
    border:0.5px solid var(--amber);
    border-radius:14px;padding:12px 14px;
    display:flex;align-items:center;gap:12px;
    cursor:pointer;transition:opacity 0.15s ease;
  }
  .unsent-card-only:active{opacity:0.7}
  
  /* Kassa card */
  .kassa-card{
    background:var(--bg-card);border-radius:16px;
    padding:16px;margin-bottom:10px;
    box-shadow:var(--shadow-sm);border:0.5px solid var(--border);
    cursor:pointer;transition:transform 0.15s ease;
  }
  .kassa-card:active{transform:scale(0.98)}
  .kassa-name{font-size:14px;font-weight:600;color:var(--text-secondary);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.4px}
  .kassa-total{font-size:24px;font-weight:600;letter-spacing:-0.5px;line-height:1.1}
  .kassa-total .unit{font-size:14px;font-weight:400;color:var(--text-secondary);margin-left:4px}
  .kassa-breakdown{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px;padding-top:12px;border-top:0.5px solid var(--border)}
  .kassa-mini{display:flex;flex-direction:column;gap:2px}
  .kassa-mini-label{font-size:10px;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:0.3px;font-weight:500}
  .kassa-mini-value{font-size:13px;font-weight:500;letter-spacing:-0.2px}
  
  /* History */
  .history-controls{
    display:flex;flex-direction:column;gap:10px;
    margin-bottom:14px;
  }
  .kassa-selector{
    display:flex;gap:6px;background:var(--bg-secondary);
    padding:3px;border-radius:11px;
  }
  .kassa-pill{
    flex:1;padding:10px;border:none;background:transparent;
    border-radius:8px;font-size:13px;font-weight:500;
    color:var(--text-secondary);cursor:pointer;
    font-family:inherit;transition:all 0.2s ease;
  }
  .kassa-pill.active{background:var(--bg-card);color:var(--text-primary);box-shadow:0 1px 2px rgba(0,0,0,0.05);font-weight:600}
  
  .date-input-wrap{
    display:flex;align-items:center;gap:8px;
    background:var(--bg-card);
    border:0.5px solid var(--border);
    border-radius:11px;padding:10px 14px;
  }
  .date-input-wrap svg{width:16px;height:16px;color:var(--text-secondary)}
  .date-input{
    flex:1;border:none;background:transparent;
    font-size:14px;font-family:inherit;
    color:var(--text-primary);
    outline:none;
  }
  .date-quick{
    display:flex;gap:6px;flex-wrap:wrap;
  }
  .date-quick-btn{
    padding:6px 12px;background:var(--bg-secondary);
    border:none;border-radius:8px;
    font-size:12px;font-weight:500;
    color:var(--text-secondary);cursor:pointer;
    font-family:inherit;
  }
  .date-quick-btn.active{background:var(--text-primary);color:var(--bg-card)}
  
  .history-summary{
    background:var(--bg-card);
    border:0.5px solid var(--border);
    border-radius:14px;padding:14px;
    margin-bottom:12px;
  }
  .history-summary-label{font-size:12px;color:var(--text-secondary);font-weight:500;text-transform:uppercase;letter-spacing:0.3px}
  .history-summary-value{font-size:18px;font-weight:600;letter-spacing:-0.3px;margin-top:2px}
  .history-summary-count{font-size:13px;color:var(--text-tertiary);margin-top:2px}
  
  .history-item{
    background:var(--bg-card);
    border:0.5px solid var(--border);
    border-radius:12px;padding:12px 14px;
    display:flex;align-items:center;gap:12px;
    margin-bottom:8px;
  }
  .history-time{
    width:46px;text-align:center;flex-shrink:0;
  }
  .history-time-h{font-size:13px;font-weight:600;color:var(--green)}
  .history-time-d{font-size:10px;color:var(--text-tertiary);margin-top:1px}
  .history-info{flex:1;min-width:0}
  .history-from{font-size:13px;font-weight:600;letter-spacing:-0.1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .history-meta{font-size:11px;color:var(--text-tertiary);margin-top:2px}
  .history-amount{font-size:14px;font-weight:600;letter-spacing:-0.2px;color:var(--green);text-align:right;flex-shrink:0}
  
  .state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 24px;text-align:center}
  .state-emoji{font-size:48px;margin-bottom:12px;opacity:0.5}
  .state-text{font-size:14px;color:var(--text-secondary);margin-bottom:14px}
  .state-btn{background:var(--text-primary);color:var(--bg-card);border:none;padding:10px 18px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
  
  .skeleton{
    background:linear-gradient(90deg,var(--bg-secondary) 0%,var(--bg-card) 50%,var(--bg-secondary) 100%);
    background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px;
  }
  @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
  .skeleton-card{height:64px;margin-bottom:8px}
  
  .updated-line{text-align:center;font-size:11px;color:var(--text-tertiary);padding:14px 0 4px}
  .empty-section{text-align:center;padding:30px 20px;color:var(--text-tertiary);font-size:13px}
  
  /* Modal */
  .modal-backdrop{
    position:fixed;inset:0;background:rgba(0,0,0,0.5);
    z-index:100;display:flex;align-items:flex-end;
    animation:fadeIn 0.2s ease;
  }
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  .modal-sheet{
    width:100%;background:var(--bg-primary);
    border-radius:20px 20px 0 0;
    max-height:85vh;overflow-y:auto;
    animation:slideUp 0.3s cubic-bezier(0.16,1,0.3,1);
    padding-bottom:env(safe-area-inset-bottom);
  }
  @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .modal-handle{
    width:36px;height:5px;background:var(--text-tertiary);
    border-radius:3px;margin:8px auto 4px;opacity:0.4;
  }
  .modal-header{
    padding:12px 16px 14px;
    border-bottom:0.5px solid var(--border);
    display:flex;align-items:flex-start;justify-content:space-between;
  }
  .modal-title{font-size:17px;font-weight:600;letter-spacing:-0.3px}
  .modal-subtitle{font-size:13px;color:var(--text-secondary);margin-top:2px}
  .modal-close{
    background:var(--bg-secondary);border:none;
    width:30px;height:30px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;color:var(--text-secondary);
    flex-shrink:0;
  }
  .modal-close svg{width:14px;height:14px}
  .modal-body{padding:14px 16px}
  
  .doc-item{
    background:var(--bg-card);
    border:0.5px solid var(--border);
    border-radius:12px;padding:12px 14px;
    margin-bottom:8px;
    display:flex;align-items:center;gap:12px;
  }
  .doc-day-badge{
    flex-shrink:0;width:46px;text-align:center;
    background:var(--amber-bg);
    border-radius:8px;padding:6px 0;
  }
  .doc-day-num{font-size:16px;font-weight:700;letter-spacing:-0.3px;line-height:1;color:var(--amber-text)}
  .doc-day-label{font-size:9px;color:var(--amber-text);text-transform:uppercase;margin-top:2px;letter-spacing:0.4px;font-weight:600;opacity:0.8}
  .doc-info{flex:1;min-width:0}
  .doc-date{font-size:13px;font-weight:600;letter-spacing:-0.1px}
  .doc-id{font-size:11px;color:var(--text-tertiary);margin-top:1px}
  .doc-amount{text-align:right}
  .doc-amount-val{font-size:14px;font-weight:600;letter-spacing:-0.2px}
  .doc-amount-unit{font-size:10px;color:var(--text-tertiary);margin-top:1px}
  
  .modal-summary{
    background:var(--amber-bg);border-radius:12px;
    padding:14px;margin-bottom:14px;
    display:flex;justify-content:space-between;
  }
  .modal-summary-block{display:flex;flex-direction:column;gap:2px}
  .modal-summary-label{font-size:11px;color:var(--amber-text);font-weight:500;text-transform:uppercase;letter-spacing:0.4px}
  .modal-summary-value{font-size:18px;font-weight:600;color:var(--amber-text);letter-spacing:-0.3px}
</style>
</head>
<body>

<div class="header">
  <div class="header-info">
    <p id="dateText">Yuklanmoqda...</p>
    <h1>Buxgalter</h1>
  </div>
  <button class="icon-btn" id="refreshBtn" title="Yangilash">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
  </button>
</div>

<div class="container" id="content">
  <div class="state">
    <div class="skeleton" style="width:100%;height:120px;margin-bottom:12px"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;margin-bottom:14px">
      <div class="skeleton" style="height:90px"></div>
      <div class="skeleton" style="height:90px"></div>
    </div>
    <div class="skeleton-card" style="width:100%"></div>
    <div class="skeleton-card" style="width:100%"></div>
  </div>
</div>

<div id="modalRoot"></div>

<script>
const API_BASE = 'https://n8n.arosmarket.com/webhook';
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

const urlParams = new URLSearchParams(window.location.search);
const UID = urlParams.get('uid') || tg?.initDataUnsafe?.user?.id?.toString() || '1255605633';

let currentTab = 'filiallar';
let dataCache = null;

let historyKassaId = 18;
let historyDate = (() => { const d = new Date(); d.setDate(d.getDate() - 1); return d.toISOString().split('T')[0]; })();
let historyData = null;

const fmt = n => {
  const num = Math.round(Number(n) || 0);
  return num.toLocaleString('en-US').replaceAll(',', ' ');
};
const fmtShort = n => {
  const num = Number(n) || 0;
  if (num >= 1e9) return (num/1e9).toFixed(2) + ' mlrd';
  if (num >= 1e6) return (num/1e6).toFixed(1) + ' mln';
  if (num >= 1e3) return (num/1e3).toFixed(0) + 'k';
  return fmt(num);
};

const ru2uz = ['Yakshanba','Dushanba','Seshanba','Chorshanba','Payshanba','Juma','Shanba'];
const months = ['yanvar','fevral','mart','aprel','may','iyun','iyul','avgust','sentyabr','oktyabr','noyabr','dekabr'];
function setHeader() {
  const d = new Date();
  document.getElementById('dateText').textContent = `${d.getDate()} ${months[d.getMonth()]}, ${ru2uz[d.getDay()]}`;
}

function fmtDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return `${d.getDate()} ${months[d.getMonth()]}`;
}
function fmtDateShort(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return `${d.getDate()}.${(d.getMonth()+1).toString().padStart(2,'0')}`;
}
function fmtTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return `${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
}

const STATUS_LABELS = {
  overdue: 'Yopilmagan',
  pending: 'Yo\'lda',
  open_today: 'Bugun ochiq',
  closed_done: 'Yopilgan',
  inactive: 'Faol emas'
};

async function loadDashboard() {
  setHeader();
  try {
    const r = await fetch(`${API_BASE}/aros-bugalter-dashboard?uid=${UID}`);
    const data = await r.json();
    
    if (data.error === 'unauthorized') {
      renderError('🚫 Sizga ruxsat yo\'q', 'Telegram ID buxgalter ro\'yxatida emas.');
      return;
    }
    if (!data.kassalar) {
      renderError('⚠️ Ma\'lumot yo\'q', 'Backend hali ma\'lumot tayyorlamagan.');
      return;
    }
    
    dataCache = data;
    render();
  } catch(e) {
    console.error(e);
    renderError('❌ Xato', 'Internet yoki server muammosi.');
  }
}

function renderError(title, msg) {
  document.getElementById('content').innerHTML = `
    <div class="state">
      <div class="state-emoji">${title.split(' ')[0]}</div>
      <div class="state-text"><b>${title.substring(title.indexOf(' ')+1)}</b><br>${msg}</div>
      <button class="state-btn" onclick="loadDashboard()">Qayta yuklash</button>
    </div>`;
}

function render() {
  const d = dataCache;
  
  const heroHTML = `
    <div class="hero-card">
      <div class="hero-label">Jami filiallar va kassalarda</div>
      <div class="hero-amount">${fmt(d.total_kassa_uzs)}<span class="unit">so'm</span></div>
      <div class="hero-divider">
        ${d.kassalar.map(k => `
          <div class="hero-stat">
            <div class="hero-stat-label">${k.title.replace(' Kassa','')}</div>
            <div class="hero-stat-value">${fmtShort(k.total_uzs)}</div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
  
  const overdueCount = d.stats.overdue_count || 0;
  const overdueAmount = d.stats.overdue_total_amount || 0;
  const totalUnsent = d.stats.total_unsent_amount || 0;
  const totalUnsentCount = d.stats.total_unsent_count || 0;
  
  const alertsHTML = `
    <div class="alerts">
      <div class="alert-card ${overdueCount > 0 ? 'red' : 'green'}">
        <div class="alert-header">
          <div class="alert-dot"></div>
          <div class="alert-label">${overdueCount > 0 ? 'Yopilmagan' : 'Hammasi joyida'}</div>
        </div>
        <div class="alert-value">${overdueCount} <span class="total">/ ${d.stats.total_filials}</span></div>
        ${overdueCount > 0 
          ? `<div class="alert-sub-amount">${fmtShort(overdueAmount)} so'm</div>` 
          : '<div class="alert-sub">Filial</div>'}
      </div>
      <div class="alert-card ${totalUnsent > 0 ? 'amber' : 'green'}">
        <div class="alert-header">
          <div class="alert-dot"></div>
          <div class="alert-label">${totalUnsent > 0 ? 'Jo\'natilmagan' : 'Hamma jo\'natilgan'}</div>
        </div>
        <div class="alert-value" style="font-size:18px;line-height:1.2;margin-top:4px">${fmtShort(totalUnsent)}<span style="font-size:11px;font-weight:400;margin-left:3px">so'm</span></div>
        <div class="alert-sub">${totalUnsentCount} ta filial</div>
      </div>
    </div>
  `;
  
  const tabBarHTML = `
    <div class="tabbar">
      <button class="tab ${currentTab==='filiallar'?'active':''}" data-tab="filiallar">Filiallar</button>
      <button class="tab ${currentTab==='kassalar'?'active':''}" data-tab="kassalar">Kassalar</button>
      <button class="tab ${currentTab==='tarix'?'active':''}" data-tab="tarix">Tarix</button>
    </div>
  `;
  
  let listHTML = '';
  if (currentTab === 'filiallar') {
    listHTML = renderFiliallarTab(d);
  } else if (currentTab === 'kassalar') {
    listHTML = d.kassalar.map(k => `
      <div class="kassa-card" data-kassa-id="${k.id}">
        <div class="kassa-name">${k.title}</div>
        <div class="kassa-total">${fmt(k.total_uzs)}<span class="unit">so'm</span></div>
        <div class="kassa-breakdown">
          <div class="kassa-mini"><div class="kassa-mini-label">Naqd</div><div class="kassa-mini-value">${fmtShort(k.cash)}</div></div>
          <div class="kassa-mini"><div class="kassa-mini-label">Click</div><div class="kassa-mini-value">${fmtShort(k.click)}</div></div>
          <div class="kassa-mini"><div class="kassa-mini-label">Payme</div><div class="kassa-mini-value">${fmtShort(k.payme)}</div></div>
          <div class="kassa-mini"><div class="kassa-mini-label">Dollar</div><div class="kassa-mini-value">$${fmt(k.dollar_usd)}</div></div>
        </div>
      </div>
    `).join('');
  } else {
    listHTML = renderHistoryTab();
  }
  
  const updatedAt = d.stats.updated_at ? new Date(d.stats.updated_at) : null;
  const updatedHTML = updatedAt ? `
    <div class="updated-line">
      Yangilandi: ${updatedAt.toLocaleTimeString('uz', {hour:'2-digit',minute:'2-digit'})}
    </div>
  ` : '';
  
  document.getElementById('content').innerHTML = heroHTML + alertsHTML + tabBarHTML + listHTML + updatedHTML;
  
  attachListeners();
  
  if (currentTab === 'tarix') {
    loadHistory();
  }
}

function renderFiliallarTab(d) {
  const overdue = d.filiallar.filter(f => f.status === 'overdue');
  const pending = d.filiallar.filter(f => f.status === 'pending');
  const openToday = d.filiallar.filter(f => f.status === 'open_today');
  const closedDone = d.filiallar.filter(f => f.status === 'closed_done');
  const inactive = d.filiallar.filter(f => f.status === 'inactive');
  
  // Junatilmagan pul bor filiallar (alohida section)
  const withUnsent = d.filiallar.filter(f => f.unsent_count_days > 0 && f.unsent_total_amount > 0);
  
  const renderFilialCard = f => {
    const statusLabel = STATUS_LABELS[f.status] || '';
    const showAmount = f.status === 'overdue' || f.status === 'pending' || f.status === 'open_today';
    const amount = f.current_open_amount || 0;
    
    let statusLine = statusLabel;
    if (f.status === 'overdue') {
      statusLine = `${statusLabel} <span class="days-badge">${f.current_open_days} kun</span>`;
    } else if (f.status === 'open_today' && f.current_open_opened_at) {
      statusLine = `${statusLabel} · ${fmtDate(f.current_open_opened_at)}`;
    }
    
    return `
      <div class="filial-card status-${f.status}" data-id="${f.id}">
        <div class="filial-badge">${f.id}</div>
        <div class="filial-info">
          <div class="filial-name">${f.title}</div>
          <div class="filial-status">${statusLine}</div>
        </div>
        <div class="filial-amount">
          <div class="filial-amount-value">${showAmount && amount > 0 ? fmtShort(amount) : '—'}</div>
          <div class="filial-amount-unit">${showAmount && amount > 0 ? "so'm" : ""}</div>
        </div>
      </div>
    `;
  };
  
  // Junatilmagan kartichka (alohida)
  const renderUnsentCard = f => `
    <div class="unsent-card-only" data-unsent-id="${f.id}">
      <div class="unsent-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2v6m0 0l-3-3m3 3l3-3"/>
          <path d="M3 14h4l2 4h6l2-4h4"/>
          <path d="M3 14v5a2 2 0 002 2h14a2 2 0 002-2v-5"/>
        </svg>
      </div>
      <div class="filial-info">
        <div class="filial-name">${f.title}</div>
        <div class="unsent-label" style="margin-top:2px">${f.unsent_count_days} kunlik · jo'natilmagan</div>
      </div>
      <div class="filial-amount">
        <div class="unsent-amount" style="font-size:14px">${fmtShort(f.unsent_total_amount)}</div>
        <div class="filial-amount-unit">so'm</div>
      </div>
    </div>
  `;
  
  let html = '';
  
  // ⭐ Junatilmagan pul - eng yuqorida alohida section
  if (withUnsent.length > 0) {
    html += '<div class="section-title" style="color:var(--amber)">💰 Filialda turgan pul (' + withUnsent.length + ')</div>';
    html += '<div class="list">' + withUnsent.map(renderUnsentCard).join('') + '</div>';
  }
  
  if (overdue.length > 0) {
    html += '<div class="section-title" style="color:var(--red)">⚠ Yopilmagan (' + overdue.length + ')</div>';
    html += '<div class="list">' + overdue.map(renderFilialCard).join('') + '</div>';
  }
  if (pending.length > 0) {
    html += '<div class="section-title" style="color:var(--amber)">⏳ Yo\'lda (' + pending.length + ')</div>';
    html += '<div class="list">' + pending.map(renderFilialCard).join('') + '</div>';
  }
  if (openToday.length > 0) {
    html += '<div class="section-title">Bugun ochiq (' + openToday.length + ')</div>';
    html += '<div class="list">' + openToday.map(renderFilialCard).join('') + '</div>';
  }
  if (closedDone.length > 0) {
    html += '<div class="section-title">✓ Yopilgan</div>';
    html += '<div class="list">' + closedDone.map(renderFilialCard).join('') + '</div>';
  }
  if (inactive.length > 0) {
    html += '<div class="section-title">Faol emas</div>';
    html += '<div class="list">' + inactive.map(renderFilialCard).join('') + '</div>';
  }
  if (!html) html = '<div class="empty-section">Filial topilmadi</div>';
  
  return html;
}

function attachListeners() {
  document.querySelectorAll('.tab').forEach(t => {
    t.addEventListener('click', () => {
      currentTab = t.dataset.tab;
      render();
    });
  });
  
  document.querySelectorAll('.filial-card').forEach(card => {
    card.addEventListener('click', () => {
      console.log('Filial clicked:', card.dataset.id);
    });
  });
  
  document.querySelectorAll('.unsent-card-only').forEach(card => {
    card.addEventListener('click', () => {
      openUnsentModal(card.dataset.unsentId);
    });
  });
  
  document.querySelectorAll('.kassa-card').forEach(card => {
    card.addEventListener('click', () => {
      console.log('Kassa clicked:', card.dataset.kassaId);
    });
  });
  
  // History controls
  document.querySelectorAll('.kassa-pill').forEach(p => {
    p.addEventListener('click', () => {
      historyKassaId = parseInt(p.dataset.kassaId);
      // ⭐ FIX: Active class ni qo'lda yangilash (rerender o'rniga)
      document.querySelectorAll('.kassa-pill').forEach(x => x.classList.remove('active'));
      p.classList.add('active');
      loadHistory();
    });
  });
  
  const dateInput = document.getElementById('historyDateInput');
  if (dateInput) {
    dateInput.addEventListener('change', (e) => {
      historyDate = e.target.value;
      // Quick btns'ni yangilash
      document.querySelectorAll('.date-quick-btn').forEach(b => b.classList.remove('active'));
      const todayStr = new Date().toISOString().split('T')[0];
      const yesterdayStr = (() => { const d = new Date(); d.setDate(d.getDate() - 1); return d.toISOString().split('T')[0]; })();
      const dayBeforeStr = (() => { const d = new Date(); d.setDate(d.getDate() - 2); return d.toISOString().split('T')[0]; })();
      if (historyDate === todayStr) document.querySelector('[data-offset="0"]')?.classList.add('active');
      else if (historyDate === yesterdayStr) document.querySelector('[data-offset="-1"]')?.classList.add('active');
      else if (historyDate === dayBeforeStr) document.querySelector('[data-offset="-2"]')?.classList.add('active');
      loadHistory();
    });
  }
  
  document.querySelectorAll('.date-quick-btn').forEach(b => {
    b.addEventListener('click', () => {
      const offset = parseInt(b.dataset.offset);
      const d = new Date();
      d.setDate(d.getDate() + offset);
      historyDate = d.toISOString().split('T')[0];
      // Active class
      document.querySelectorAll('.date-quick-btn').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      // Date input ham yangilansin
      const inp = document.getElementById('historyDateInput');
      if (inp) inp.value = historyDate;
      loadHistory();
    });
  });
}

function openUnsentModal(filialId) {
  const f = dataCache.filiallar.find(x => x.id == filialId);
  if (!f || !f.unsent_documents || f.unsent_documents.length === 0) return;
  
  const docs = f.unsent_documents;
  
  const docsHTML = docs.map(doc => `
    <div class="doc-item">
      <div class="doc-day-badge">
        <div class="doc-day-num">${doc.days_old}</div>
        <div class="doc-day-label">kun</div>
      </div>
      <div class="doc-info">
        <div class="doc-date">${fmtDate(doc.closed_at || doc.opened_at)}</div>
        <div class="doc-id">#${doc.id} · yopilgan ${fmtTime(doc.closed_at)}</div>
      </div>
      <div class="doc-amount">
        <div class="doc-amount-val">${fmtShort(doc.plan_to_cachier)}</div>
        <div class="doc-amount-unit">so'm</div>
      </div>
    </div>
  `).join('');
  
  const modalHTML = `
    <div class="modal-backdrop" id="modalBackdrop">
      <div class="modal-sheet">
        <div class="modal-handle"></div>
        <div class="modal-header">
          <div>
            <div class="modal-title">${f.title}</div>
            <div class="modal-subtitle">Filialda turgan pul</div>
          </div>
          <button class="modal-close" id="modalClose">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
          </button>
        </div>
        <div class="modal-body">
          <div class="modal-summary">
            <div class="modal-summary-block">
              <div class="modal-summary-label">Kunlar</div>
              <div class="modal-summary-value">${f.unsent_count_days}</div>
            </div>
            <div class="modal-summary-block" style="text-align:right">
              <div class="modal-summary-label">Jami</div>
              <div class="modal-summary-value">${fmtShort(f.unsent_total_amount)} so'm</div>
            </div>
          </div>
          ${docsHTML}
        </div>
      </div>
    </div>
  `;
  
  document.getElementById('modalRoot').innerHTML = modalHTML;
  
  document.getElementById('modalBackdrop').addEventListener('click', (e) => {
    if (e.target.id === 'modalBackdrop') closeModal();
  });
  document.getElementById('modalClose').addEventListener('click', closeModal);
}

function closeModal() {
  document.getElementById('modalRoot').innerHTML = '';
}

// ============================================================
// HISTORY TAB
// ============================================================
function renderHistoryTab() {
  const kassalar = dataCache.kassalar || [];
  const todayStr = new Date().toISOString().split('T')[0];
  const yesterdayStr = (() => { const d = new Date(); d.setDate(d.getDate() - 1); return d.toISOString().split('T')[0]; })();
  const dayBeforeStr = (() => { const d = new Date(); d.setDate(d.getDate() - 2); return d.toISOString().split('T')[0]; })();
  
  return `
    <div class="history-controls">
      <div class="kassa-selector">
        ${kassalar.map(k => `
          <button class="kassa-pill ${k.id === historyKassaId ? 'active' : ''}" data-kassa-id="${k.id}">
            ${k.title.replace(' Kassa','')}
          </button>
        `).join('')}
      </div>
      <div class="date-input-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <input type="date" class="date-input" id="historyDateInput" value="${historyDate}" max="${todayStr}">
      </div>
      <div class="date-quick">
        <button class="date-quick-btn ${historyDate === todayStr ? 'active' : ''}" data-offset="0">Bugun</button>
        <button class="date-quick-btn ${historyDate === yesterdayStr ? 'active' : ''}" data-offset="-1">Kecha</button>
        <button class="date-quick-btn ${historyDate === dayBeforeStr ? 'active' : ''}" data-offset="-2">2 kun oldin</button>
      </div>
    </div>
    <div id="historyResult">
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
    </div>
  `;
}

async function loadHistory() {
  const result = document.getElementById('historyResult');
  if (!result) return;
  
  result.innerHTML = '<div class="skeleton-card"></div><div class="skeleton-card"></div>';
  
  try {
    const r = await fetch(`${API_BASE}/aros-bugalter-history?cachier_id=${historyKassaId}&date=${historyDate}&uid=${UID}`);
    const data = await r.json();
    
    if (data.error) {
      result.innerHTML = '<div class="empty-section">⚠ Xato: ' + data.error + '</div>';
      return;
    }
    
    historyData = data;
    renderHistoryResult();
  } catch(e) {
    console.error(e);
    result.innerHTML = '<div class="empty-section">❌ Yuklab bo\'lmadi</div>';
  }
}

function renderHistoryResult() {
  const result = document.getElementById('historyResult');
  if (!result) return;
  
  const d = historyData;
  
  if (!d.documents || d.documents.length === 0) {
    result.innerHTML = `
      <div class="empty-section" style="padding:48px 20px">
        <div style="font-size:36px;margin-bottom:10px;opacity:0.4">📭</div>
        <div>Bu kunda hech narsa qabul qilinmagan</div>
      </div>
    `;
    return;
  }
  
  const summaryHTML = `
    <div class="history-summary">
      <div class="history-summary-label">Jami qabul qilingan</div>
      <div class="history-summary-value">${fmtShort(d.total_amount)} so'm</div>
      <div class="history-summary-count">${d.documents_count} ta document</div>
    </div>
  `;
  
  const itemsHTML = d.documents.map(doc => `
    <div class="history-item">
      <div class="history-time">
        <div class="history-time-h">${fmtTime(doc.closed_at)}</div>
        <div class="history-time-d">${fmtDateShort(doc.closed_at)}</div>
      </div>
      <div class="history-info">
        <div class="history-from">${doc.cachier_title}</div>
        <div class="history-meta">#${doc.id} · ochilgan ${fmtDate(doc.opened_at)}</div>
      </div>
      <div class="history-amount">+${fmtShort(doc.seller_total)}</div>
    </div>
  `).join('');
  
  result.innerHTML = summaryHTML + itemsHTML;
}

document.getElementById('refreshBtn').addEventListener('click', loadDashboard);
loadDashboard();
</script>
