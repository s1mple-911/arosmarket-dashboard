<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>AROS</title>
<style>
:root{
  --bg:#0f0f1a;
  --bg2:#1a1a2e;
  --bg3:#252540;
  --border:#2a2a45;
  --text:#f1f5f9;
  --text2:#94a3b8;
  --text3:#475569;
  --green:#22c55e;
  --green2:#16a34a;
  --red:#f87171;
  --red2:#ef4444;
  --amber:#fbbf24;
  --accent:#22c55e;
  --accent2:#16a34a;
  --accent-bg:rgba(34,197,94,.12);
  --accent-border:rgba(34,197,94,.3);
}
[data-theme="light"]{
  --bg:#f5f5f5;
  --bg2:#ffffff;
  --bg3:#f0f0f0;
  --border:#e5e5e5;
  --text:#111111;
  --text2:#555555;
  --text3:#999999;
  --accent:#16a34a;
  --accent2:#15803d;
  --accent-bg:rgba(22,163,74,.1);
  --accent-border:rgba(22,163,74,.3);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px}
.hdr{background:var(--bg2);border-bottom:1px solid var(--border);padding:13px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.av{width:36px;height:36px;border-radius:50%;background:var(--accent-bg);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:var(--accent);border:1.5px solid var(--accent-border);flex-shrink:0}
.hi{flex:1}
.hn{font-size:14px;font-weight:700;color:var(--text)}
.hs{font-size:11px;color:var(--text2);margin-top:1px}
.aros-b{color:var(--accent);font-size:9px;font-weight:800;padding:3px 8px;border-radius:7px;border:1.5px solid var(--accent-border);letter-spacing:.8px}
.tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--border)}
.tab{flex:1;padding:11px 4px 10px;text-align:center;font-size:10px;font-weight:700;color:var(--text3);border-bottom:2px solid transparent;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:4px}
.tab svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab.active svg{stroke:var(--accent)}
.page{display:none;padding:14px;animation:fi .2s ease}
.page.active{display:block}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.progress-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:12px}
.pc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.pc-lbl{font-size:10px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.pc-plan{font-size:17px;font-weight:800;color:var(--text);margin-top:3px}
.pc-pct{font-size:26px;font-weight:800;color:var(--green)}
.pc-bar-bg{background:var(--bg3);border-radius:8px;height:7px;margin-bottom:10px;overflow:hidden}
.pc-bar{background:var(--green);height:100%;border-radius:8px;transition:width .8s ease}
.pc-nums{display:flex;justify-content:space-between;font-size:11px;color:var(--text3)}
.pc-nums b{color:var(--text);font-weight:700}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:13px}
.sc-lbl{font-size:10px;color:var(--text3);font-weight:600;margin-bottom:5px;text-transform:uppercase;letter-spacing:.3px}
.sc-val{font-size:17px;font-weight:800}
.sc-sub{font-size:10px;color:var(--text3);margin-top:3px}
.total-bar{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.tb-lbl{font-size:11px;color:var(--text2);font-weight:600}
.tb-val{font-size:15px;font-weight:800}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.sec-ttl{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px}
.badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px}
.b-red{background:rgba(248,113,113,.15);color:var(--red);border:1px solid rgba(248,113,113,.25)}
.b-amber{background:rgba(251,191,36,.15);color:var(--amber);border:1px solid rgba(251,191,36,.25)}
.client-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:18px;margin-bottom:8px;overflow:hidden;transition:border-color .15s}
.client-card.has-dl{border:1px solid #E24B4A}
.client-main{display:flex;align-items:flex-start;gap:10px;padding:13px 14px;cursor:pointer;-webkit-user-select:none;user-select:none}
.c-av{width:42px;height:42px;border-radius:21px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:var(--text2);flex-shrink:0}
.c-av-red{background:rgba(226,75,74,.15);color:#E24B4A}
.c-av-blue{background:rgba(55,138,221,.15);color:#378ADD}
.c-info{flex:1;min-width:0}
.c-name{font-size:15px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.2px;max-width:100%}
.c-row2{display:flex;align-items:center;gap:5px;margin-top:5px;flex-wrap:wrap}
.c-b{font-size:11px;font-weight:600;padding:2px 7px;border-radius:6px;white-space:nowrap;flex-shrink:0}
.c-b-bp{background:rgba(186,117,23,.15);color:#BA7517}
.c-b-m{background:rgba(55,138,221,.15);color:#185FA5}
.c-b-id{background:var(--bg3);color:var(--text3)}
.c-b-kun{background:rgba(226,75,74,.12);color:#E24B4A}
.c-phone{font-size:11px;color:var(--text3);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.c-right{text-align:right;flex-shrink:0;margin-left:8px;min-width:0}
.c-amt{font-size:14px;font-weight:800;white-space:nowrap;flex-shrink:0}
.c-sub{font-size:10px;color:var(--text3);margin-top:3px}
.call-btn{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1px solid rgba(34,197,94,.35);background:rgba(34,197,94,.1);text-decoration:none;transition:all .15s}
.call-btn svg{width:15px;height:15px;stroke:var(--green);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.call-btn:active{transform:scale(.93)}
.arr{color:var(--text3);font-size:11px;flex-shrink:0;margin-left:4px;min-width:14px;text-align:center;transition:transform .2s}
.arr.open{transform:rotate(180deg)}
.orders-list{background:var(--bg3);max-height:0;overflow:hidden;transition:max-height .5s ease}
.orders-list.expanded{max-height:2000px}
.order-row{display:flex;justify-content:space-between;align-items:center;padding:10px 14px 10px 62px;border-bottom:1px solid var(--border)}
.order-row:last-child{border-bottom:none}
.o-left{display:flex;flex-direction:column;gap:2px}
.o-id{font-size:11px;color:var(--text3);font-weight:500}
.o-deadline{font-size:11px;font-weight:600}
.o-amt{font-size:13px;font-weight:800;white-space:nowrap}
.mini-spin-wrap{padding:12px 14px 12px 62px;display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text3)}
.mini-spinner{width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
.loading{text-align:center;padding:60px 16px;color:var(--text3);font-size:13px}
.spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes brdAmber{0%,100%{border-color:rgba(255,159,10,0.3)}50%{border-color:rgba(255,159,10,0.85)}}
@keyframes brdBlue{0%,100%{border-color:rgba(55,138,221,0.3)}50%{border-color:rgba(55,138,221,0.85)}}
.tr-onway{animation:brdAmber 2s ease-in-out infinite}
.tr-created{animation:brdBlue 2s ease-in-out infinite}
.empty{text-align:center;padding:60px 16px}
.empty-icon{width:48px;height:48px;margin:0 auto 14px;opacity:.3}
.empty-icon svg{width:100%;height:100%;stroke:var(--text2);fill:none;stroke-width:1.5}
.et{font-size:13px;color:var(--text3)}
</style>
</head>
<body>

<div class="hdr">
  <div class="av" id="av">?</div>
  <div class="hi">
    <div class="hn" id="hn">Yuklanmoqda...</div>
    <div class="hs" id="hs">AROS Market</div>
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <div onclick="toggleTheme()" id="themeBtn" style="width:30px;height:30px;border-radius:50%;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;flex-shrink:0">🌙</div>
    
  </div>
</div>

<div class="tabs">
  <div class="tab active" onclick="showTab('dash',this)">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    Dashboard
  </div>
  <div class="tab" onclick="showTab('ochiq',this)">
    <svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
    Ochiq
  </div>
  <div class="tab" onclick="showTab('otgan',this)">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg>
    O'tgan
  </div>
  <div class="tab" onclick="showTab('bugun',this)">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
    Bugun
  </div>
  <div class="tab" onclick="showTab('ertaga',this)">
    <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><path d="M8 14h.01M12 14h.01M16 14h.01M8 18h.01M12 18h.01"/></svg>
    Ertaga
  </div>
</div>

<div id="page-dash" class="page active"><div class="loading"><div class="spinner"></div>Yuklanmoqda...</div></div>
<div id="page-otgan" class="page"><div class="loading"><div class="spinner"></div></div></div>
<div id="page-bugun" class="page"><div class="loading"><div class="spinner"></div></div></div>
<div id="page-ertaga" class="page"><div class="loading"><div class="spinner"></div></div></div>
<div id="page-ochiq" class="page"><div class="loading"><div class="spinner"></div></div></div>

<script>
var DEADLINE_API = 'https://n8n.arosmarket.com/webhook/aros-deadlines-get';
var DEADLINE_SET  = 'https://n8n.arosmarket.com/webhook/aros-deadline-set';
var DEADLINE_OK   = 'https://n8n.arosmarket.com/webhook/aros-deadline-ok';
var STATS_API    = 'https://n8n.arosmarket.com/webhook/aros-cache-stats';
var ORDERS_API   = 'https://n8n.arosmarket.com/webhook/aros-orders';
var FILIAL_API   = 'https://n8n.arosmarket.com/webhook/aros-cache-filial';
var CEO_API      = 'https://n8n.arosmarket.com/webhook/aros-cache-ceo';
var CALENDAR_API = 'https://n8n.arosmarket.com/webhook/aros-cache-calendar';
var OY = ['Yanvar','Fevral','Mart','Aprel','May','Iyun','Iyul','Avgust','Sentabr','Oktabr','Noyabr','Dekabr'];

var uid = new URLSearchParams(window.location.search).get('uid')||'';
var wid = new URLSearchParams(window.location.search).get('wid')||'';
var CEO_IDS = ['1255605633','6414297298','6234108181','1865951955','331245247'];
var isCeo = CEO_IDS.includes(String(uid));
var userData={}, summary={};
var ordersCache={};
var allUsers=[]
var pageDeadlines={};
var otganFinal=[], bugunFinal=[], ertagaFinal=[];
var otganLoaded=false, bugunLoaded=false, ertagaLoaded=false, ochiqLoaded=false;
var otganLoading=false, bugunLoading=false, ertagaLoading=false, ochiqLoading=false;
var filialData=null;

var now=new Date(new Date().getTime()+5*60*60*1000);
var bugunStr=now.toISOString().split('T')[0];
var ertagaStr=new Date(now.getTime()+86400000).toISOString().split('T')[0];

function showTab(t,el){
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');});
  document.querySelectorAll('.tab').forEach(function(tb){tb.classList.remove('active');});
  document.getElementById('page-'+t).classList.add('active');
  el.classList.add('active');
  if(t==='otgan'&&!otganLoaded&&!otganLoading) loadTab('otgan');
  if(t==='bugun'&&!bugunLoaded&&!bugunLoading) loadTab('bugun');
  if(t==='ertaga'&&!ertagaLoaded&&!ertagaLoading) loadTab('ertaga');
  if(t==='ochiq'&&!ochiqLoaded&&!ochiqLoading) loadOchiq();
}

function fmt(n){
  var num=Math.round(Number(n)||0);
  if(num>=1000000000) return (num/1e9).toFixed(1)+' mlrd';
  if(num>=1000000) return (num/1e6).toFixed(1)+' mln';
  if(num>=1000) return (num/1e3).toFixed(0)+' ming';
  return num.toLocaleString();
}
function fmtFull(n){return Math.round(Number(n)||0).toLocaleString('uz-UZ');}
function ini(name){
  if(!name) return '?';
  return name.split(' ').map(function(w){return w[0]||'';}).join('').substring(0,2).toUpperCase();
}

// ===================== DEADLINE (READ-ONLY) =====================
function loadPageDeadlines(warehouseId, cb){
  fetch(DEADLINE_API+'?warehouse_id='+warehouseId)
    .then(function(r){return r.json();})
    .then(function(data){
      var d=Array.isArray(data)?data[0]:data;
      var list=d.deadlines||[];
      pageDeadlines={};
      list.forEach(function(dl){ pageDeadlines[String(dl.user_id)]=dl; });
      if(cb) cb();
    })
    .catch(function(){ if(cb) cb(); });
}

function toggleOrders(id, userId, walletBalance){
  var el=document.getElementById('ol-'+id);
  var ar=document.getElementById('ar-'+id);
  if(!el) return;
  var open=el.classList.contains('expanded');
  if(open){
    el.classList.remove('expanded');
    if(ar){ar.textContent='▾';ar.classList.remove('open');}
    return;
  }
  el.classList.add('expanded');
  if(ar){ar.textContent='▴';ar.classList.add('open');}
  // faqat strictly o'tgan: deadline strictly < bugunStr
  function showOtgan(orders){
    var otg=orders.filter(function(o){return o.deadline&&o.deadline<bugunStr;});
    fillOrders(el,otg,walletBalance);
    var maxK=0;
    otg.forEach(function(o){if((o.kun_otgan||0)>maxK)maxK=o.kun_otgan||0;});
    var kunEl=document.getElementById('kun-'+userId);
    if(kunEl) kunEl.textContent=maxK>0?maxK+' kun':'';
  }
  if(ordersCache[userId]!==undefined){showOtgan(ordersCache[userId]);return;}
  el.innerHTML='<div class="mini-spin-wrap"><div class="mini-spinner"></div>Yuklanmoqda...</div>';
  var _wh=wid||userData.warehouse_id||null;
  var _url=ORDERS_API+'?user_id='+userId;
  if(_wh) _url+='&warehouse_id='+_wh;
  fetch(_url)
    .then(function(r){return r.json();})
    .then(function(data){
      var d=Array.isArray(data)?data[0]:data;
      ordersCache[userId]=d.orders||[];
      showOtgan(ordersCache[userId]);
    })
    .catch(function(e){el.innerHTML='<div class="mini-spin-wrap" style="color:var(--red)">Xato: '+e.message+'</div>';});
}

function toggleInline(id){
  var el=document.getElementById('ol-'+id);
  var ar=document.getElementById('ar-'+id);
  if(!el) return;
  var open=el.classList.contains('expanded');
  if(open){
    el.classList.remove('expanded');
    if(ar){ar.textContent='▾';ar.classList.remove('open');}
  } else {
    el.classList.add('expanded');
    if(ar){ar.textContent='▴';ar.classList.add('open');}
  }
}

function fillOrders(el, orders, walletBalance){
  if(!orders||!orders.length){
    el.innerHTML='<div class="mini-spin-wrap" style="color:var(--text3)">Order topilmadi</div>';return;
  }
  var html='';
  if(walletBalance&&walletBalance>0){
    html+='<div class="order-row" style="background:rgba(34,197,94,.07)">';
    html+='<div class="o-left"><div class="o-id" style="color:var(--green);font-weight:700">Hamyon balansi</div>';
    html+='<div class="o-deadline" style="color:var(--green)">Qarzdan ayiriladi</div></div>';
    html+='<div class="o-amt" style="color:var(--green)">'+fmtFull(walletBalance)+' so\'m</div></div>';
  }
  orders.forEach(function(o){
    var dText=o.deadline+' ('+o.kun_otgan+' kun o\'tgan)';
    html+='<div class="order-row">';
    html+='<div class="o-left"><div class="o-id">Order #'+o.order_id+' · '+(o.sana||'')+'</div>';
    html+='<div class="o-deadline" style="color:var(--red)">'+dText+'</div></div>';
    html+='<div class="o-amt" style="color:var(--red)">'+fmtFull(o.summa)+'</div></div>';
  });
  el.innerHTML=html;
}

function callBtn(tel){
  if(!tel) return '';
  return '<a class="call-btn" href="tel:+'+tel+'" onclick="event.stopPropagation()">'+
    '<svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.95 10.5a19.79 19.79 0 01-3.07-8.67A2 2 0 012.85 0h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L7.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 14.92z"/></svg></a>';
}

function buildCard(r,id,color,lazy,orders){
  var tel=(r.telefon||'').replace(/\D/g,'');
  var clickFn=lazy?('toggleOrders(\''+id+'\','+r.user_id+','+(r.wallet_balance||0)+')'):('toggleInline(\''+id+'\')');
  var dl=pageDeadlines[String(r.user_id)];
  var hasDl=dl&&dl.quyilgan_deadline;
  // Avatar rang
  var avClass=hasDl?'c-av c-av-red':(r.usertype==='master'?'c-av c-av-blue':'c-av');
  // Deadline banner
  var dlHtml='';
  if(hasDl){
    var dlMs=new Date(dl.quyilgan_deadline).getTime()-new Date().getTime();
    var dlExp=dlMs<0;
    var absMs=Math.abs(dlMs);
    var dlDays=Math.floor(absMs/86400000);
    var dlH=Math.floor((absMs%86400000)/3600000);
    var dlM2=Math.floor((absMs%3600000)/60000);
    var dlStr=(dlExp?'- ':'')+(dlDays>0?dlDays+' kun ':'')+dlH+' soat '+dlM2+' daqiqa';
    var dlBg=dlExp?'rgba(163,45,45,.15)':'rgba(226,75,74,.1)';
    var dlBorder=dlExp?'#A32D2D':'#E24B4A';
    var dlColor=dlExp?'#A32D2D':'#E24B4A';
    dlHtml='<div style="background:'+dlBg+';padding:8px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:0.5px solid '+dlBorder+'20" id="idx-dl-bar-'+r.user_id+'" data-dl="'+dl.quyilgan_deadline+'">'+
      '<div style="display:flex;align-items:center;gap:6px">'+
      '<div style="width:6px;height:6px;border-radius:3px;background:'+dlColor+'"></div>'+
      '<span style="font-size:12px;font-weight:700;color:'+dlColor+'">DEADLINE: <span id="idx-dl-cnt-'+r.user_id+'">'+dlStr+'</span></span>'+
      '</div>'+
      '<span style="font-size:12px;font-weight:600;color:'+dlColor+'">'+fmtFull(dl.deadline_summa)+'</span>'+
    '</div>';
  }
  // Badges
  var utag=r.usertype==='master'?'<span class="c-b c-b-m">M</span>':r.usertype==='business_partner'?'<span class="c-b c-b-bp">BP</span>':'';
  var maxKun=lazy?(r.max_kun||0):0;
  if(lazy&&!maxKun&&r.orders&&r.orders.length){
    r.orders.forEach(function(o){if((o.kun_otgan||0)>maxKun)maxKun=o.kun_otgan||0;});
  }
  var kunTag=lazy?(maxKun>0?'<span class="c-b c-b-kun">'+maxKun+' kun</span>':'<span id="kun-'+r.user_id+'" class="c-b c-b-kun"></span>'):'';
  var uidTag='<span class="c-b c-b-id">#'+r.user_id+'</span>';
  // Orders section
  var ordersHtml='<div class="orders-list" id="ol-'+id+'">';
  if(!lazy&&orders&&orders.length){
    ordersHtml+='<div style="height:0.5px;background:var(--border);margin:0 16px"></div>';
    ordersHtml+='<div style="padding:8px 16px 12px 70px">';
    // Hamyon balansi qatori (agar bor bo'lsa) — qarzdan ayiriladi deb ko'rsatish

function renderList(pageId,list,color,badgeClass,emptyIcon,emptyText,lazy){
  var el=document.getElementById(pageId);
  if(!list||!list.length){
    el.innerHTML='<div class="empty"><div class="empty-icon"><svg viewBox="0 0 24 24">'+emptyIcon+'</svg></div><div class="et">'+emptyText+'</div></div>';
    return;
  }
  var total=list.reduce(function(s,r){return s+Number(r.summa||0);},0);
  var html='<div class="total-bar"><div class="tb-lbl">Jami</div>';
  html+='<div class="tb-val" style="color:'+color+'">'+fmtFull(total)+' so\'m</div></div>';
  html+='<div class="sec-hdr"><div class="sec-ttl">Mijozlar</div>';
  html+='<span class="badge '+badgeClass+'">'+list.length+' ta</span></div>';
  // Sorting: deadline borlar birinchi, keyin otgan_summa/summa descending
  list = list.slice().sort(function(a,b){
    var aDl = pageDeadlines[String(a.user_id)] ? 1 : 0;
    var bDl = pageDeadlines[String(b.user_id)] ? 1 : 0;
    if(bDl !== aDl) return bDl - aDl;
    // kun_otgan descending (eng ko'p o'tgan birinchi)
    var aKun = a.max_kun||0;
    var bKun = b.max_kun||0;
    if(bKun !== aKun) return bKun - aKun;
    return Number(b.summa||0) - Number(a.summa||0);
  });
  list.forEach(function(r,i){html+=buildCard(r,pageId+'-'+i,color,lazy,r.orders||[]);});
  el.innerHTML=html;
}

// loadTab - ESKI KOD, o'zgartirilmagan
// =============================================
function loadTab(tab){
  if(tab==='otgan') otganLoading=true;
  else if(tab==='bugun') bugunLoading=true;
  else ertagaLoading=true;

  var pageId='page-'+tab;
  document.getElementById(pageId).innerHTML='<div class="loading"><div class="spinner"></div>Yuklanmoqda...</div>';

  if(!allUsers.length){
    if(tab==='otgan'){otganLoaded=true;otganLoading=false;}
    else if(tab==='bugun'){bugunLoaded=true;bugunLoading=false;}
    else{ertagaLoaded=true;ertagaLoading=false;}
    document.getElementById(pageId).innerHTML='<div class="empty"><div class="empty-icon"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div><div class="et">Qarz yo\'q</div></div>';
    return;
  }

  var resMap={}, done=0, total=allUsers.length;

  function check(){
    done++;
    if(done<total) return;
    var final=Object.values(resMap);
    if(tab==='otgan'){
      otganLoaded=true;otganLoading=false;otganFinal=final;
loadPageDeadlines(userData.warehouse_id||0, function(){
              renderList('page-otgan',final,'var(--red)','b-red',
        '<circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/>',
        'Muddati o\'tgan qarz yo\'q!',true);
      });
    } else if(tab==='bugun'){
      bugunLoaded=true;bugunLoading=false;bugunFinal=final;
      renderList('page-bugun',final,'var(--red)','b-red',
        '<polyline points="20 6 9 17 4 12"/>','Bugun to\'lanadigan qarz yo\'q',false);
    } else {
      ertagaLoaded=true;ertagaLoading=false;ertagaFinal=final;
      renderList('page-ertaga',final,'var(--amber)','b-amber',
        '<polyline points="20 6 9 17 4 12"/>','Ertaga to\'lanadigan qarz yo\'q',false);
    }
    renderDash();
  }

  allUsers.forEach(function(debtor){
    // Cache bor bo'lsa - to'g'ridan ishlatamiz (otgan/bugun/ertaga barchasi)
    var cached=ordersCache[debtor.user_id];
    if(cached!==undefined){
      proc(debtor,cached,tab,resMap);check();return;
    }
    // Cache yo'q - API dan olish (otgan tab uchun ham!)
    var _wh=wid||userData.warehouse_id||null;
    var url=ORDERS_API+'?user_id='+debtor.user_id;
    if(_wh) url+='&warehouse_id='+_wh;
    fetch(url).then(function(r){return r.json();})
      .then(function(d){
        var data=Array.isArray(d)?d[0]:d;
        ordersCache[debtor.user_id]=data.orders||[];
        proc(debtor,data.orders||[],tab,resMap);check();
      }).catch(function(){
        // API xato - otgan_summa fallback
        ordersCache[debtor.user_id]=null;
        proc(debtor,null,tab,resMap);check();
      });
  });
}

// =============================================
// proc - TUZATILDI: hamyon ayirish qo'shildi
// =============================================
function proc(debtor, orders, tab, resMap){
  if(tab==='otgan'){
    if(debtor.user_id===9450) console.log('PROC 9450:', {otgan_summa:debtor.otgan_summa, orders:orders, ordersIsArr:Array.isArray(orders), ordersLen:orders?orders.length:'NULL'});
    // O'TGAN tab: API otgan_summa > 0 bo'lsa, mijoz qo'shiladi
    var apiOtgan=Number(debtor.otgan_summa||0);
    if(apiOtgan<=0){ if(debtor.user_id===9450) console.log('9450 SKIP: apiOtgan<=0'); return; }
    var ordList=orders||[];
    // Order based o'tgan list (eski, deadline o'tib ketgan) - faqat ko'rsatish uchun
    var otgOrders=ordList.filter(function(o){return o.deadline&&o.deadline<bugunStr;});
    var maxK=0;
    otgOrders.forEach(function(o){if((o.kun_otgan||0)>maxK)maxK=o.kun_otgan||0;});
    resMap[debtor.user_id]={
      ism:debtor.ism,telefon:debtor.telefon,summa:apiOtgan,
      wallet_balance:Number(debtor.wallet_balance)||0,
      user_id:debtor.user_id,orders:otgOrders,usertype:debtor.usertype||'',max_kun:maxK
    };
    return;
  }
  // Bugun va ertaga - cache da deadline bo'yicha
  var filtered;
  if(tab==='bugun'){
    filtered=(orders||[]).filter(function(o){return o.deadline===bugunStr;});
  } else {
    filtered=(orders||[]).filter(function(o){return o.deadline===ertagaStr;});
  }
  if(!filtered.length) return;
  var tot=filtered.reduce(function(s,o){return s+Number(o.summa||0);},0);
  var wallet=Number(debtor.wallet_balance)||0;
  var net=Math.max(0, tot-wallet);
  if(net===0) return;
  resMap[debtor.user_id]={
    ism:debtor.ism, telefon:debtor.telefon, summa:net,
    wallet_balance:wallet, user_id:debtor.user_id,
    orders:filtered, usertype:debtor.usertype||''
  };
}

function renderCalendar(d){
  var body = document.getElementById('cal-body');
  var days = d.days||[];
  var oy = d.oy, yil = d.yil;
  var oyKunlari = d.oy_kunlari || 30;
  var kunlikPlan = d.kunlik_plan || 0;
  // Oy boshi qaysi kunga to'g'ri kelishini hisoblaymiz (0=yakshanba, 1=dushanba)
  var firstDay = new Date(yil, oy-1, 1).getDay();
  // Dushanba 1, Yakshanba 7 qilib qayta tartiblaymiz
  var offset = firstDay === 0 ? 6 : firstDay - 1;
  // Har kun uchun data map
  var dayMap = {};
  days.forEach(function(day){ dayMap[day.kun] = day; });
  // Kunlik plan + jami info
  var totalBaj = days.reduce(function(s,x){return s+(x.bajarilgan||0);},0);
  var totalTush = days.reduce(function(s,x){return s+(x.tushum||0);},0);
  var totalRet = days.reduce(function(s,x){return s+(x.qaytarilgan||0);},0);
  var greenCount = days.filter(function(x){return x.status==='green';}).length;
  var amberCount = days.filter(function(x){return x.status==='amber';}).length;
  var redCount = days.filter(function(x){return x.status==='red';}).length;

  var html = '';
  // Info panel
  html += '<div style="background:var(--bg3);border-radius:12px;padding:12px;margin-bottom:14px">';
  html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:12px">';

  html += '<div><div style="color:var(--text3);font-size:10px;text-transform:uppercase;letter-spacing:.3px;margin-bottom:3px">Jami bajarilgan</div><div style="font-weight:700;color:var(--green)">'+fmt(totalBaj)+'</div></div>';
  html += '</div>';
  html += '<div style="display:flex;gap:10px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)">';
  html += '<div style="flex:1;text-align:center"><div style="font-size:16px;font-weight:800;color:var(--green)">'+greenCount+'</div><div style="font-size:9px;color:var(--text3);margin-top:2px">YAXSHI</div></div>';
  html += '<div style="flex:1;text-align:center"><div style="font-size:16px;font-weight:800;color:var(--amber)">'+amberCount+'</div><div style="font-size:9px;color:var(--text3);margin-top:2px">O\'RTACHA</div></div>';
  html += '<div style="flex:1;text-align:center"><div style="font-size:16px;font-weight:800;color:var(--red)">'+redCount+'</div><div style="font-size:9px;color:var(--text3);margin-top:2px">PAST</div></div>';
  html += '</div></div>';
  // Kalendar grid - hafta nomlari
  var haftaKunlari = ['Du','Se','Ch','Pa','Ju','Sh','Ya'];
  html += '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:6px">';
  haftaKunlari.forEach(function(h){
    html += '<div style="text-align:center;font-size:10px;color:var(--text3);font-weight:600;padding:4px 0">'+h+'</div>';
  });
  html += '</div>';
  // Kalendar grid - kunlar
  html += '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px" id="cal-grid">';
  // Boshidagi bo'sh kataklar
  for(var i=0;i<offset;i++){ html += '<div></div>'; }
  // Kunlar
  for(var k=1;k<=oyKunlari;k++){
    var dayData = dayMap[k];
    if(dayData){
      var bg, txtColor;
      if(dayData.status==='green'){ bg='rgba(34,197,94,.18)'; txtColor='var(--green)'; }
      else if(dayData.status==='amber'){ bg='rgba(251,191,36,.18)'; txtColor='#fbbf24'; }
      else{ bg='rgba(255,77,109,.18)'; txtColor='#ff4d6d'; }
      html += '<div onclick="showDayDetail('+k+')" id="cd-'+k+'" style="aspect-ratio:1;background:'+bg+';border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;border:1px solid transparent;transition:border-color .15s" onmouseover="this.style.borderColor=\''+txtColor+'\'" onmouseout="this.style.borderColor=\'transparent\'">';
      html += '<div style="font-size:14px;font-weight:700;color:'+txtColor+'">'+k+'</div>';
      html += '<div style="font-size:9px;color:'+txtColor+';opacity:.8;margin-top:1px">'+(dayData.foiz||0)+'%</div>';
      html += '</div>';
    } else {
      // Kelajak kun
      html += '<div style="aspect-ratio:1;background:var(--bg3);border-radius:10px;display:flex;align-items:center;justify-content:center;opacity:.35"><div style="font-size:13px;color:var(--text3)">'+k+'</div></div>';
    }
  }
  html += '</div>';
  // Legend
  html += '<div style="display:flex;justify-content:center;gap:16px;margin-top:14px;font-size:10px;color:var(--text3)">';
  html += '<div style="display:flex;align-items:center;gap:4px"><div style="width:10px;height:10px;border-radius:3px;background:rgba(34,197,94,.4)"></div>100%+</div>';

  html += '<div style="display:flex;align-items:center;gap:4px"><div style="width:10px;height:10px;border-radius:3px;background:rgba(255,77,109,.4)"></div>&lt;70%</div>';
  html += '</div>';
  // Kun detail placeholder
  html += '<div id="cal-day-detail" style="margin-top:14px"></div>';

  body.innerHTML = html;
  // Day data ni global saqlaymiz
  window._calDays = dayMap;
  window._calKunlikPlan = kunlikPlan;
}

  subtitle.textContent=(filialNomi||'')+' · '+sorted.length+' ta';
  var sLabels={created:'Yaratilgan',on_way:"Yo'lda"};
  var sColors={created:'#378ADD',on_way:'#ff9f0a'};
  var html='';
  sorted.forEach(function(t){
    var color=sColors[t.status]||'var(--text2)';
    var label=sLabels[t.status]||t.status;
    var pulseClass=t.status==='on_way'?'tr-onway':'tr-created';
    var link='https://admin.aros.uz/products-actions/product-transfer/'+t.id;
    var sana=t.status==='created'?t.created_date:t.send_date;
    var sanaLabel=t.status==='created'?'Yaratilgan':'Yuborilgan';
    var kun=t.kun_otgan||0;
    var masulTel=(t.masul_telefon||'').replace(/\D/g,'');
    html+='<a href="'+link+'" style="display:block;text-decoration:none;color:inherit;margin-bottom:6px">';
    html+='<div class="'+pulseClass+'" style="background:var(--bg3);border-radius:10px;padding:8px 10px;border:1px solid '+color+'4D">';
    html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">';
    html+='<div style="display:flex;align-items:center;gap:5px">';
    html+='<span style="font-size:12px;font-weight:700;color:var(--text)">#'+t.id+'</span>';
    html+=(kun>0?'<span style="font-size:9px;font-weight:600;padding:1px 5px;border-radius:4px;background:rgba(255,77,109,.15);color:#ff6b8a">'+kun+' kun</span>':'');
    html+='</div>';
    html+='<span style="font-size:9px;font-weight:600;padding:1px 6px;border-radius:5px;background:'+color+'26;color:'+color+'">'+label+'</span>';
    html+='</div>';
    html+='<div style="display:flex;align-items:center;gap:4px;margin-bottom:6px;font-size:10px">';
    html+='<span style="font-weight:600;flex:1;background:var(--bg2);padding:3px 5px;border-radius:5px;text-align:center;color:var(--text2)">'+(t.from_warehouse||'—')+'</span>';
    html+='<span style="color:var(--text3);flex-shrink:0;font-size:9px">→</span>';
    html+='<span style="font-weight:600;flex:1;background:var(--bg2);padding:3px 5px;border-radius:5px;text-align:center;color:var(--text2)">'+(t.to_warehouse||'—')+'</span>';
    html+='</div>';
    html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">';
    html+='<span style="font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.3px">Summa</span>';
    html+='<div style="display:flex;align-items:center;gap:6px">';
    html+='<span style="font-size:12px;font-weight:700;color:var(--text)">'+fmtFull(t.document_price)+'</span>';
    if(masulTel) html+='<a href="tel:+'+masulTel+'" onclick="event.stopPropagation()" style="background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.3);border-radius:10px;padding:2px 7px;font-size:10px;text-decoration:none;flex-shrink:0">📞</a>';
    html+='</div>';
    html+='</div>';
    if(t.comment) html+='<div style="margin-bottom:6px;padding:5px 8px;background:var(--bg2);border-radius:6px;font-size:10px;color:var(--text3);font-style:italic">💬 '+t.comment+'</div>';
    html+='<div style="padding-top:6px;border-top:0.5px solid var(--border);display:flex;justify-content:space-between;align-items:center">';
    html+='<span style="font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.3px">'+sanaLabel+'</span>';
    html+='<span style="font-size:10px;font-weight:600;color:var(--text2)">'+(sana||'—')+'</span>';
    html+='</div>';
    html+='</div></a>';
  });
  list.innerHTML=html||'<div style="text-align:center;color:var(--text3);padding:20px">Transfer yo\'q</div>';
  modal.style.display='flex';
}

</script>

<!-- DEADLINE MODAL -->
<div id="dl-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:400;align-items:center;justify-content:center;padding:20px">
  <div style="background:var(--bg2);border-radius:20px;padding:20px;width:100%;max-width:360px;border:1px solid var(--border)">
    <div style="font-size:14px;font-weight:800;margin-bottom:4px" id="dl-ism"></div>
    <div style="font-size:12px;color:var(--text3);margin-bottom:12px">Jami qarz: <span id="dl-summa" style="color:var(--red);font-weight:800"></span></div>
    <input type="hidden" id="dl-user-id">
    <input type="hidden" id="dl-total-summa">
    <div style="margin-bottom:12px">
      <label style="font-size:11px;color:var(--text3);font-weight:700;text-transform:uppercase;display:block;margin-bottom:6px">Deadline summasi</label>
      <input type="number" id="dl-qarz-summa" placeholder="Summa (so'm)" style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--text);font-size:14px;outline:none;font-family:inherit">
    </div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;padding:10px;background:var(--bg3);border-radius:10px">
      <input type="checkbox" id="dl-all" onchange="dlAllToggle(this)" style="width:18px;height:18px;cursor:pointer">
      <label for="dl-all" style="font-size:13px;font-weight:600;cursor:pointer">Hammasi — barcha qarzga deadline</label>
    </div>
    <div style="margin-bottom:12px">
      <label style="font-size:11px;color:var(--text3);font-weight:700;text-transform:uppercase;display:block;margin-bottom:6px">Deadline sanasi</label>
      <input type="date" id="dl-date" style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--text);font-size:14px;outline:none;font-family:inherit">
    </div>
    <div style="margin-bottom:16px">
      <label style="font-size:11px;color:var(--text3);font-weight:700;text-transform:uppercase;display:block;margin-bottom:6px">Vaqt</label>
      <input type="time" id="dl-time" style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--text);font-size:14px;outline:none;font-family:inherit">
    </div>
    <div style="display:flex;gap:10px">
      <button onclick="closeDlModal()" style="flex:1;padding:12px;border-radius:12px;background:var(--bg3);border:1px solid var(--border);color:var(--text2);font-size:13px;font-weight:700;cursor:pointer">Bekor</button>
      <button onclick="saveDlModal()" style="flex:2;padding:12px;border-radius:12px;background:#ff4d6d;border:none;color:#fff;font-size:13px;font-weight:800;cursor:pointer">⏰ Deadline qo'y</button>
    </div>
  </div>
</div>

<!-- TRANSFERS MODAL -->

  <div style="background:var(--bg2);border-radius:22px 22px 0 0;width:100%;max-height:80vh;overflow-y:auto;border-top:1px solid var(--border)">
    <div style="padding:16px 16px 0;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--bg2);border-bottom:1px solid var(--border);padding-bottom:12px">
      <div>
        <div style="font-size:15px;font-weight:700">Ochiq transferlar</div>
        <div style="font-size:12px;color:var(--text3);margin-top:2px" id="tr-subtitle"></div>
      </div>
      <button onclick="document.getElementById('tr-modal').style.display='none'" style="background:var(--bg3);border:none;width:30px;height:30px;border-radius:15px;font-size:16px;color:var(--text2);cursor:pointer">✕</button>
    </div>
    <div id="tr-list" style="padding:12px 16px 24px"></div>

</div>

<div id="cal-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:600;align-items:flex-end;justify-content:center">
  <div style="background:var(--bg2);border-radius:22px 22px 0 0;width:100%;max-height:85vh;overflow-y:auto;border-top:1px solid var(--border)">
    <div style="padding:16px 16px 0;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--bg2);border-bottom:1px solid var(--border);padding-bottom:12px;z-index:10">
      <div>
        <div style="font-size:15px;font-weight:700" id="cal-title">Kalendar</div>
        <div style="font-size:12px;color:var(--text3);margin-top:2px" id="cal-subtitle"></div>
      </div>
      <button onclick="document.getElementById('cal-modal').style.display='none'" style="background:var(--bg3);border:none;width:30px;height:30px;border-radius:15px;font-size:16px;color:var(--text2);cursor:pointer">✕</button>
    </div>
    <div id="cal-body" style="padding:12px 16px 24px"></div>
  </div>
</div>
