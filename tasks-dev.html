<style>
:root {
  --bg: #0a0e1a; --surface: #131829; --surface-2: #1a2138; --border: #252d47;
  --text: #e7eaf3; --text-dim: #8b94b5; --primary: #4f8cff; --primary-dim: #2d5fb5;
  --green: #34d399; --red: #f87171; --amber: #fbbf24; --purple: #a78bfa; --grey: #64748b;
  --new: #4f8cff; --inprogress: #fbbf24; --completed: #34d399; --cancelled: #64748b;
  --urgent: #f87171; --normal: #fbbf24; --low: #64748b;
  --shadow: 0 4px 16px rgba(0,0,0,0.4);
}
[data-theme="light"] {
  --bg: #f5f7fb; --surface: #ffffff; --surface-2: #f0f3f9; --border: #e2e8f0;
  --text: #1a1f36; --text-dim: #64748b;
  --shadow: 0 2px 8px rgba(0,0,0,0.08);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; min-height: 100vh; font-size: 14px; }

/* Header */
.hdr { position: sticky; top: 0; z-index: 90; background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 14px; display: flex; align-items: center; gap: 10px; }
.hdr-back { width: 36px; height: 36px; border-radius: 10px; background: var(--surface-2); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 18px; border: none; color: var(--text); }
.hdr-title { flex: 1; font-size: 17px; font-weight: 600; }
.hdr-btn { background: var(--primary); color: white; border: none; padding: 8px 14px; border-radius: 10px; font-weight: 600; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 4px; }

/* Filter strip */
.filters { padding: 10px 14px; display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; background: var(--surface); border-bottom: 1px solid var(--border); }
.filters::-webkit-scrollbar { display: none; }
.filter-chip { background: var(--surface-2); color: var(--text-dim); border: 1px solid var(--border); padding: 6px 12px; border-radius: 16px; font-size: 12px; white-space: nowrap; cursor: pointer; }
.filter-chip.active { background: var(--primary); color: white; border-color: var(--primary); }
.filter-chip .cnt { background: rgba(255,255,255,0.2); padding: 1px 6px; border-radius: 8px; margin-left: 4px; font-size: 11px; }

/* Tab strip */
.tabs { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 61px; z-index: 80; }
.tab { flex: 1; padding: 12px 8px; text-align: center; font-size: 13px; font-weight: 500; color: var(--text-dim); cursor: pointer; border-bottom: 2px solid transparent; }
.tab.active { color: var(--primary); border-bottom-color: var(--primary); }

/* Content */
.content { padding: 14px; padding-bottom: 80px; }
.empty { text-align: center; padding: 60px 20px; color: var(--text-dim); }
.empty-emoji { font-size: 48px; margin-bottom: 12px; }
.loading { text-align: center; padding: 40px; color: var(--text-dim); }

/* Task card */
.task-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 14px; margin-bottom: 10px; cursor: pointer; transition: transform 0.1s; box-shadow: var(--shadow); }
.task-card:active { transform: scale(0.99); }
.task-card.urgent { border-left: 3px solid var(--urgent); }
.task-card.overdue { background: rgba(248, 113, 113, 0.05); border-color: var(--red); }
.tc-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 6px; }
.tc-title { font-weight: 600; font-size: 14px; line-height: 1.35; flex: 1; }
.tc-status { font-size: 11px; padding: 2px 8px; border-radius: 6px; font-weight: 600; white-space: nowrap; }
.tc-status.new { background: rgba(79,140,255,0.15); color: var(--new); }
.tc-status.in_progress { background: rgba(251,191,36,0.15); color: var(--inprogress); }
.tc-status.completed { background: rgba(52,211,153,0.15); color: var(--completed); }
.tc-status.cancelled { background: rgba(100,116,139,0.15); color: var(--cancelled); }
.tc-meta { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-dim); flex-wrap: wrap; margin-top: 6px; }
.tc-meta-item { display: flex; align-items: center; gap: 3px; }
.tc-priority { display: inline-block; width: 6px; height: 6px; border-radius: 50%; }
.tc-priority.urgent { background: var(--urgent); }
.tc-priority.normal { background: var(--normal); }
.tc-priority.low { background: var(--low); }
.tc-progress { background: var(--surface-2); height: 4px; border-radius: 2px; overflow: hidden; margin-top: 8px; }
.tc-progress-bar { height: 100%; background: var(--green); transition: width 0.3s; }
.tc-assigned { color: var(--text-dim); font-size: 12px; margin-top: 4px; }
.tc-deadline { font-weight: 500; }
.tc-deadline.overdue { color: var(--red); }
.tc-deadline.soon { color: var(--amber); }

/* Kanban */
.kanban-wrap { overflow-x: auto; padding: 14px; padding-bottom: 80px; }
.kanban { display: flex; gap: 12px; min-width: max-content; }
.kanban-col { flex-shrink: 0; width: 280px; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 12px; max-height: calc(100vh - 200px); display: flex; flex-direction: column; }
.kanban-col-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
.kanban-col-title { font-weight: 600; font-size: 14px; }
.kanban-col-cnt { background: var(--surface-2); padding: 2px 8px; border-radius: 8px; font-size: 11px; color: var(--text-dim); }
.kanban-col-list { overflow-y: auto; flex: 1; padding-right: 4px; }
.kanban-col-list .task-card { padding: 10px; margin-bottom: 8px; }
.kanban-col-list .tc-title { font-size: 13px; }

/* Calendar */
.cal-wrap { padding: 14px; padding-bottom: 80px; }
.cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; padding: 0 4px; }
.cal-month-title { font-size: 15px; font-weight: 600; }
.cal-nav-btn { width: 36px; height: 36px; border-radius: 10px; background: var(--surface); border: 1px solid var(--border); color: var(--text); font-size: 16px; cursor: pointer; }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
.cal-dow { text-align: center; font-size: 11px; color: var(--text-dim); padding: 6px 0; font-weight: 600; }
.cal-day { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 6px; min-height: 70px; cursor: pointer; position: relative; transition: transform 0.1s; }
.cal-day:active { transform: scale(0.97); }
.cal-day.other { opacity: 0.3; }
.cal-day.today { border-color: var(--primary); border-width: 2px; }
.cal-day.has-tasks { background: var(--surface-2); }
.cal-day-num { font-size: 13px; font-weight: 600; }
.cal-day-tasks { display: flex; flex-direction: column; gap: 2px; margin-top: 4px; }
.cal-day-task { background: var(--primary); color: white; border-radius: 4px; padding: 1px 4px; font-size: 9px; line-height: 1.4; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.cal-day-task.urgent { background: var(--urgent); }
.cal-day-task.completed { opacity: 0.5; text-decoration: line-through; }

/* Floating Action Button */
.fab { position: fixed; bottom: 20px; right: 20px; width: 56px; height: 56px; border-radius: 50%; background: var(--primary); color: white; border: none; font-size: 28px; box-shadow: 0 6px 16px rgba(79,140,255,0.4); cursor: pointer; z-index: 95; display: flex; align-items: center; justify-content: center; }
.fab:active { transform: scale(0.95); }

/* Modal */
.modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200; display: none; align-items: flex-end; justify-content: center; }
.modal-bg.show { display: flex; }
.modal { background: var(--surface); border-radius: 16px 16px 0 0; width: 100%; max-width: 600px; max-height: 92vh; overflow-y: auto; padding: 16px; padding-bottom: 30px; box-shadow: var(--shadow); }
@media (min-width: 768px) {
  .modal-bg { align-items: center; }
  .modal { border-radius: 16px; max-height: 85vh; }
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
.modal-title { font-size: 16px; font-weight: 600; }

.form-input, .form-textarea, .form-select { width: 100%; background: var(--surface-2); border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; color: var(--text); font-size: 14px; font-family: inherit; }
.form-textarea { resize: vertical; min-height: 70px; }
.form-input:focus, .form-textarea:focus, .form-select:focus { outline: none; border-color: var(--primary); }
.form-radio-row { display: flex; gap: 8px; }
.form-radio { flex: 1; padding: 8px 10px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 10px; text-align: center; font-size: 13px; cursor: pointer; }
.form-radio.active { background: var(--primary); color: white; border-color: var(--primary); }
.form-priority-row { display: flex; gap: 6px; }
.form-priority { flex: 1; padding: 8px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 10px; text-align: center; font-size: 12px; cursor: pointer; font-weight: 500; }
.form-priority.active { color: white; font-weight: 600; }
.form-priority.active.urgent { background: var(--urgent); border-color: var(--urgent); }
.form-priority.active.normal { background: var(--amber); border-color: var(--amber); }
.form-priority.active.low { background: var(--low); border-color: var(--low); }
.prio-picker { display: flex; align-items: center; gap: 12px; }
.prio-badge { flex-shrink: 0; width: 42px; height: 42px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 800; color: #fff; background: var(--amber); transition: background .15s; }
.prio-range { flex: 1; accent-color: var(--accent); height: 6px; }
.prio-hint { font-size: 11px; color: var(--text-dim); margin-top: 6px; }
.tc-plevel { display: inline-flex; align-items: center; justify-content: center; min-width: 18px; height: 18px; padding: 0 4px; border-radius: 6px; font-size: 10px; font-weight: 700; color: #fff; }
.filter-bar { display: flex; gap: 8px; flex-wrap: wrap; padding: 10px 14px; align-items: center; }

.filter-bar .sort-btn { padding: 7px 12px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 9px; color: var(--text); font-size: 12px; cursor: pointer; font-weight: 600; }
.filter-bar .sort-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.kanban-col-list.drag-over { background: rgba(79,140,255,0.12); border-radius: 10px; }

.form-check { display: flex; align-items: center; gap: 8px; cursor: pointer; }

.subtask-row button { width: 32px; height: 32px; border-radius: 8px; background: var(--surface-2); border: 1px solid var(--border); color: var(--red); cursor: pointer; font-size: 16px; }
.btn-add-subtask { width: 100%; padding: 8px; background: var(--surface-2); border: 1px dashed var(--border); border-radius: 8px; color: var(--text-dim); font-size: 13px; cursor: pointer; margin-top: 4px; }
.btn-primary { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 10px; }
.btn-secondary { width: 100%; padding: 10px; background: var(--surface-2); color: var(--text); border: 1px solid var(--border); border-radius: 10px; font-size: 13px; cursor: pointer; margin-top: 6px; }
.btn-danger { width: 100%; padding: 10px; background: rgba(248,113,113,0.15); color: var(--red); border: 1px solid var(--red); border-radius: 10px; font-size: 13px; cursor: pointer; margin-top: 6px; }

/* Detail modal sections */
.detail-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
.detail-meta-item { background: var(--surface-2); padding: 8px 10px; border-radius: 10px; }
.detail-meta-label { font-size: 11px; color: var(--text-dim); margin-bottom: 2px; }

/* Status history */

/* Attachments */
.attach-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; background: var(--surface-2); border-radius: 10px; margin-bottom: 6px; text-decoration: none; color: var(--text); }

.attach-name { flex: 1; font-size: 13px; }

/* Toast */
.toast { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); background: var(--surface); border: 1px solid var(--border); padding: 10px 16px; border-radius: 10px; font-size: 13px; z-index: 1000; box-shadow: var(--shadow); display: none; }
.toast.show { display: block; }
.toast.success { color: var(--green); border-color: var(--green); }
.toast.error { color: var(--red); border-color: var(--red); }

/* Deadline quick buttons */
.deadline-quick { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
.dl-quick-btn { background: var(--surface-2); border: 1px solid var(--border); color: var(--text); padding: 7px 12px; border-radius: 18px; font-size: 12px; cursor: pointer; font-weight: 500; transition: all 0.12s; }
.dl-quick-btn:active { transform: scale(0.95); }
.dl-quick-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
.dl-quick-btn.clear { color: var(--red); border-color: rgba(248,113,113,0.3); }

/* Employee search + multi-select */
.emp-search-wrap { position: relative; }
.emp-search-wrap .form-input { padding-left: 34px; }

.chips-row:empty { display: none; }
.chip { display: inline-flex; align-items: center; gap: 5px; background: var(--primary); color: white; padding: 5px 8px 5px 11px; border-radius: 16px; font-size: 12px; font-weight: 500; }

/* No-access screen */

<script>
// ============ CONFIG ============
const API_BASE = 'https://n8n.arosmarket.com/webhook';
const TASKS_LIST = API_BASE + '/aros-tasks-list';
const TASK_DETAIL = API_BASE + '/aros-task-detail';
const TASK_CREATE = API_BASE + '/aros-task-add';
const TASK_UPDATE = API_BASE + '/aros-task-update';
const TASK_STATUS = API_BASE + '/aros-task-status';
const TASK_COMMENT = API_BASE + '/aros-task-comment';
const TASK_SUBTASK = API_BASE + '/aros-task-subtask-toggle';
const TASK_DELETE = API_BASE + '/aros-task-delete';
const TASKS_LOOKUP = API_BASE + '/aros-tasks-lookup';

const CEO_IDS = ['1255605633', '8236030365', '1432724', '1373701411', '331245247'];
const STATS_API = API_BASE + '/aros-cache-stats';
const APP_VERSION = 'vGET-3 (2026-06-25, prioritet 1-10 + kanban drag + subtasklar)';
console.log('%c📋 AROS TASKS ' + APP_VERSION, 'background:#4f8cff;color:#fff;padding:4px 8px;border-radius:4px;font-weight:bold;');
console.log('Create/Update/Comment/Notify = GET. Agar bu xabarni ko\'rmasangiz — eski versiya cache\'da.');

// ============ STATE ============
const tg = window.Telegram && window.Telegram.WebApp;
if (tg) { tg.ready(); tg.expand(); }

const urlParams = new URLSearchParams(window.location.search);
let UID = urlParams.get('uid') || (tg && tg.initDataUnsafe && tg.initDataUnsafe.user && tg.initDataUnsafe.user.id ? String(tg.initDataUnsafe.user.id) : '');
// PWA: home screen'dan ochilganda URL'da uid bo'lmaydi — localStorage'dan olamiz
try {
  if (UID) { localStorage.setItem('aros_tasks_uid', UID); }
  else { UID = localStorage.getItem('aros_tasks_uid') || ''; }
} catch (e) {}
const IS_CEO = CEO_IDS.indexOf(UID) !== -1;
let MY_WAREHOUSE_ID = null;

let currentTab = 'list'; // list / kanban / calendar
let currentFilter = { status: '', priority: '', assignee: '', warehouse: '' };
let filterEmployee = ''; // telegram_id to filter list+kanban by
let prioritySort = 'none'; // none / asc / desc
let allTasks = [];
let counts = { new: 0, in_progress: 0, completed: 0, cancelled: 0, overdue: 0 };
let hodimlar = [];
let filiallar = [];
let assignType = 'employee';
let editingId = null;
let calMonth = 0, calYear = 0;
let selectedEmployees = []; // [{telegram_id, ism, warehouse_name}]
let empSearchTerm = '';
const TASK_NOTIFY = API_BASE + '/aros-task-notify-internal';

// ============ PWA O'RNATISH ============
let _deferredPrompt = null;

// Service worker — installability (WebAPK / fullscreen) uchun shart.
// Faqat PWA build (manifest bor) da ro'yxatdan o'tkazamiz; mavjud sw.js ni qayta ishlatamiz.
if ('serviceWorker' in navigator && document.querySelector('link[rel="manifest"]')) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('sw.js').catch(function() {
      // sw.js bo'lmasa yoki xato — install baribir menyu orqali ishlaydi
    });
  });
}

function isStandalone() {
  return (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches)
      || (window.matchMedia && window.matchMedia('(display-mode: fullscreen)').matches)
      || window.navigator.standalone === true;
}
function isInTelegram() { return !!(tg && tg.initData && tg.initData.length > 0); }
function isIOS() { return /iphone|ipad|ipod/i.test(navigator.userAgent || ''); }
function pwaDismissedRecently() {
  try {
    if (localStorage.getItem('aros_pwa_installed') === '1') return true;
    const dis = Number(localStorage.getItem('aros_pwa_dismissed') || 0);
    return dis && (Date.now() - dis) < 24*60*60*1000;
  } catch(e) { return false; }
}

// Android Chrome: prompt tayyor bo'lganda banner ko'rsatamiz (tugma bosilsa TO'G'RIDAN-TO'G'RI o'rnatadi)
window.addEventListener('beforeinstallprompt', function(e) {
  e.preventDefault();
  _deferredPrompt = e;
  if (!isInTelegram() && !isStandalone() && !pwaDismissedRecently()) {
    showPWABanner('android');
  }
});
window.addEventListener('appinstalled', function() {
  _deferredPrompt = null;
  const b = document.getElementById('pwaBanner'); if (b) b.remove();
  try { localStorage.setItem('aros_pwa_installed', '1'); } catch(e) {}
});

function initPWAInstall() {
  if (isInTelegram() || isStandalone() || pwaDismissedRecently()) return;
  // iOS — beforeinstallprompt yo'q, qo'llanma bilan banner
  if (isIOS()) { setTimeout(function(){ showPWABanner('ios'); }, 1200); }
  // Android — beforeinstallprompt event o'zi banner ko'rsatadi (yuqorida)
}

function showPWABanner(mode) {
  if (document.getElementById('pwaBanner')) return;
  const banner = document.createElement('div');
  banner.id = 'pwaBanner';
  banner.style.cssText = 'position:fixed;left:0;right:0;bottom:0;z-index:9999;background:var(--surface);border-top:2px solid var(--primary);box-shadow:0 -6px 24px rgba(0,0,0,.35);padding:16px 16px calc(16px + env(safe-area-inset-bottom));animation:pwaUp .25s ease';
  const subtitle = mode === 'ios'
    ? 'Native ilova kabi ishlashi uchun bosh ekranga qo\'shing'
    : 'Bir bosishda telefoningizga o\'rnating — native ilova kabi';
  banner.innerHTML =
    '<div style="display:flex;align-items:center;gap:12px;max-width:520px;margin:0 auto">'
    + '<div style="width:46px;height:46px;border-radius:12px;background:var(--primary);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0">📋</div>'
    + '<div style="flex:1;min-width:0">'
    + '<div style="font-size:14px;font-weight:700;color:var(--text)">Vazifalar ilovasi</div>'
    + '<div style="font-size:12px;color:var(--text-dim);margin-top:2px">' + subtitle + '</div>'
    + '</div>'
    + '</div>'
    + '<div id="pwaIosHint" style="display:none;font-size:12.5px;color:var(--text);margin-top:10px;line-height:1.6;background:var(--surface-2);padding:11px 13px;border-radius:10px">📲 Safari pastidagi <b>Ulashish</b> (⬆️) tugmasini bosing → pastga aylantirib <b>"Bosh ekranga qo\'shish"</b> ni tanlang</div>'
    + '<div style="display:flex;gap:8px;margin-top:12px;max-width:520px;margin-left:auto;margin-right:auto">'
    + '<button id="pwaLater" style="flex:1;padding:12px;border-radius:10px;border:1px solid var(--border);background:var(--surface-2);color:var(--text);font-weight:600;font-size:13px;cursor:pointer">Keyinroq</button>'

// ============ INIT ============
async function init() {
  const theme = localStorage.getItem('aros-theme') || 'dark';
  document.body.setAttribute('data-theme', theme);
  
  // PWA o'rnatish taklifi (faqat brauzerda, Telegram ichida emas)
  initPWAInstall();
  
  if (!UID) {
    document.getElementById('root').innerHTML = '<div class="no-access"><div class="no-access-emoji">🔒</div><h2>UID kerak</h2><p>Iltimos Telegram bot orqali ochilgan tugmadan foydalaning.</p></div>';
    return;
  }
  
  // Update title based on role
  if (!IS_CEO) {
    document.querySelector('.hdr-title').textContent = '📋 Mening vazifalarim';
    document.querySelector('.hdr-btn').style.display = 'none';
  } else {
    document.getElementById('fab').style.display = 'flex';
  }
  
  const now = new Date(new Date().getTime() + 5*60*60*1000);
  calMonth = now.getUTCMonth();
  calYear = now.getUTCFullYear();
  
  renderShell();
  
  // For hodim — fetch warehouse_id from stats API
  if (!IS_CEO) {
    try {
      const r = await fetch(STATS_API + '?uid=' + UID);
      const d = await r.json();

    } catch (e) { console.warn('Stats fetch failed', e); }
  } else {
    await loadLookup();
  }
  await loadTasks();
}

function renderFilters() {

function setFilter(key, val) {
  currentFilter[key] = val;

  renderTabContent();
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));

}

// ============ DATA ============
async function loadLookup() {
  try {
    const r = await fetch(TASKS_LOOKUP + '?uid=' + UID);
    const d = await r.json();
    if (d.ok) {
      hodimlar = d.hodimlar || [];
      filiallar = d.filiallar || [];
    }
  } catch (e) {
    console.warn('Lookup failed', e);
  }
}

async function loadTasks() {
  try {
    let url;
    if (IS_CEO) {
      url = TASKS_LIST + '?role=ceo&uid=' + UID;
    } else {
      url = TASKS_LIST + '?role=hodim&uid=' + UID + (MY_WAREHOUSE_ID ? '&warehouse_id=' + MY_WAREHOUSE_ID : '');
    }
    const r = await fetch(url);
    const d = await r.json();
    if (d.ok) {
      allTasks = d.tasks || [];
      counts = d.counts || counts;
      renderFilters();
      renderTabContent();
    } else {
      toast('Xato: ' + (d.error || 'noma\'lum'), 'error');
    }
  } catch (e) {
    toast('Server bilan aloqa yo\'q', 'error');
    console.error(e);
  }
}

function filteredTasks() {
  let list = allTasks.filter(t => {
    if (currentFilter.status && t.status !== currentFilter.status) return false;
    if (currentFilter.priority && t.priority !== currentFilter.priority) return false;
    if (currentFilter.assignee && String(t.assigned_to_telegram_id) !== currentFilter.assignee) return false;
    if (currentFilter.warehouse && String(t.assigned_to_warehouse_id) !== currentFilter.warehouse) return false;
    if (filterEmployee && String(t.assigned_to_telegram_id) !== filterEmployee) return false;
    return true;
  });
  if (prioritySort === 'asc') list = list.slice().sort((a,b) => (a.priority_level||5) - (b.priority_level||5));
  else if (prioritySort === 'desc') list = list.slice().sort((a,b) => (b.priority_level||5) - (a.priority_level||5));
  return list;
}

// Filter bar HTML (employee dropdown + priority sort toggle) — shared by list & kanban
function filterBarHTML() {
  const emps = hodimlar.slice().sort((a,b) => String(a.ism||'').localeCompare(String(b.ism||'')));
  const opts = emps.map(h => `<option value="${h.telegram_id}" ${filterEmployee===String(h.telegram_id)?'selected':''}>${escapeHtml(h.ism || ('#'+h.telegram_id))}</option>`).join('');
  const sortLabel = prioritySort === 'asc' ? '🔼 Prioritet (1→10)' : (prioritySort === 'desc' ? '🔽 Prioritet (10→1)' : '↕️ Prioritet');
  return `
    <div class="filter-bar">
      <select onchange="setFilterEmployee(this.value)">
        <option value="">👥 Barcha hodimlar</option>
        ${opts}
      </select>
      <div class="sort-btn ${prioritySort!=='none'?'active':''}" onclick="cyclePrioritySort()">${sortLabel}</div>
      ${(filterEmployee || prioritySort!=='none') ? `<div class="sort-btn" onclick="clearTaskFilters()">✕ Tozalash</div>` : ''}
    </div>`;
}
function setFilterEmployee(v) { filterEmployee = v; renderTabContent(); }
function cyclePrioritySort() { prioritySort = prioritySort === 'none' ? 'asc' : (prioritySort === 'asc' ? 'desc' : 'none'); renderTabContent(); }
function clearTaskFilters() { filterEmployee = ''; prioritySort = 'none'; renderTabContent(); }

// ============ RENDERERS ============
function renderTabContent() {
  if (currentTab === 'list') renderList();
  else if (currentTab === 'kanban') renderKanban();
  else if (currentTab === 'calendar') renderCalendar();
}

function renderList() {
  const tasks = filteredTasks();
  const bar = filterBarHTML();
  if (tasks.length === 0) {
    document.getElementById('tabContent').innerHTML = `${bar}<div class="content"><div class="empty"><div class="empty-emoji">📭</div><div>Vazifalar yo'q</div></div></div>`;
    return;
  }
  document.getElementById('tabContent').innerHTML = `${bar}<div class="content">${tasks.map(taskCardHTML).join('')}</div>`;
}

function renderKanban() {
  const tasks = filteredTasks();
  const cols = [
    { key: 'new', title: '🆕 Yangi' },
    { key: 'in_progress', title: '⚙️ Jarayonda' },
    { key: 'completed', title: '✅ Tugagan' },

    ${filterBarHTML()}

            <div class="kanban-col">

// ============ KANBAN DRAG & DROP ============
let draggedTaskId = null;
function onCardDragStart(e, id) {
  draggedTaskId = id;
  if (e.currentTarget) e.currentTarget.classList.add('dragging');
  if (e.dataTransfer) { e.dataTransfer.effectAllowed = 'move'; try { e.dataTransfer.setData('text/plain', String(id)); } catch(_){} }
}
function onCardDragEnd(e) {
  if (e.currentTarget) e.currentTarget.classList.remove('dragging');
  document.querySelectorAll('.kanban-col-list.drag-over').forEach(el => el.classList.remove('drag-over'));
}
function onColDragOver(e) {
  e.preventDefault();
  if (e.dataTransfer) e.dataTransfer.dropEffect = 'move';
  const col = e.currentTarget;
  if (col && !col.classList.contains('drag-over')) col.classList.add('drag-over');
}
function onColDragLeave(e) {
  const col = e.currentTarget;
  if (col && !col.contains(e.relatedTarget)) col.classList.remove('drag-over');
}
async function onColDrop(e, newStatus) {
  e.preventDefault();
  const col = e.currentTarget;
  if (col) col.classList.remove('drag-over');
  const id = draggedTaskId;
  draggedTaskId = null;
  if (!id) return;
  const task = allTasks.find(t => t.id === id);
  if (!task || task.status === newStatus) return;
  if (newStatus === 'cancelled' && !IS_CEO) { toast('Bekor qilish faqat CEO huquqi', 'error'); return; }
  // Optimistic UI: update locally then re-render
  const prevStatus = task.status;
  task.status = newStatus;
  renderKanban();
  try {
    const r = await fetch(TASK_STATUS + '?id=' + id + '&uid=' + UID + '&status=' + newStatus);
    const d = await r.json();
    if (d.ok) {
      toast('✅ Holat o\'zgardi', 'success');
      await loadTasks();
    } else {
      task.status = prevStatus; renderKanban();
      toast('Xato: ' + (d.error || 'noma\'lum'), 'error');
    }
  } catch (err) {
    task.status = prevStatus; renderKanban();
    toast('Server bilan aloqa yo\'q', 'error');
  }
}

function renderCalendar() {
  const allFiltered = filteredTasks();
  const tasks = allFiltered.filter(t => t.deadline);
  const noDeadline = allFiltered.filter(t => !t.deadline && t.status !== 'completed' && t.status !== 'cancelled');
  const firstDay = new Date(Date.UTC(calYear, calMonth, 1));
  const lastDay = new Date(Date.UTC(calYear, calMonth + 1, 0)).getUTCDate();
  const startDow = firstDay.getUTCDay();
  const monthName = ['Yanvar','Fevral','Mart','Aprel','May','Iyun','Iyul','Avgust','Sentyabr','Oktyabr','Noyabr','Dekabr'][calMonth];
  const nowUZB = new Date(new Date().getTime() + 5*60*60*1000);
  const todayDom = (nowUZB.getUTCMonth() === calMonth && nowUZB.getUTCFullYear() === calYear) ? nowUZB.getUTCDate() : -1;
  
  // Group tasks by date
  const byDate = {};
  tasks.forEach(t => {
    const d = new Date(new Date(t.deadline).getTime() + 5*60*60*1000);
    const y = d.getUTCFullYear(), m = d.getUTCMonth(), dom = d.getUTCDate();
    if (y === calYear && m === calMonth) {
      const key = dom;
      if (!byDate[key]) byDate[key] = [];
      byDate[key].push(t);
    }
  });
  const monthTaskCount = Object.values(byDate).reduce((s, arr) => s + arr.length, 0);
  
  // Build grid
  let grid = '';
  const dows = ['Du','Se','Ch','Pa','Ju','Sh','Ya'];
  dows.forEach(d => grid += `<div class="cal-dow">${d}</div>`);
  
  // Offset: weeks start Monday. JS getUTCDay() returns 0=Sunday. Adjust.
  const offset = (startDow + 6) % 7;
  for (let i = 0; i < offset; i++) grid += '<div class="cal-day other"></div>';
  
  for (let d = 1; d <= lastDay; d++) {
    const dayTasks = byDate[d] || [];
    const isToday = d === todayDom;
    grid += `
      <div class="cal-day ${isToday ? 'today' : ''} ${dayTasks.length > 0 ? 'has-tasks' : ''}" onclick="showDayTasks(${d})">
        <div class="cal-day-num">${d}</div>
        <div class="cal-day-tasks">
          ${dayTasks.slice(0, 3).map(t => `<div class="cal-day-task ${t.priority} ${t.status === 'completed' ? 'completed' : ''}">${escapeHtml(t.title)}</div>`).join('')}
          ${dayTasks.length > 3 ? `<div style="font-size:9px; color:var(--text-dim);">+${dayTasks.length - 3} ko'proq</div>` : ''}
        </div>
      </div>
    `;
  }
  
  const hint = monthTaskCount === 0
    ? `<div style="text-align:center; padding:16px; color:var(--text-dim); font-size:13px; background:var(--surface); border-radius:12px; margin-bottom:14px;">📅 Bu oyda deadline'li vazifa yo'q.<br><span style="font-size:12px;">Vazifa yaratishda deadline qo'ysangiz, shu yerda ko'rinadi.</span></div>`
    : `<div style="text-align:center; padding:8px; color:var(--text-dim); font-size:12px; margin-bottom:10px;">📅 Bu oyda <b style="color:var(--primary)">${monthTaskCount}</b> ta deadline'li vazifa</div>`;
  
  const noDlSection = noDeadline.length > 0
    ? `<div style="margin-top:20px;">
         <div style="font-size:13px; font-weight:600; color:var(--text-dim); margin-bottom:10px; padding:0 2px;">⏳ Deadline qo'yilmagan (${noDeadline.length})</div>
         ${noDeadline.map(taskCardHTML).join('')}
       </div>`
    : '';
  
  document.getElementById('tabContent').innerHTML = `
    <div class="cal-wrap">
      <div class="cal-header">
        <button class="cal-nav-btn" onclick="changeMonth(-1)">←</button>
        <div class="cal-month-title">${monthName} ${calYear}</div>
        <button class="cal-nav-btn" onclick="changeMonth(1)">→</button>
      </div>
      ${hint}
      <div class="cal-grid">${grid}</div>
      ${noDlSection}
    </div>
  `;
}

function changeMonth(delta) {
  calMonth += delta;
  if (calMonth < 0) { calMonth = 11; calYear--; }
  if (calMonth > 11) { calMonth = 0; calYear++; }
  renderCalendar();
}

function showDayTasks(d) {
  const tasks = filteredTasks().filter(t => {
    if (!t.deadline) return false;
    const dt = new Date(new Date(t.deadline).getTime() + 5*60*60*1000);
    return dt.getUTCDate() === d && dt.getUTCMonth() === calMonth && dt.getUTCFullYear() === calYear;
  });
  if (tasks.length === 0) return;
  if (tasks.length === 1) { openDetail(tasks[0].id); return; }
  // Show a list dialog
  const html = `
    <div class="modal-head">
      <div class="modal-title">${d} ${['Yanvar','Fevral','Mart','Aprel','May','Iyun','Iyul','Avgust','Sentyabr','Oktyabr','Noyabr','Dekabr'][calMonth]} (${tasks.length})</div>
      <button class="modal-close" onclick="closeDetail()">✕</button>
    </div>
    <div>${tasks.map(taskCardHTML).join('')}</div>
  `;
  document.getElementById('detailContent').innerHTML = html;
  document.getElementById('detailModal').classList.add('show');
}

function taskCardHTML(t) {
  const sname = { new: 'Yangi', in_progress: 'Jarayonda', completed: 'Tugagan', cancelled: 'Bekor' };
  const dlInfo = formatDeadline(t.deadline);
  const isOverdue = t.is_overdue;
  const assignee = t.assigned_to_telegram_id 
    ? '👤 ' + escapeHtml(getHodimName(t.assigned_to_telegram_id))
    : (t.assigned_to_warehouse_id ? '🏪 ' + escapeHtml(getFilialName(t.assigned_to_warehouse_id)) : '');
  const progress = t.subtask_total > 0 ? Math.round(t.subtask_done / t.subtask_total * 100) : 0;
  const pl = t.priority_level || 5;
  return `
    <div class="task-card ${t.priority} ${isOverdue ? 'overdue' : ''}" data-id="${t.id}" data-status="${t.status}" draggable="true" ondragstart="onCardDragStart(event,${t.id})" ondragend="onCardDragEnd(event)" onclick="openDetail(${t.id})">
      <div class="tc-head">
        <div class="tc-title">${escapeHtml(t.title)}</div>
        <span class="tc-status ${t.status}">${sname[t.status] || t.status}</span>
      </div>
      ${t.description ? `<div style="font-size:12px; color:var(--text-dim); margin-bottom:4px;">${escapeHtml(t.description.substring(0,80))}${t.description.length>80?'...':''}</div>` : ''}
      <div class="tc-assigned">${assignee}</div>
      <div class="tc-meta">
        <span class="tc-meta-item"><span class="tc-plevel" style="background:${plevelColor(pl)}">${pl}</span></span>
        ${dlInfo ? `<span class="tc-meta-item tc-deadline ${dlInfo.cls}">⏰ ${dlInfo.text}</span>` : ''}
        ${t.subtask_total > 0 ? `<span class="tc-meta-item">☑️ ${t.subtask_done}/${t.subtask_total}</span>` : ''}
        ${t.comment_count > 0 ? `<span class="tc-meta-item">💬 ${t.comment_count}</span>` : ''}
        ${t.attachment_count > 0 ? `<span class="tc-meta-item">📎 ${t.attachment_count}</span>` : ''}
      </div>
      ${t.subtask_total > 0 ? `<div class="tc-progress"><div class="tc-progress-bar" style="width:${progress}%"></div></div>` : ''}
    </div>
  `;
}

function formatDeadline(iso) {
  if (!iso) return null;
  const d = new Date(new Date(iso).getTime() + 5*60*60*1000);
  const now = new Date(new Date().getTime() + 5*60*60*1000);
  const diffMs = d.getTime() - now.getTime();
  const diffH = diffMs / 3600000;
  const pad = n => n < 10 ? '0' + n : '' + n;
  const dateStr = pad(d.getUTCDate()) + '.' + pad(d.getUTCMonth() + 1) + ' ' + pad(d.getUTCHours()) + ':' + pad(d.getUTCMinutes());
  let cls = '';
  if (diffH < 0) cls = 'overdue';
  else if (diffH < 24) cls = 'soon';
  return { text: dateStr, cls };
}

function getHodimName(tid) {
  const h = hodimlar.find(x => String(x.telegram_id) === String(tid));
  return h ? h.ism : 'Hodim #' + tid;
}

function getFilialName(wid) {
  const f = filiallar.find(x => String(x.warehouse_id) === String(wid));
  return f ? f.warehouse_name : 'Filial #' + wid;
}

// ============ CREATE / EDIT ============
function openCreate(editTask) {
  editingId = editTask ? editTask.id : null;
  document.getElementById('createTitle').textContent = editTask ? '✏️ Vazifani tahrirlash' : '+ Yangi vazifa';
  document.getElementById('f_title').value = editTask ? editTask.title : '';
  document.getElementById('f_description').value = editTask ? (editTask.description || '') : '';
  document.getElementById('f_deadline').value = editTask && editTask.deadline ? toLocalDatetime(editTask.deadline) : '';
  document.getElementById('f_is_recurring').checked = editTask ? !!editTask.is_recurring : false;
  document.getElementById('empSearch').value = '';
  empSearchTerm = '';
  selectedEmployees = [];
  document.querySelectorAll('.dl-quick-btn[data-dl]').forEach(b => b.classList.remove('active'));
  toggleRecurring();
  updateDlPreview();
  
  // Priority (1-10)
  const plevel = editTask ? (editTask.priority_level || 5) : 5;
  document.getElementById('f_priority_level').value = plevel;
  onPriorityChange();
  
  // Recurring + multi-select only for NEW tasks; edit keeps single assignee
  if (editTask) {
    // Hide recurring + multi-select complexity in edit — single assignee
    if (editTask.assigned_to_telegram_id) {
      const h = hodimlar.find(x => String(x.telegram_id) === String(editTask.assigned_to_telegram_id));
      if (h) selectedEmployees = [{ telegram_id: h.telegram_id, ism: h.ism, warehouse_name: h.warehouse_name }];
      setAssignType('employee');
    } else if (editTask.assigned_to_warehouse_id) {
      setAssignType('warehouse', editTask.assigned_to_warehouse_id);
    } else {
      setAssignType('employee');
    }
  } else {
    setAssignType('employee');
  }
  
  // Subtasks reset
  document.getElementById('subtaskList').innerHTML = '';
  
  document.getElementById('createModal').classList.add('show');
}

function closeCreate() {
  document.getElementById('createModal').classList.remove('show');
}

function setAssignType(type, preselect) {
  assignType = type;
  document.getElementById('assignTypeEmployee').classList.toggle('active', type === 'employee');
  document.getElementById('assignTypeWarehouse').classList.toggle('active', type === 'warehouse');
  const empPicker = document.getElementById('employeePicker');
  const whSel = document.getElementById('f_warehouse');
  if (type === 'employee') {
    empPicker.style.display = 'block';
    whSel.style.display = 'none';
    renderChips();
    renderEmpList();
  } else {
    empPicker.style.display = 'none';
    whSel.style.display = 'block';
    whSel.innerHTML = '<option value="">— Filialni tanlang —</option>' + filiallar.map(f => `<option value="${f.warehouse_id}">${escapeHtml(f.warehouse_name)}</option>`).join('');
    if (preselect) whSel.value = String(preselect);
  }
}

function filterEmployees() {
  empSearchTerm = (document.getElementById('empSearch').value || '').toLowerCase().trim();
  renderEmpList();
}

function renderEmpList() {
  const list = document.getElementById('empList');
  const filtered = hodimlar.filter(h => {
    if (!empSearchTerm) return true;
    const hay = (h.ism + ' ' + (h.warehouse_name || '')).toLowerCase();
    return hay.indexOf(empSearchTerm) !== -1;
  });
  const allShownSelected = filtered.length > 0 && filtered.every(h => isEmpSelected(h.telegram_id));
  let html = '';
  if (filtered.length > 3) {
    html += `<div class="emp-select-all">
      <span style="font-size:12px;color:var(--text-dim)">${filtered.length} ta hodim</span>
      <button type="button" class="emp-select-all-btn" onclick="toggleSelectAll(${allShownSelected})">${allShownSelected ? 'Bekor qilish' : 'Hammasini tanlash'}</button>
    </div>`;
  }
  html += filtered.map(h => {
    const sel = isEmpSelected(h.telegram_id);
    return `<div class="emp-item ${sel ? 'selected' : ''}" onclick="toggleEmployee('${h.telegram_id}')">
      <div class="emp-check">${sel ? '✓' : ''}</div>
      <div class="emp-info">
        <div class="emp-name">${escapeHtml(h.ism)}</div>
        ${h.warehouse_name ? `<div class="emp-branch">🏪 ${escapeHtml(h.warehouse_name)}</div>` : ''}
      </div>
    </div>`;
  }).join('');
  list.innerHTML = html;
}

function isEmpSelected(tid) {
  return selectedEmployees.some(e => String(e.telegram_id) === String(tid));
}

function toggleEmployee(tid) {
  const h = hodimlar.find(x => String(x.telegram_id) === String(tid));
  if (!h) return;
  if (isEmpSelected(tid)) {
    selectedEmployees = selectedEmployees.filter(e => String(e.telegram_id) !== String(tid));
  } else {
    selectedEmployees.push({ telegram_id: h.telegram_id, ism: h.ism, warehouse_name: h.warehouse_name });
  }
  renderChips();
  renderEmpList();
}

function toggleSelectAll(currentlyAll) {
  const filtered = hodimlar.filter(h => {
    if (!empSearchTerm) return true;
    const hay = (h.ism + ' ' + (h.warehouse_name || '')).toLowerCase();
    return hay.indexOf(empSearchTerm) !== -1;
  });
  if (currentlyAll) {
    const ids = filtered.map(h => String(h.telegram_id));
    selectedEmployees = selectedEmployees.filter(e => ids.indexOf(String(e.telegram_id)) === -1);
  } else {
    filtered.forEach(h => { if (!isEmpSelected(h.telegram_id)) selectedEmployees.push({ telegram_id: h.telegram_id, ism: h.ism, warehouse_name: h.warehouse_name }); });
  }
  renderChips();
  renderEmpList();
}

function renderChips() {
  const wrap = document.getElementById('selectedChips');
  wrap.innerHTML = selectedEmployees.map(e => `
    <span class="chip">${escapeHtml(e.ism)}<span class="chip-x" onclick="event.stopPropagation();removeChip('${e.telegram_id}')">×</span></span>
  `).join('');
}

function removeChip(tid) {
  selectedEmployees = selectedEmployees.filter(e => String(e.telegram_id) !== String(tid));
  renderChips();
  renderEmpList();
}

// ============ DEADLINE QUICK ============
function setDeadlineQuick(kind) {
  const now = new Date(new Date().getTime() + 5*60*60*1000); // UZB now
  let target;
  if (kind === 'today') {
    target = new Date(Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate(), 18, 0));
  } else if (kind === 'tomorrow') {
    target = new Date(Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate()+1, 18, 0));
  } else if (kind === '3days') {
    target = new Date(Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate()+3, 18, 0));
  } else if (kind === 'week') {
    target = new Date(Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate()+7, 18, 0));
  }
  const pad = n => n < 10 ? '0'+n : ''+n;
  const val = target.getUTCFullYear() + '-' + pad(target.getUTCMonth()+1) + '-' + pad(target.getUTCDate()) + 'T' + pad(target.getUTCHours()) + ':' + pad(target.getUTCMinutes());
  document.getElementById('f_deadline').value = val;
  document.querySelectorAll('.dl-quick-btn[data-dl]').forEach(b => b.classList.toggle('active', b.dataset.dl === kind));
  updateDlPreview();
}

function clearDeadline() {
  document.getElementById('f_deadline').value = '';
  document.querySelectorAll('.dl-quick-btn[data-dl]').forEach(b => b.classList.remove('active'));
  updateDlPreview();
}

function onDeadlineManual() {
  document.querySelectorAll('.dl-quick-btn[data-dl]').forEach(b => b.classList.remove('active'));
  updateDlPreview();
}

function updateDlPreview() {
  const v = document.getElementById('f_deadline').value;
  const el = document.getElementById('dlPreview');
  if (!v) { el.textContent = ''; return; }
  const d = new Date(v);
  const now = new Date(new Date().getTime() + 5*60*60*1000);
  const diffMs = new Date(v).getTime() - now.getTime();
  const days = Math.round(diffMs / 86400000);
  let rel = '';
  if (diffMs < 0) rel = ' (o\'tib ketgan)';
  else if (days === 0) rel = ' (bugun)';
  else if (days === 1) rel = ' (1 kundan keyin)';
  else if (days > 1) rel = ` (${days} kundan keyin)`;
  el.textContent = '⏰ ' + v.replace('T', ' ') + rel;
}

function plevelColor(pl) {
  pl = Number(pl) || 5;
  if (pl <= 3) return 'var(--urgent)';
  if (pl <= 6) return 'var(--amber)';
  return 'var(--low)';
}

// Fire-and-forget notify via GET — no preflight, no CORS
function notifyTask(taskId) {
  try {
    fetch(TASK_NOTIFY + '?task_id=' + taskId + '&event=created', { keepalive: true }).catch(() => {});
  } catch (e) {}
}

async function saveTask() {
  const title = document.getElementById('f_title').value.trim();
  if (!title) { toast('Nomi kerak', 'error'); return; }
  
  // Resolve assignees
  let assigneeList = []; // for employee multi
  let warehouseId = null;
  if (assignType === 'employee') {
    if (selectedEmployees.length === 0) { toast('Kamida bitta hodim tanlang', 'error'); return; }
    assigneeList = selectedEmployees.map(e => String(e.telegram_id));
  } else {
    warehouseId = document.getElementById('f_warehouse').value;
    if (!warehouseId) { toast('Filialni tanlang', 'error'); return; }
  }
  
  const priorityLevel = Number(document.getElementById('f_priority_level').value) || 5;
  const deadline = document.getElementById('f_deadline').value;
  const description = document.getElementById('f_description').value.trim();
  const isRecurring = document.getElementById('f_is_recurring').checked;
  
  const subtasks = [];
  document.querySelectorAll('#subtaskList input').forEach(inp => {
    if (inp.value.trim()) subtasks.push({ title: inp.value.trim() });
  });
  
  let recurringPattern = null;
  if (isRecurring) {
    const type = document.getElementById('f_recurring_type').value;
    if (type === 'daily') recurringPattern = { type: 'daily' };
    else if (type === 'weekly') {
      const days = [];
      document.querySelectorAll('#weeklyDays .dow.active').forEach(el => days.push(Number(el.dataset.day)));
      if (days.length === 0) { toast('Hafta kunlarini tanlang', 'error'); return; }
      recurringPattern = { type: 'weekly', days };
    } else if (type === 'monthly') {
      recurringPattern = { type: 'monthly', day: Number(document.getElementById('f_monthly_day').value) || 1 };
    }
  }
  
  const deadlineIso = deadline ? new Date(deadline).toISOString() : null;
  
  const btn = document.getElementById('btnSave');
  btn.disabled = true;
  btn.textContent = 'Saqlanmoqda...';
  
  try {
    // EDIT mode — single update (GET to avoid CORS preflight)
    if (editingId) {
      const body = {
        uid: UID, id: editingId, title, description, priority_level: priorityLevel, deadline: deadlineIso,
        assigned_to_telegram_id: assignType === 'employee' ? (assigneeList[0] || null) : null,
        assigned_to_warehouse_id: assignType === 'warehouse' ? Number(warehouseId) : null
      };
      const r = await fetch(TASK_UPDATE + '?data=' + encodeURIComponent(JSON.stringify(body)));
      const d = await r.json();
      if (d.ok) { toast('✅ Yangilandi', 'success'); closeCreate(); await loadTasks(); }
      else toast('Xato: ' + (d.error || 'noma\'lum'), 'error');
      return;
    }
    
    // CREATE mode (GET to avoid CORS preflight)
    if (assignType === 'warehouse') {
      // Single task → warehouse
      const body = { uid: UID, title, description: description || null, priority_level: priorityLevel, deadline: deadlineIso, is_recurring: isRecurring, recurring_pattern: recurringPattern, subtasks, created_by_name: 'CEO', assigned_to_telegram_id: null, assigned_to_warehouse_id: Number(warehouseId) };
      const r = await fetch(TASK_CREATE + '?data=' + encodeURIComponent(JSON.stringify(body)));
      const d = await r.json();
      if (d.ok) {
        notifyTask(d.id);
        toast('✅ Vazifa yaratildi', 'success');
        closeCreate(); await loadTasks();
      } else toast('Xato: ' + (d.error || 'noma\'lum'), 'error');
    } else {
      // Multi-select employees → one task each, sequentially
      let okCount = 0, failCount = 0;
      const createdIds = [];
      for (let i = 0; i < assigneeList.length; i++) {
        const tid = assigneeList[i];
        btn.textContent = `Saqlanmoqda... (${i+1}/${assigneeList.length})`;
        const body = { uid: UID, title, description: description || null, priority_level: priorityLevel, deadline: deadlineIso, is_recurring: isRecurring, recurring_pattern: recurringPattern, subtasks, created_by_name: 'CEO', assigned_to_telegram_id: tid, assigned_to_warehouse_id: null };
        try {
          const r = await fetch(TASK_CREATE + '?data=' + encodeURIComponent(JSON.stringify(body)));
          const d = await r.json();
          if (d.ok) { okCount++; createdIds.push(d.id); }
          else failCount++;
        } catch (e) { failCount++; }
      }
      // Fire notifications after all creates done (doesn't block UI)
      createdIds.forEach(id => notifyTask(id));
      if (okCount > 0) {
        toast(`✅ ${okCount} ta vazifa yaratildi${failCount > 0 ? ` (${failCount} ta xato)` : ''}`, failCount > 0 ? 'error' : 'success');
        closeCreate(); await loadTasks();
      } else {
        toast('Xato: hech narsa yaratilmadi', 'error');
      }
    }
  } catch (e) {
    toast('Server xatosi', 'error');
    console.error(e);
  } finally {
    btn.disabled = false;
    btn.textContent = '💾 Saqlash';
  }
}

// ============ DETAIL ============
async function openDetail(id) {
  document.getElementById('detailContent').innerHTML = '<div class="loading">Yuklanmoqda...</div>';
  document.getElementById('detailModal').classList.add('show');
  try {
    const r = await fetch(TASK_DETAIL + '?id=' + id + '&uid=' + UID);
    const d = await r.json();
    if (d.ok) renderDetail(d);
    else document.getElementById('detailContent').innerHTML = '<div class="empty">Topilmadi</div>';
  } catch (e) {
    document.getElementById('detailContent').innerHTML = '<div class="empty">Server xatosi</div>';
  }
}

function closeDetail() {
  document.getElementById('detailModal').classList.remove('show');
}

function renderDetail(d) {
  const t = d.task;
  const sname = { new: 'Yangi', in_progress: 'Jarayonda', completed: 'Tugagan', cancelled: 'Bekor' };
  const dlInfo = formatDeadline(t.deadline);
  const assignee = t.assigned_to_telegram_id ? '👤 ' + getHodimName(t.assigned_to_telegram_id) : (t.assigned_to_warehouse_id ? '🏪 ' + getFilialName(t.assigned_to_warehouse_id) : '—');
  
  const subtasksHtml = (d.subtasks || []).map(s => `
    <div class="subtask-item ${s.is_completed ? 'done' : ''}" onclick="toggleSubtask(${s.id}, ${t.id})">
      <div class="subtask-check ${s.is_completed ? 'done' : ''}">${s.is_completed ? '✓' : ''}</div>
      <div class="subtask-text">${escapeHtml(s.title)}</div>
    </div>
  `).join('');
  
  const commentsHtml = (d.comments || []).map(c => `
    <div class="comment-item">
      <div class="comment-head">
        <span class="comment-author">${escapeHtml(c.author_name || '?')}</span>
        <span class="comment-time">${formatDate(c.created_at)}</span>
      </div>
      <div class="comment-text">${escapeHtml(c.comment_text || '')}</div>
    </div>
  `).join('');
  
  const attachsHtml = (d.attachments || []).map(a => `
    <a class="attach-item" href="${escapeHtml(a.file_url)}" target="_blank">
      <div class="attach-icon">${attachIcon(a.file_type)}</div>
      <div class="attach-name">${escapeHtml(a.file_name)}</div>
      <div class="attach-size">${formatSize(a.file_size)}</div>
    </a>
  `).join('');
  
  const historyHtml = (d.history || []).slice(0, 10).map(h => `
    <div class="history-item">
      <strong>${h.old_status ? sname[h.old_status] || h.old_status : 'Yaratildi'}</strong>
      ${h.old_status ? ' → <strong>' + (sname[h.new_status] || h.new_status) + '</strong>' : ''}
      ${h.note ? ' (' + escapeHtml(h.note) + ')' : ''}
      <br><span style="font-size:11px;">${formatDate(h.changed_at)}</span>
    </div>
  `).join('');
  
  document.getElementById('detailContent').innerHTML = `
    <div class="modal-head">
      <div class="modal-title">${escapeHtml(t.title)}</div>
      <button class="modal-close" onclick="closeDetail()">✕</button>
    </div>
    
    <div class="detail-meta">
      <div class="detail-meta-item">
        <div class="detail-meta-label">Holat</div>
        <div class="detail-meta-val"><span class="tc-status ${t.status}">${sname[t.status]}</span></div>
      </div>
      <div class="detail-meta-item">
        <div class="detail-meta-label">Prioritet</div>
        <div class="detail-meta-val"><span class="tc-plevel" style="background:${plevelColor(t.priority_level||5)}">${t.priority_level||5}</span> / 10</div>
      </div>
      <div class="detail-meta-item">
        <div class="detail-meta-label">Biriktirildi</div>
        <div class="detail-meta-val" style="font-size:12px;">${escapeHtml(assignee)}</div>
      </div>
      <div class="detail-meta-item">
        <div class="detail-meta-label">Deadline</div>
        <div class="detail-meta-val ${dlInfo && dlInfo.cls ? 'tc-deadline ' + dlInfo.cls : ''}" style="font-size:12px;">${dlInfo ? dlInfo.text : '—'}</div>
      </div>
    </div>
    
    ${t.description ? `<div class="detail-section"><div class="detail-section-title">Tavsif</div><div class="detail-desc">${escapeHtml(t.description)}</div></div>` : ''}
    
    ${subtasksHtml ? `<div class="detail-section"><div class="detail-section-title">Subtask (${d.subtasks.filter(s=>s.is_completed).length}/${d.subtasks.length})</div>${subtasksHtml}</div>` : ''}
    
    ${attachsHtml ? `<div class="detail-section"><div class="detail-section-title">Fayllar</div>${attachsHtml}</div>` : ''}
    
    <div class="detail-section">
      <div class="detail-section-title">Izohlar (${(d.comments||[]).length})</div>
      ${commentsHtml || '<div style="font-size:12px; color:var(--text-dim); text-align:center; padding:8px;">Izohlar yo\'q</div>'}
      <div class="add-comment">
        <input type="text" id="commentInput" placeholder="Izoh yozish..." />
        <button onclick="addComment(${t.id})">→</button>
      </div>
    </div>
    
    ${historyHtml ? `<div class="detail-section"><div class="detail-section-title">Tarix</div>${historyHtml}</div>` : ''}
    
    <div style="margin-top:16px; border-top:1px solid var(--border); padding-top:14px;">
      <div class="detail-section-title">Boshqaruv</div>
      ${t.status === 'new' ? `<button class="btn-secondary" onclick="changeStatus(${t.id}, 'in_progress')">⚙️ Jarayonga olish</button>` : ''}
      ${t.status !== 'completed' && t.status !== 'cancelled' ? `<button class="btn-secondary" onclick="changeStatus(${t.id}, 'completed')">🏁 Tugatildi deb belgilash</button>` : ''}
      ${IS_CEO && t.status === 'completed' ? `<button class="btn-secondary" onclick="changeStatus(${t.id}, 'in_progress')">↩️ Qaytadan ochish</button>` : ''}
      ${IS_CEO && t.status !== 'cancelled' ? `<button class="btn-secondary" onclick="cancelTask(${t.id})">❌ Bekor qilish</button>` : ''}
      ${IS_CEO ? `<button class="btn-secondary" onclick="editTask(${JSON.stringify(t).replace(/"/g,'&quot;')})">✏️ Tahrirlash</button>` : ''}
      ${IS_CEO ? `<button class="btn-danger" onclick="deleteTask(${t.id})">🗑️ O'chirish</button>` : ''}
    </div>
  `;
}

async function toggleSubtask(subtaskId, taskId) {
  try {
    const r = await fetch(TASK_SUBTASK + '?subtask_id=' + subtaskId + '&uid=' + UID);
    const d = await r.json();
    if (d.ok) {
      await openDetail(taskId); // reload
      loadTasks();
    }
  } catch (e) { toast('Server xatosi', 'error'); }
}

async function addComment(taskId) {
  const inp = document.getElementById('commentInput');
  const text = inp.value.trim();
  if (!text) return;
  try {
    const data = { task_id: taskId, uid: UID, author_name: 'CEO', comment_text: text };
    const r = await fetch(TASK_COMMENT + '?data=' + encodeURIComponent(JSON.stringify(data)));
    const d = await r.json();
    if (d.ok) {
      inp.value = '';
      // Notify assigned employee + creator about the new comment (fire-and-forget)
      try { fetch(TASK_NOTIFY + '?task_id=' + taskId + '&event=comment&changed_by=' + UID, { keepalive: true }).catch(() => {}); } catch (e) {}
      toast('✅ Izoh yuborildi', 'success');
      await openDetail(taskId);
      loadTasks();
    }
  } catch (e) { toast('Server xatosi', 'error'); }
}

async function changeStatus(id, status) {
  try {
    const r = await fetch(TASK_STATUS + '?id=' + id + '&uid=' + UID + '&status=' + status);
    const d = await r.json();
    if (d.ok) {
      toast('✅ Holat o\'zgartirildi', 'success');
      closeDetail();
      loadTasks();
    } else toast('Xato: ' + d.error, 'error');
  } catch (e) { toast('Server xatosi', 'error'); }
}

async function cancelTask(id) {
  const reason = prompt('Bekor qilish sababi (ixtiyoriy):') || '';
  try {
    const r = await fetch(TASK_STATUS + '?id=' + id + '&uid=' + UID + '&status=cancelled&note=' + encodeURIComponent(reason));
    const d = await r.json();
    if (d.ok) {
      toast('❌ Bekor qilindi', 'success');
      closeDetail();
      loadTasks();
    }
  } catch (e) { toast('Server xatosi', 'error'); }
}

async function deleteTask(id) {
  if (!confirm("O'chirishni tasdiqlaysizmi? Bu amalni qaytarib bo'lmaydi.")) return;
  try {
    const r = await fetch(TASK_DELETE + '?id=' + id + '&uid=' + UID);
    const d = await r.json();
    if (d.ok) {
      toast('🗑️ O\'chirildi', 'success');
      closeDetail();
      loadTasks();
    } else toast('Xato: ' + d.error, 'error');
  } catch (e) { toast('Server xatosi', 'error'); }
}

function editTask(t) {
  closeDetail();
  setTimeout(() => openCreate(t), 100);
}

// ============ UTILS ============
function escapeHtml(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/[<>&"']/g, c => ({ '<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;' }[c]));
}

function priorityIcon(p) {
  return { urgent: '🔴', normal: '🟡', low: '🔵' }[p] || '⚪';
}

function attachIcon(type) {
  if (!type) return '📎';
  if (type.startsWith('image/')) return '🖼️';
  if (type.startsWith('video/')) return '🎥';
  if (type.startsWith('audio/')) return '🎵';
  if (type.includes('pdf')) return '📄';
  return '📎';
}

function formatSize(b) {
  if (!b) return '';
  const n = Number(b);
  if (n < 1024) return n + ' B';
  if (n < 1024*1024) return (n/1024).toFixed(1) + ' KB';
  return (n/1024/1024).toFixed(1) + ' MB';
}

function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(new Date(iso).getTime() + 5*60*60*1000);
  const pad = n => n < 10 ? '0' + n : '' + n;
  return pad(d.getUTCDate()) + '.' + pad(d.getUTCMonth()+1) + '.' + d.getUTCFullYear() + ' ' + pad(d.getUTCHours()) + ':' + pad(d.getUTCMinutes());
}

function toLocalDatetime(iso) {
  if (!iso) return '';
  const d = new Date(new Date(iso).getTime() + 5*60*60*1000);
  const pad = n => n < 10 ? '0' + n : '' + n;
  return d.getUTCFullYear() + '-' + pad(d.getUTCMonth()+1) + '-' + pad(d.getUTCDate()) + 'T' + pad(d.getUTCHours()) + ':' + pad(d.getUTCMinutes());
}

function toast(msg, type) {
  const el = document.getElementById('toast');
  el.className = 'toast show' + (type ? ' ' + type : '');
  el.textContent = msg;
  setTimeout(() => el.classList.remove('show'), 2800);
}

function goBack() {
  const isDev = window.location.pathname.includes('-dev');
  let target;
  if (IS_CEO) target = isDev ? 'ceo-dev.html' : 'ceo.html';
  else target = isDev ? 'index-dev.html' : 'index.html';
  const url = target + '?uid=' + UID;
  if (tg && tg.openLink) tg.openLink(url);
  else window.location.href = url;
}

document.getElementById('detailModal').addEventListener('click', e => { if (e.target.id === 'detailModal') closeDetail(); });

init();
