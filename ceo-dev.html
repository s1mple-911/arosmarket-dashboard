<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>AROS CEO [DEV]</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;600;700;800&display=swap');
:root{
--bg:#060610;--bg2:#0e0e20;--bg3:#161628;--border:#1e1e38;
--text:#f0f0ff;--text2:#8888aa;--text3:#444466;
--green:#00e5a0;--green-bg:rgba(0,229,160,.1);--green-border:rgba(0,229,160,.25);
--red:#ff4d6d;--amber:#ffb800;
}
[data-theme="light"]{
--bg:#f0f0f8;--bg2:#ffffff;--bg3:#e8e8f2;--border:#d8d8ee;
--text:#0a0a1a;--text2:#555570;--text3:#9999bb;
--green:#00a870;--green-bg:rgba(0,168,112,.1);--green-border:rgba(0,168,112,.3);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Manrope',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.hdr{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.hdr-logo{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--green);letter-spacing:2px;flex-shrink:0}
.dev-badge{font-size:9px;font-weight:800;padding:2px 7px;border-radius:6px;background:rgba(255,184,0,.15);color:#ffb800;border:1px solid rgba(255,184,0,.3);flex-shrink:0}
.hdr-info{flex:1}
.hdr-title{font-size:13px;font-weight:800}
.hdr-sub{font-size:10px;color:var(--text2);margin-top:1px}
.theme-btn{width:30px;height:30px;border-radius:50%;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px}
.filter-bar{padding:12px 16px 0;display:flex;gap:8px}
.filter-bar select{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:9px 12px;color:var(--text);font-size:13px;outline:none;appearance:none;-webkit-appearance:none;font-family:'Manrope',sans-serif;font-weight:600}
.refresh-btn{width:38px;height:38px;border-radius:10px;background:var(--green-bg);border:1px solid var(--green-border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;flex-shrink:0}
.page{padding:14px}
.jami-card{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:18px;margin-bottom:14px}
.jami-label{font-size:10px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.jami-row{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:12px}
.jami-summa{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--green);letter-spacing:1px;line-height:1}
.jami-foiz{font-size:22px;font-weight:900;color:var(--text);opacity:.7}
.jami-bar-bg{background:var(--bg3);border-radius:6px;height:6px;margin-bottom:8px;overflow:hidden}
.jami-bar{height:100%;border-radius:6px;background:var(--green);transition:width 1.2s ease}
.jami-nums{display:flex;justify-content:space-between;font-size:10px;color:var(--text3);margin-bottom:10px}
.jami-nums b{color:var(--text);font-weight:700}
.jami-qarz{display:flex;gap:8px;margin-top:10px}
.jq-box{flex:1;background:var(--bg3);border-radius:10px;padding:8px 10px}
.jq-lbl{font-size:9px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.3px;margin-bottom:3px}
.jq-val{font-size:13px;font-weight:800}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.sec-title{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.8px}
.sec-badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.filial-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:14px;margin-bottom:10px;position:relative;overflow:hidden;cursor:pointer;transition:opacity .15s}
.filial-card:active{opacity:.8}
.fc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.fc-name{font-size:14px;font-weight:800;text-transform:capitalize}
.fc-oy{font-size:10px;color:var(--text3);margin-top:2px}
.fc-foiz{font-size:22px;font-weight:900;line-height:1}
.fc-bar-bg{background:var(--bg3);border-radius:6px;height:5px;margin-bottom:8px;overflow:hidden}
.fc-bar{height:100%;border-radius:6px;transition:width 1s ease}
.fc-nums{display:flex;justify-content:space-between;font-size:10px;color:var(--text3);margin-bottom:8px}
.fc-nums b{color:var(--text);font-weight:700}
.fc-mini{display:flex;gap:6px;margin-bottom:6px}
.fc-m{flex:1;background:var(--bg3);border-radius:8px;padding:6px 8px}
.fc-m-lbl{font-size:9px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.3px;margin-bottom:2px}
.fc-m-val{font-size:11px;font-weight:800}
.fc-qarz{background:rgba(255,77,109,.08);border:1px solid rgba(255,77,109,.2);border-radius:8px;padding:6px 10px;display:flex;justify-content:space-between;align-items:center;font-size:11px}
.fc-qarz-lbl{color:var(--text3);font-weight:600}
.fc-qarz-val{font-weight:800;color:var(--red)}
.fc-prognoz{margin-top:6px;padding:6px 10px;background:var(--bg3);border-radius:8px;font-size:10px;color:var(--text2);display:flex;justify-content:space-between}
.fc-loading{position:absolute;inset:0;background:var(--bg2);display:flex;align-items:center;justify-content:center;border-radius:16px}
.mini-spin{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite}
.det-panel{position:fixed;inset:0;background:var(--bg);z-index:200;display:none;flex-direction:column}
.det-panel.open{display:flex}
.det-hdr{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.det-back{width:34px;height:34px;border-radius:50%;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;flex-shrink:0}
.det-tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0}
.det-tab{flex:1;padding:10px 4px;text-align:center;font-size:10px;font-weight:700;color:var(--text3);border-bottom:2px solid transparent;cursor:pointer;transition:all .2s}
.det-tab.active{color:var(--green);border-bottom-color:var(--green)}
.det-body{flex:1;overflow-y:auto}
.det-page{display:none;padding:14px}
.det-page.active{display:block}
.progress-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:12px}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:13px}
.sc-lbl{font-size:10px;color:var(--text3);font-weight:600;margin-bottom:5px;text-transform:uppercase;letter-spacing:.3px}
.sc-val{font-size:17px;font-weight:800}
.sc-sub{font-size:10px;color:var(--text3);margin-top:3px}
.total-bar{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.tb-lbl{font-size:11px;color:var(--text2);font-weight:600}
.tb-val{font-size:15px;font-weight:800}
.badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px}
.b-red{background:rgba(255,77,109,.15);color:var(--red);border:1px solid rgba(255,77,109,.25)}
.b-amber{background:rgba(255,184,0,.15);color:var(--amber);border:1px solid rgba(255,184,0,.25)}
.client-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;margin-bottom:8px;overflow:hidden}
.client-main{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer}
.c-av{width:38px;height:38px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:var(--text2);flex-shrink:0;border:1px solid var(--border)}
.c-info{flex:1;min-width:0}
.c-name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.c-phone{font-size:11px;color:var(--text3);margin-top:2px}
.c-right{text-align:right;flex-shrink:0}
.c-amt{font-size:13px;font-weight:800}
.call-btn{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1px solid rgba(0,229,160,.35);background:rgba(0,229,160,.1);text-decoration:none}
.arr{color:var(--text3);font-size:11px;flex-shrink:0;margin-left:4px;transition:transform .2s}
.arr.open{transform:rotate(180deg)}
.orders-list{border-top:1px solid var(--border);background:var(--bg3);max-height:0;overflow:hidden;transition:max-height .5s ease}
.orders-list.exp{max-height:2000px}
.order-row{display:flex;justify-content:space-between;align-items:center;padding:10px 14px 10px 62px;border-bottom:1px solid var(--border)}
.order-row:last-child{border-bottom:none}
.loading{text-align:center;padding:60px 16px;color:var(--text3);font-size:13px}
.spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:60px 16px}
.et{font-size:13px;color:var(--text3)}
.err-box{background:rgba(255,77,109,.1);border:1px solid rgba(255,77,109,.3);border-radius:12px;padding:14px;font-size:13px;color:var(--red);text-align:center}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-logo">AROS</div>
  <div class="dev-badge">DEV</div>
  <div class="hdr-info">
    <div class="hdr-title" id="hdr-title">CEO Dashboard</div>
    <div class="hdr-sub" id="hdr-sub">Yuklanmoqda...</div>
  </div>
  <div class="theme-btn" onclick="toggleTheme()" id="themeBtn">🌙</div>
</div>

<div style="display:flex;background:var(--bg2);border-bottom:1px solid var(--border)">
  <div class="mgr-tab active" onclick="changeMgr('all',this)" style="flex:1;padding:10px 4px;text-align:center;font-size:10px;font-weight:700;color:var(--text3);border-bottom:2px solid transparent;cursor:pointer;transition:all .2s">Hammasi</div>
  <div class="mgr-tab" onclick="changeMgr('giyosbek',this)" style="flex:1;padding:10px 4px;text-align:center;font-size:10px;font-weight:700;color:var(--text3);border-bottom:2px solid transparent;cursor:pointer;transition:all .2s">Giyosbek</div>
  <div class="mgr-tab" onclick="changeMgr('sherdil',this)" style="flex:1;padding:10px 4px;text-align:center;font-size:10px;font-weight:700;color:var(--text3);border-bottom:2px solid transparent;cursor:pointer;transition:all .2s">Sherdil</div>
</div>

<div class="filter-bar">
  <select id="oy-select" onchange="changeOy(this.value)"></select>
  <div class="refresh-btn" onclick="load()">🔄</div>
</div>

<div class="page" id="main">
  <div class="loading"><div class="spinner"></div>Yuklanmoqda...</div>
</div>

<!-- DEADLINE MODAL -->
<div id="dl-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:400;align-items:center;justify-content:center;padding:20px">
  <div style="background:var(--bg2);border-radius:20px;padding:20px;width:100%;max-width:360px;border:1px solid var(--border)">
    <div style="font-size:14px;font-weight:800;margin-bottom:4px" id="dl-ism"></div>
    <div style="font-size:12px;color:var(--text3);margin-bottom:12px">Jami qarz: <span id="dl-summa" style="color:var(--red);font-weight:800"></span></div>
    <input type="hidden" id="dl-user-id">
    <input type="hidden" id="dl-total-summa">
    <div style="margin-bottom:12px">
      <label style="font-size:11px;color:var(--text3);font-weight:700;text-transform:uppercase;display:block;margin-bottom:6px">Deadline summasi</label>
      <input type="number" id="dl-qarz-summa" placeholder="Summa (so'm)" style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--text);font-size:14px;outline:none;font-family:inherit">
    </div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;padding:10px;background:var(--bg3);border-radius:10px">
      <input type="checkbox" id="dl-all" onchange="dlAllToggle(this)" style="width:18px;height:18px;cursor:pointer">
      <label for="dl-all" style="font-size:13px;font-weight:600;cursor:pointer">Hammasi — barcha qarzga deadline</label>
    </div>
    <div style="margin-bottom:12px">
      <label style="font-size:11px;color:var(--text3);font-weight:700;text-transform:uppercase;display:block;margin-bottom:6px">Deadline sanasi</label>
      <input type="date" id="dl-date" style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--text);font-size:14px;outline:none;font-family:inherit">
    </div>
    <div style="margin-bottom:16px">
      <label style="font-size:11px;color:var(--text3);font-weight:700;text-transform:uppercase;display:block;margin-bottom:6px">Vaqt</label>
      <input type="time" id="dl-time" style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--text);font-size:14px;outline:none;font-family:inherit">
    </div>
    <div style="display:flex;gap:10px">
      <button onclick="closeDlModal()" style="flex:1;padding:12px;border-radius:12px;background:var(--bg3);border:1px solid var(--border);color:var(--text2);font-size:13px;font-weight:700;cursor:pointer">Bekor</button>
      <button onclick="saveDlModal()" style="flex:2;padding:12px;border-radius:12px;background:#ff4d6d;border:none;color:#fff;font-size:13px;font-weight:800;cursor:pointer">⏰ Deadline qo'y</button>
    </div>
  </div>
</div>

<!-- OCHIQ BUYURTMALAR MODAL -->
<div id="det-ochiq-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;align-items:flex-end;justify-content:center">
  <div style="background:var(--bg2);border-radius:20px 20px 0 0;width:100%;max-height:70vh;overflow-y:auto">
    <div style="display:flex;justify-content:space-between;align-items:center;padding:16px 16px 0">
      <div style="font-size:14px;font-weight:800">Ochiq buyurtmalar</div>
      <button onclick="document.getElementById('det-ochiq-modal').style.display='none'" style="background:none;border:none;font-size:20px;color:var(--text3);cursor:pointer">✕</button>
    </div>
    <div id="det-ochiq-content"></div>
  </div>
</div>

<div class="det-panel" id="det-panel">
  <div class="det-hdr">
    <div class="det-back" onclick="closeDetail()">←</div>
    <div style="flex:1">
      <div style="font-size:13px;font-weight:800" id="det-title">Filial</div>
      <div style="font-size:10px;color:var(--text2)" id="det-sub"></div>
    </div>
  </div>
  <div class="det-tabs">
    <div class="det-tab active" onclick="showDetTab('dash',this)">Dashboard</div>
    <div class="det-tab" onclick="showDetTab('otgan',this)">O'tgan</div>
    <div class="det-tab" onclick="showDetTab('bugun',this)">Bugun</div>
    <div class="det-tab" onclick="showDetTab('ertaga',this)">Ertaga</div>
  </div>
  <div class="det-body">
    <div class="det-page active" id="det-dash"><div class="loading"><div class="spinner"></div>Yuklanmoqda...</div></div>
    <div class="det-page" id="det-otgan"><div class="loading"><div class="spinner"></div></div></div>
    <div class="det-page" id="det-bugun"><div class="loading"><div class="spinner"></div></div></div>
    <div class="det-page" id="det-ertaga"><div class="loading"><div class="spinner"></div></div></div>
  </div>
</div>

<script>
var CEO_API      = 'https://n8n.arosmarket.com/webhook/aros-cache-ceo';
var FILIAL_API   = 'https://n8n.arosmarket.com/webhook/aros-cache-filial';
var STATS_API    = 'https://n8n.arosmarket.com/webhook/aros-cache-stats';
var ORDERS_API   = 'https://n8n.arosmarket.com/webhook/aros-orders';
var DEADLINE_API = 'https://n8n.arosmarket.com/webhook/aros-deadlines-get';
var DEADLINE_SET  = 'https://n8n.arosmarket.com/webhook/aros-deadline-set';
var DEADLINE_OK   = 'https://n8n.arosmarket.com/webhook/aros-deadline-ok';
var uid = new URLSearchParams(window.location.search).get('uid') || '';
var CEO_IDS = ['1255605633']; // Deadline qo'ya oladigan CEO lar
var isCeo   = CEO_IDS.includes(String(uid));
var OY = ['Yanvar','Fevral','Mart','Aprel','May','Iyun','Iyul','Avgust','Sentabr','Oktabr','Noyabr','Dekabr'];
var now = new Date(new Date().getTime() + 5*60*60*1000);
var curOy = now.getMonth() + 1;
var curYil = now.getFullYear();
var bugunStr = now.toISOString().split('T')[0];
var ertagaStr = new Date(now.getTime()+86400000).toISOString().split('T')[0];

// ===================== HELPERS =====================
function fmt(n){
  var v=Math.round(Number(n)||0);
  if(v>=1e9) return (v/1e9).toFixed(2)+' mlrd';
  if(v>=1e6) return (v/1e6).toFixed(1)+' mln';
  if(v>=1e3) return (v/1e3).toFixed(0)+' ming';
  return v.toLocaleString();
}
function fmtFull(n){return Math.round(Number(n)||0).toLocaleString('uz-UZ');}
function ini(n){if(!n)return '?';return n.split(' ').map(function(w){return w[0]||'';}).join('').substring(0,2).toUpperCase();}
function fColor(f){return f>=80?'var(--green)':f>=50?'var(--amber)':'var(--red)';}
function bColor(f){return f>=80?'var(--green)':f>=50?'var(--amber)':'var(--red)';}
function parseSafe(txt){
  try{var t=txt.trim();if(t[0]==='"')t=JSON.parse(t);var r=JSON.parse(t);return Array.isArray(r)?r[0]:r;}catch(e){return null;}
}

// ===================== MANAGER + CACHE =====================
var MANAGER_WAREHOUSES = {
  all:      null,
  giyosbek: [61,23,15,5,1,37,17,29],
  sherdil:  [71,13,33,25,35,21,27]
};
var curMgr = 'all';
var cachedAllData = null;
var cachedOy = null;
var cachedYil = null;

function changeMgr(mgr, el){
  curMgr = mgr;
  document.querySelectorAll('.mgr-tab').forEach(function(t){
    t.style.color = 'var(--text3)';
    t.style.borderBottomColor = 'transparent';
  });
  el.style.color = 'var(--green)';
  el.style.borderBottomColor = 'var(--green)';
  if(cachedAllData && cachedOy === curOy && cachedYil === curYil){
    renderFromCache();
  } else {
    load();
  }
}

function filterFiliallar(filiallar){
  var wids = MANAGER_WAREHOUSES[curMgr];
  if(!wids) return filiallar;
  return filiallar.filter(function(f){
    return wids.indexOf(parseInt(f.warehouse_id)) !== -1;
  });
}

function renderFromCache(){
  var filiallar = filterFiliallar(cachedAllData);
  var oyNomi = OY[curOy-1]+' '+curYil;
  document.getElementById('hdr-sub').textContent = 'CEO · ' + oyNomi;
  var jPlan=0;
  for(var i=0;i<filiallar.length;i++) jPlan+=(filiallar[i].plan||0);
  var html='';
  html+='<div class="jami-card" id="jami-block">';
  html+='<div class="jami-label">Kompaniya jami · '+oyNomi+'</div>';
  html+='<div class="jami-row"><div class="jami-summa">0</div><div class="jami-foiz">0%</div></div>';
  html+='<div class="jami-bar-bg"><div class="jami-bar" style="width:0%"></div></div>';
  html+='<div class="jami-nums"><span>Bajarildi: <b id="jami-baj">0</b></span><span>Plan: <b id="jami-plan">'+fmt(jPlan)+'</b></span></div>';
  html+='<div class="jami-qarz">';
  html+='<div class="jq-box"><div class="jq-lbl">Muddati o\'tgan qarz</div><div class="jq-val" style="color:var(--red)" id="jami-qarz">0</div></div>';
  html+='<div class="jq-box"><div class="jq-lbl">Tugall. buyurtma</div><div class="jq-val" style="color:var(--amber)" id="jami-tug-buyurtma">0</div></div>';
  html+='<div class="jq-box"><div class="jq-lbl">Savdo oyna</div><div class="jq-val" style="color:var(--amber)" id="jami-tug-savdo">0</div></div>';
  html+='</div></div>';
  html+='<div class="sec-hdr"><div class="sec-title">Filiallar</div><span class="sec-badge">'+filiallar.length+' ta</span></div>';
  var allData=new Array(filiallar.length);
  for(var i=0;i<filiallar.length;i++){
    allData[i]=filiallar[i];
    html+='<div class="filial-card" id="fc-'+i+'"><div class="fc-loading"><div class="mini-spin"></div></div></div>';
  }
  document.getElementById('main').innerHTML=html;
  for(var i=0;i<filiallar.length;i++) renderCard(allData[i],i);
  updateJami(allData);
}

// ===================== OY SELECT =====================
// ===================== COUNTDOWN TIMER =====================
setInterval(function(){
  var bars = document.querySelectorAll('[id^="dl-cnt-"]');
  bars.forEach(function(el){
    var userId = el.id.replace('dl-cnt-','');
    var bar = document.getElementById('dl-bar-'+userId);
    if(!bar) return;
    var dlTime = new Date(bar.getAttribute('data-dl')).getTime();
    var now = new Date().getTime();
    var diff = dlTime - now;
    var expired = diff < 0;
    var abs = Math.abs(diff);
    var days = Math.floor(abs/86400000);
    var h = Math.floor((abs%86400000)/3600000);
    var m = Math.floor((abs%3600000)/60000);
    var s = Math.floor((abs%60000)/1000);
    el.textContent = (expired?'⚠️ -':'')+(days>0?days+'k ':'')+h+'s '+m+'d '+s+'s';
    bar.style.background = expired ? '#aa0022' : '#ff4d6d';
  });
}, 1000);

function buildOyOptions(){
  var sel=document.getElementById('oy-select');
  sel.innerHTML='';
  for(var y=2026;y<=curYil;y++){
    var endM=y===curYil?curOy:12;
    for(var m=1;m<=endM;m++){
      var opt=document.createElement('option');
      opt.value=y+'-'+m;
      opt.textContent=OY[m-1]+' '+y;
      if(y===curYil&&m===curOy) opt.selected=true;
      sel.appendChild(opt);
    }
  }
}

// ===================== JAMI UPDATE =====================
function updateJami(filialData){
  var el=document.getElementById('jami-block');if(!el)return;
  var jPlan=0,jBaj=0,jQarz=0,jTugB=0,jTugS=0;
  for(var i=0;i<filialData.length;i++){
    var f=filialData[i];if(!f)continue;
    jPlan+=(f.plan||0);jBaj+=(f.bajarildi||0);jQarz+=(f.muddati_utgan||0);
    jTugB+=(f.tugallanmagan_buyurtma||0);jTugS+=(f.tugallanmagan_savdo||0);
  }
  var jFoiz=jPlan>0?Math.round(jBaj/jPlan*100):0;
  el.querySelector('.jami-summa').textContent=fmt(jBaj);
  el.querySelector('.jami-foiz').textContent=jFoiz+'%';
  el.querySelector('.jami-bar').style.width=Math.min(100,jFoiz)+'%';
  el.querySelector('.jami-bar').style.background=bColor(jFoiz);
  el.querySelector('#jami-baj').textContent=fmt(jBaj);
  el.querySelector('#jami-plan').textContent=fmt(jPlan);
  el.querySelector('#jami-qarz').textContent=fmt(jQarz);
  var a=el.querySelector('#jami-tug-buyurtma');var b=el.querySelector('#jami-tug-savdo');
  if(a)a.textContent=fmt(jTugB);if(b)b.textContent=fmt(jTugS);
}

function fetchFilial(wid,filialNomi,plan,oy,idx,allData){
  fetch(FILIAL_API+'?wid='+wid).then(function(r){return r.text();}).then(function(txt){
    var fd=parseSafe(txt);
    if(fd&&fd.plan!==undefined){
      fd.filial=fd.filial||filialNomi;
      fd.warehouse_id=String(wid); // warehouse_id ni to'g'ri saqlash
      fd.muddati_utgan=fd.summary?fd.summary.muddati_utgan:0;
      allData[idx]=fd;
    } else {
      allData[idx]={filial:filialNomi,warehouse_id:String(wid),oy:oy,plan:plan,orders_summa:0,returns_summa:0,
        bajarildi:0,foiz:0,qoldi:plan,prognoz:0,prognoz_foiz:0,bugun:now.getDate(),
        oy_kunlari:new Date(curYil,curOy,0).getDate(),muddati_utgan:0,
        tugallanmagan_savdo:0,tugallanmagan_savdo_son:0};
    }
    renderCard(allData[idx],idx);
    updateJami(allData);
    if(curMgr==='all'){
      var loaded=allData.filter(function(x){return x&&x.foiz!==undefined;});
      if(loaded.length===allData.length){
        cachedAllData=allData.slice();
        cachedOy=curOy;
        cachedYil=curYil;
      }
    }
  }).catch(function(){
    allData[idx]={filial:filialNomi,warehouse_id:String(wid),plan:plan,bajarildi:0,foiz:0,qoldi:plan,
      orders_summa:0,returns_summa:0,prognoz_foiz:0,bugun:1,oy_kunlari:30,muddati_utgan:0,
      tugallanmagan_savdo:0,tugallanmagan_savdo_son:0};
    renderCard(allData[idx],idx);
  });
}

function loadDetDeadlines(cb){
  if(!detFilial) { if(cb) cb(); return; }
  fetch(DEADLINE_API+'?warehouse_id='+detFilial.warehouse_id)
    .then(function(r){return r.json();})
    .then(function(data){
      var d = Array.isArray(data)?data[0]:data;
      var list = d.deadlines || [];
      detDeadlines = {};
      list.forEach(function(dl){ detDeadlines[String(dl.user_id)] = dl; });
      if(cb) cb();
    })
    .catch(function(){ if(cb) cb(); });
}

function saveDlModal(){
  var userId = document.getElementById('dl-user-id').value;

  var dlAll = document.getElementById('dl-all').checked;

  if(!dlDate||!dlTime){ alert("Sana va vaqtni kiriting"); return; }
  var deadlineStr = dlDate+'T'+dlTime+':00';
  var now = new Date(new Date().getTime()+5*60*60*1000).toISOString();
  var debtor = detUsers.find(function(u){return String(u.user_id)===String(userId);});
  var ism = debtor ? debtor.ism : '';

    mijoz: ism,
    user_id: String(userId),
    filial: detFilial.filial,

    quyilgan_deadline: deadlineStr,
    qoygan_vaqt: now,
    status: 'active',
    ceo_id: String(uid)

  // URL params sifatida yuborish - CORS preflight yo'q
  var params = new URLSearchParams(body).toString();
  fetch(DEADLINE_SET+'?'+params, { method:'GET' })
    .then(function(r){ return r.text(); })
    .then(function(){ 
      closeDlModal();

}

function loadDetTab(tab){
  if(!detUsers.length){
    document.getElementById('det-'+tab).innerHTML='<div class="empty"><div class="et">Qarz yo\'q</div></div>';
    return;
  }
  var resMap={},done=0,total=detUsers.length;
  function check(){
    done++;
    if(done<total) return;
    var final=Object.values(resMap);
    if(tab==='otgan'){
      detOtgan=final;
      renderDetList('det-otgan',final,'var(--red)','b-red','Muddati o\'tgan qarz yo\'q!',true);
      var otS=final.reduce(function(s,r){return s+Number(r.summa||0);},0);
      var el=document.getElementById('det-ots');
      var elS=document.getElementById('det-ots-son');
      if(el) el.textContent=fmt(otS);
      if(elS) elS.textContent=final.length+' ta';
    } else if(tab==='bugun'){
      detBugun=final;
      renderDetList('det-bugun',final,'var(--red)','b-red','Bugun to\'lanadigan qarz yo\'q',false);
    } else {
      detErtaga=final;
      renderDetList('det-ertaga',final,'var(--amber)','b-amber','Ertaga to\'lanadigan qarz yo\'q',false);
    }
  }
  detUsers.forEach(function(debtor){
    if(detOrders[debtor.user_id]!==undefined){
      procDet(debtor,detOrders[debtor.user_id],tab,resMap);check();return;
    }
    fetch(ORDERS_API+'?user_id='+debtor.user_id)
      .then(function(r){return r.json();})
      .then(function(data){
        var d=Array.isArray(data)?data[0]:data;
        detOrders[debtor.user_id]=d.orders||[];
        procDet(debtor,detOrders[debtor.user_id],tab,resMap);check();
      })
      .catch(function(){check();});
  });
}

function procDet(debtor,orders,tab,resMap){
  var filtered;
  if(tab==='otgan') filtered=orders.filter(function(o){return o.deadline&&o.deadline<bugunStr;});
  else if(tab==='bugun') filtered=orders.filter(function(o){return o.deadline===bugunStr;});
  else filtered=orders.filter(function(o){return o.deadline===ertagaStr;});
  if(!filtered.length) return;
  var tot=filtered.reduce(function(s,o){return s+Number(o.summa||0);},0);
  var wallet=Number(debtor.wallet_balance)||0;
  var net=Math.max(0,tot-wallet);
  if(net===0) return;
  resMap[debtor.user_id]={ism:debtor.ism,telefon:debtor.telefon,summa:net,otgan_summa:debtor.otgan_summa||0,wallet_balance:wallet,user_id:debtor.user_id,orders:filtered,usertype:debtor.usertype||''};
}

function renderDetList(pageId,list,color,badgeClass,emptyText,lazy){
  var el=document.getElementById(pageId);
  if(!list||!list.length){el.innerHTML='<div class="empty"><div class="et">'+emptyText+'</div></div>';return;}
  var total=list.reduce(function(s,r){return s+Number(r.summa||0);},0);
  var html='<div class="total-bar"><div class="tb-lbl">Jami</div><div class="tb-val" style="color:'+color+'">'+fmtFull(total)+' so\'m</div></div>';
  html+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">';
  html+='<div style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase">Mijozlar</div>';
  html+='<span class="badge '+badgeClass+'">'+list.length+' ta</span></div>';
  // Deadline bor mijozlar birinchi
  list = list.slice().sort(function(a,b){
    var da = detDeadlines[String(a.user_id)] ? 1 : 0;
    var db = detDeadlines[String(b.user_id)] ? 1 : 0;
    return db - da;
  });
  list.forEach(function(r,i){
    var tel=(r.telefon||'').replace(/\D/g,'');
    var id=pageId+'-'+i;
    var clickFn=lazy?('toggleDetOrd(\''+id+'\','+r.user_id+','+(r.wallet_balance||0)+')'):('toggleDetInline(\''+id+'\')');
    var dl = detDeadlines[String(r.user_id)];
    var hasDl = dl && dl.quyilgan_deadline;
    html+='<div class="client-card" style="'+(hasDl?'border-color:#ff4d6d;border-width:2px':'')+ '">';
    // Deadline countdown banner
    if(hasDl){
      var dlMs = new Date(dl.quyilgan_deadline).getTime()-new Date().getTime();
      var dlExpired = dlMs < 0;
      var absDl = Math.abs(dlMs);
      var dlDays = Math.floor(absDl/86400000);
      var dlH = Math.floor((absDl%86400000)/3600000);
      var dlM = Math.floor((absDl%3600000)/60000);
      var dlS = Math.floor((absDl%60000)/1000);
      var dlStr = (dlExpired?'⚠️ -':'')+(dlDays>0?dlDays+'k ':'')+dlH+'s '+dlM+'d '+dlS+'s';
      html+='<div style="background:#ff4d6d;padding:5px 14px;display:flex;justify-content:space-between;align-items:center" id="dl-bar-'+r.user_id+'" data-dl="'+dl.quyilgan_deadline+'">';
      html+='<div style="font-size:10px;color:#fff;font-weight:700">⏰ DEADLINE: <span id="dl-cnt-'+r.user_id+'">'+dlStr+'</span></div>';
      if(isCeo) html+='<button onclick="okDeadline('+r.user_id+')" style="background:#fff;color:#ff4d6d;border:none;border-radius:6px;padding:3px 10px;font-size:11px;font-weight:800;cursor:pointer">OK ✓</button>';
      html+='</div>';
    }
    html+='<div class="client-main" onclick="'+clickFn+'">';
    html+='<div class="c-av">'+ini(r.ism)+'</div>';
    var utag=r.usertype==='master'?'<span style="font-size:9px;font-weight:800;padding:1px 6px;border-radius:4px;background:rgba(77,159,255,.15);color:#4d9fff;margin-left:4px">Master</span>':r.usertype==='business_partner'?'<span style="font-size:9px;font-weight:800;padding:1px 6px;border-radius:4px;background:rgba(255,184,0,.15);color:#ffb800;margin-left:4px">BP</span>':'';
    html+='<div class="c-info"><div class="c-name">'+(r.ism||"Noma'lum")+utag+'</div><div class="c-phone">'+(tel?'+'+tel:'—')+'</div></div>';
    html+='<div class="c-right"><div class="c-amt" style="color:'+color+'">'+fmtFull(r.summa)+'</div>';
    if(hasDl) html+='<div style="font-size:10px;color:#ff4d6d;margin-top:2px">'+fmtFull(dl.deadline_summa)+' so\'m</div>';
    html+='</div>';
    if(tel) html+='<a class="call-btn" href="tel:+'+tel+'" onclick="event.stopPropagation()"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="2" stroke-linecap="round"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.95 10.5a19.79 19.79 0 01-3.07-8.67A2 2 0 012.85 0h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L7.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 14.92z"/></svg></a>';
    if(isCeo&&lazy) html+='<button onclick="event.stopPropagation();setDeadline('+r.user_id+',\''+r.ism+'\',' +(r.otgan_summa||r.summa)+')" style="margin-left:6px;background:rgba(255,184,0,.15);border:1px solid rgba(255,184,0,.4);border-radius:8px;padding:5px 10px;font-size:10px;font-weight:800;color:#ffb800;cursor:pointer;flex-shrink:0">⏰</button>';
    html+='<span class="arr" id="ar-'+id+'">▾</span>';
    html+='</div>';
    html+='<div class="orders-list" id="ol-'+id+'">';
    if(!lazy&&r.orders&&r.orders.length){
      r.orders.forEach(function(o){
        html+='<div class="order-row"><div><div style="font-size:11px;color:var(--text3)">Order #'+o.order_id+' · '+(o.sana||'')+'</div>';
        html+='<div style="font-size:11px;font-weight:600;color:'+color+'">Deadline: '+(o.deadline||'—')+'</div></div>';
        html+='<div style="font-size:13px;font-weight:800;color:'+color+'">'+fmtFull(o.summa)+'</div></div>';
      });
    }
    html+='</div></div>';
  });
  el.innerHTML=html;
}

function toggleDetOrd(id,userId,walletBalance){
  var el=document.getElementById('ol-'+id),ar=document.getElementById('ar-'+id);
  if(!el) return;
  var open=el.classList.contains('exp');
  if(open){el.classList.remove('exp');if(ar){ar.textContent='▾';ar.classList.remove('open');}return;}
  if(ar){ar.textContent='▴';ar.classList.add('open');}
  if(detOrders[userId]!==undefined){
    fillDetOrd(el,detOrders[userId].filter(function(o){return o.deadline<bugunStr;}),walletBalance);
    el.classList.add('exp');return;
  }
  el.innerHTML='<div style="padding:12px 14px;font-size:12px;color:var(--text3)">Yuklanmoqda...</div>';
  el.classList.add('exp');
  fetch(ORDERS_API+'?user_id='+userId)
    .then(function(r){return r.json();})
    .then(function(data){
      var d=Array.isArray(data)?data[0]:data;
      detOrders[userId]=d.orders||[];
      fillDetOrd(el,detOrders[userId].filter(function(o){return o.deadline<bugunStr;}),walletBalance);
    })
    .catch(function(){el.innerHTML='<div style="padding:12px;color:var(--red)">Xato</div>';});
}

function toggleDetInline(id){
  var el=document.getElementById('ol-'+id),ar=document.getElementById('ar-'+id);
  if(!el) return;
  var open=el.classList.contains('exp');
  if(open){el.classList.remove('exp');if(ar){ar.textContent='▾';ar.classList.remove('open');}}
  else{el.classList.add('exp');if(ar){ar.textContent='▴';ar.classList.add('open');}}
}

function fillDetOrd(el,orders,walletBalance){
  if(!orders||!orders.length){el.innerHTML='<div style="padding:12px 14px;font-size:12px;color:var(--text3)">Order topilmadi</div>';return;}
  var html='';
  if(walletBalance&&walletBalance>0){
    html+='<div class="order-row" style="background:rgba(0,229,160,.07)">';
    html+='<div><div style="font-size:11px;color:var(--green);font-weight:700">Hamyon balansi</div>';
    html+='<div style="font-size:11px;color:var(--green)">Qarzdan ayiriladi</div></div>';
    html+='<div style="font-size:13px;font-weight:800;color:var(--green)">'+fmtFull(walletBalance)+' so\'m</div></div>';
  }
  orders.forEach(function(o){
    html+='<div class="order-row">';
    html+='<div><div style="font-size:11px;color:var(--text3)">Order #'+o.order_id+' · '+(o.sana||'')+'</div>';
    html+='<div style="font-size:11px;font-weight:600;color:var(--red)">'+o.deadline+' ('+o.kun_otgan+' kun)</div></div>';
    html+='<div style="font-size:13px;font-weight:800;color:var(--red)">'+fmtFull(o.summa)+'</div></div>';
  });
  el.innerHTML=html;
}

// ===================== MAIN LOAD =====================
function load(){
  if(!uid){document.getElementById('main').innerHTML='<div class="err-box">URL da ?uid= topilmadi</div>';return;}
  document.getElementById('main').innerHTML='<div class="loading"><div class="spinner"></div>Yuklanmoqda...</div>';
  fetch(CEO_API+'?uid='+uid+'&oy='+curOy+'&yil='+curYil)
    .then(function(r){return r.text();})
    .then(function(txt){
      var d=parseSafe(txt);
      if(!d) throw new Error('Serverdan xato javob keldi');
      if(d.error) throw new Error(d.error);
      if(!d.filiallar||!d.filiallar.length) throw new Error('Filiallar topilmadi');
      var oyNomi=OY[(d.oy_raqami||curOy)-1]+' '+(d.yil||curYil);
      var filiallar=filterFiliallar(d.filiallar);
      document.getElementById('hdr-sub').textContent='CEO · '+oyNomi;
      var jPlan=0;
      for(var i=0;i<filiallar.length;i++) jPlan+=(filiallar[i].plan||0);
      var html='';
      html+='<div class="jami-card" id="jami-block">';
      html+='<div class="jami-label">Kompaniya jami · '+oyNomi+'</div>';
      html+='<div class="jami-row"><div class="jami-summa">0</div><div class="jami-foiz">0%</div></div>';
      html+='<div class="jami-bar-bg"><div class="jami-bar" style="width:0%"></div></div>';
      html+='<div class="jami-nums"><span>Bajarildi: <b id="jami-baj">0</b></span><span>Plan: <b id="jami-plan">'+fmt(jPlan)+'</b></span></div>';
      html+='<div class="jami-qarz">';
      html+='<div class="jq-box"><div class="jq-lbl">Muddati o\'tgan qarz</div><div class="jq-val" style="color:var(--red)" id="jami-qarz">0</div></div>';
      html+='<div class="jq-box"><div class="jq-lbl">Tugall. buyurtma</div><div class="jq-val" style="color:var(--amber)" id="jami-tug-buyurtma">0</div></div>';
      html+='<div class="jq-box"><div class="jq-lbl">Savdo oyna</div><div class="jq-val" style="color:var(--amber)" id="jami-tug-savdo">0</div></div>';
      html+='</div></div>';
      html+='<div class="sec-hdr"><div class="sec-title">Filiallar</div><span class="sec-badge">'+filiallar.length+' ta</span></div>';
      var allData=new Array(filiallar.length);
      for(var i=0;i<filiallar.length;i++) html+='<div class="filial-card" id="fc-'+i+'"><div class="fc-loading"><div class="mini-spin"></div></div></div>';
      document.getElementById('main').innerHTML=html;
      for(var i=0;i<filiallar.length;i++) fetchFilial(filiallar[i].warehouse_id,filiallar[i].filial,filiallar[i].plan,filiallar[i].oy,i,allData);
    })
    .catch(function(e){document.getElementById('main').innerHTML='<div class="err-box">⚠️ '+e.message+'</div>';});
}

// ===================== THEME =====================
var isDark=true;
function toggleTheme(){
  isDark=!isDark;
  document.documentElement.setAttribute('data-theme',isDark?'dark':'light');
  document.getElementById('themeBtn').textContent=isDark?'🌙':'☀️';
  try{localStorage.setItem('ceo-theme',isDark?'dark':'light');}catch(e){}
}
(function(){
  try{var t=localStorage.getItem('ceo-theme');if(t==='light'){isDark=false;document.documentElement.setAttribute('data-theme','light');document.getElementById('themeBtn').textContent='☀️';}}catch(e){}
})();

buildOyOptions();
load();
</script>
