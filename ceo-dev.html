<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AROS">
<meta name="theme-color" content="#7BC93F">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="apple-touch-startup-image" href="icons/splash-iphone-pro-max.png" media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3)">
<link rel="apple-touch-startup-image" href="icons/splash-iphone.png" media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)">
<link rel="apple-touch-startup-image" href="icons/splash-iphone.png" media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3)">
<link rel="apple-touch-startup-image" href="icons/splash-ipad.png" media="(device-width: 810px) and (device-height: 1080px)">
<link rel="apple-touch-startup-image" href="icons/splash-iphone.png">
<title>AROS CEO</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;600;700;800&display=swap');
:root{
--bg:#060610;--bg2:#0e0e20;--bg3:#161628;--border:#1e1e38;
--text:#f0f0ff;--text2:#8888aa;--text3:#444466;
--green:#00e5a0;--green-bg:rgba(0,229,160,.1);--green-border:rgba(0,229,160,.25);
--red:#ff4d6d;--amber:#ffb800;
}
[data-theme="light"]{
--bg:#f0f0f8;--bg2:#ffffff;--bg3:#e8e8f2;--border:#d8d8ee;
--text:#0a0a1a;--text2:#555570;--text3:#9999bb;
--green:#00a870;--green-bg:rgba(0,168,112,.1);--green-border:rgba(0,168,112,.3);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Manrope',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.hdr{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.hdr-logo{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--green);letter-spacing:2px;flex-shrink:0}
.dev-badge{font-size:9px;font-weight:800;padding:2px 7px;border-radius:6px;background:rgba(255,184,0,.15);color:#ffb800;border:1px solid rgba(255,184,0,.3);flex-shrink:0}
.hdr-info{flex:1}
.hdr-title{font-size:13px;font-weight:800}
.hdr-sub{font-size:10px;color:var(--text2);margin-top:1px}
.theme-btn{width:30px;height:30px;border-radius:50%;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px}
.bug-btn{
  width:32px;height:32px;border-radius:50%;
  background:linear-gradient(135deg,#8b5cf6,#6366f1);
  border:none;display:none;align-items:center;justify-content:center;
  cursor:pointer;font-size:14px;color:#fff;
  box-shadow:0 2px 8px rgba(139,92,246,0.4);
  transition:transform .15s ease, box-shadow .15s ease;
  flex-shrink:0;
}
.bug-btn:active{transform:scale(0.92);box-shadow:0 1px 4px rgba(139,92,246,0.3)}
.filter-bar{padding:12px 16px 0;display:flex;gap:8px}
.filter-bar select{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:9px 12px;color:var(--text);font-size:13px;outline:none;appearance:none;-webkit-appearance:none;font-family:'Manrope',sans-serif;font-weight:600}
.refresh-btn{width:38px;height:38px;border-radius:10px;background:var(--green-bg);border:1px solid var(--green-border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;flex-shrink:0}
.page{padding:14px}
.jami-card{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:18px;margin-bottom:14px}
.jami-label{font-size:10px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.jami-row{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:12px}
.jami-summa{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--green);letter-spacing:1px;line-height:1}
.jami-foiz{font-size:22px;font-weight:900;color:var(--text);opacity:.7}
.jami-bar-bg{background:var(--bg3);border-radius:6px;height:6px;margin-bottom:8px;overflow:hidden}
.jami-bar{height:100%;border-radius:6px;background:var(--green);transition:width 1.2s ease}
.jami-nums{display:flex;justify-content:space-between;font-size:10px;color:var(--text3);margin-bottom:10px}
.jami-nums b{color:var(--text);font-weight:700}
.jami-qarz{display:flex;gap:8px;margin-top:10px}
.jq-box{flex:1;background:var(--bg3);border-radius:10px;padding:8px 10px}
.jq-lbl{font-size:9px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.3px;margin-bottom:3px}
.jq-val{font-size:13px;font-weight:800}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.sec-title{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.8px}
.sec-badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.filial-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:14px;margin-bottom:10px;position:relative;overflow:hidden;cursor:pointer;transition:opacity .15s}
.filial-card:active{opacity:.8}
.fc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.fc-name{font-size:14px;font-weight:800;text-transform:capitalize}
.fc-oy{font-size:10px;color:var(--text3);margin-top:2px}
.fc-foiz{font-size:22px;font-weight:900;line-height:1}
.fc-bar-bg{background:var(--bg3);border-radius:6px;height:5px;margin-bottom:8px;overflow:hidden}
.fc-bar{height:100%;border-radius:6px;transition:width 1s ease}
.fc-nums{display:flex;justify-content:space-between;font-size:10px;color:var(--text3);margin-bottom:8px}
.fc-nums b{color:var(--text);font-weight:700}
.fc-mini{display:flex;gap:6px;margin-bottom:6px}
.fc-m{flex:1;background:var(--bg3);border-radius:8px;padding:6px 8px}
.fc-m-lbl{font-size:9px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.3px;margin-bottom:2px}
.fc-m-val{font-size:11px;font-weight:800}
.fc-qarz{background:rgba(255,77,109,.08);border:1px solid rgba(255,77,109,.2);border-radius:8px;padding:6px 10px;display:flex;justify-content:space-between;align-items:center;font-size:11px}
.fc-qarz-lbl{color:var(--text3);font-weight:600}
.fc-qarz-val{font-weight:800;color:var(--red)}
.fc-prognoz{margin-top:6px;padding:6px 10px;background:var(--bg3);border-radius:8px;font-size:10px;color:var(--text2);display:flex;justify-content:space-between}
.fc-loading{position:absolute;inset:0;background:var(--bg2);display:flex;align-items:center;justify-content:center;border-radius:16px}
.mini-spin{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite}
.det-panel{position:fixed;inset:0;background:var(--bg);z-index:200;display:none;flex-direction:column}
.det-panel.open{display:flex}
.det-hdr{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.det-back{width:34px;height:34px;border-radius:50%;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;flex-shrink:0}
.det-tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0}
.det-tab{flex:1;padding:10px 4px;text-align:center;font-size:10px;font-weight:700;color:var(--text3);border-bottom:2px solid transparent;cursor:pointer;transition:all .2s}
.det-tab.active{color:var(--green);border-bottom-color:var(--green)}
.det-body{flex:1;overflow-y:auto}
.det-page{display:none;padding:14px}
.det-page.active{display:block}
.progress-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:12px}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:13px}
.sc-lbl{font-size:10px;color:var(--text3);font-weight:600;margin-bottom:5px;text-transform:uppercase;letter-spacing:.3px}
.sc-val{font-size:17px;font-weight:800}
.sc-sub{font-size:10px;color:var(--text3);margin-top:3px}
.total-bar{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.tb-lbl{font-size:11px;color:var(--text2);font-weight:600}
.tb-val{font-size:15px;font-weight:800}
.badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px}
.b-red{background:rgba(255,77,109,.15);color:var(--red);border:1px solid rgba(255,77,109,.25)}
.b-amber{background:rgba(255,184,0,.15);color:var(--amber);border:1px solid rgba(255,184,0,.25)}
.client-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;margin-bottom:8px;overflow:hidden}
.client-main{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer}
.c-av{width:38px;height:38px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:var(--text2);flex-shrink:0;border:1px solid var(--border)}
.c-info{flex:1;min-width:0}
.c-name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.c-phone{font-size:11px;color:var(--text3);margin-top:2px}
.c-right{text-align:right;flex-shrink:0}
.c-amt{font-size:13px;font-weight:800}
.call-btn{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1px solid rgba(0,229,160,.35);background:rgba(0,229,160,.1);text-decoration:none}
.arr{color:var(--text3);font-size:11px;flex-shrink:0;margin-left:4px;transition:transform .2s}
.arr.open{transform:rotate(180deg)}
.orders-list{border-top:1px solid var(--border);background:var(--bg3);max-height:0;overflow:hidden;transition:max-height .5s ease}
.orders-list.exp{max-height:2000px}
.order-row{display:flex;justify-content:space-between;align-items:center;padding:10px 14px 10px 62px;border-bottom:1px solid var(--border)}
.order-row:last-child{border-bottom:none}
.loading{text-align:center;padding:60px 16px;color:var(--text3);font-size:13px}
.spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes brdAmber{0%,100%{border-color:rgba(255,159,10,0.3)}50%{border-color:rgba(255,159,10,0.85)}}
@keyframes brdBlue{0%,100%{border-color:rgba(55,138,221,0.3)}50%{border-color:rgba(55,138,221,0.85)}}
.tr-onway{animation:brdAmber 2s ease-in-out infinite}
.tr-created{animation:brdBlue 2s ease-in-out infinite}
.empty{text-align:center;padding:60px 16px}
.et{font-size:13px;color:var(--text3)}
.err-box{background:rgba(255,77,109,.1);border:1px solid rgba(255,77,109,.3);border-radius:12px;padding:14px;font-size:13px;color:var(--red);text-align:center}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-logo">AROS</div>
  
  <div class="hdr-info">
    <div class="hdr-title" id="hdr-title">CEO Dashboard</div>
    <div class="hdr-sub" id="hdr-sub">Yuklanmoqda...</div>
  </div>
  <div id="bugBtn" class="bug-btn" onclick="goBugalter()" title="Buxgalter sahifasi">💼</div>
  <div class="theme-btn" onclick="toggleTheme()" id="themeBtn">🌙</div>
  <div class="theme-btn" onclick="doLogout()" id="logoutBtn" style="background:rgba(255,81,81,.12);border-color:rgba(255,81,81,.3);color:var(--red)" title="Chiqish">⏻</div>
</div>

<div style="display:flex;background:var(--bg2);border-bottom:1px solid var(--border)">
  <div class="mgr-tab active" onclick="changeMgr('all',this)" style="flex:1;padding:10px 4px;text-align:center;font-size:10px;font-weight:700;color:var(--text3);border-bottom:2px solid transparent;cursor:pointer;transition:all .2s">Hammasi</div>
  <div class="mgr-tab" onclick="changeMgr('giyosbek',this)" style="flex:1;padding:10px 4px;text-align:center;font-size:10px;font-weight:700;color:var(--text3);border-bottom:2px solid transparent;cursor:pointer;transition:all .2s">Giyosbek</div>
  <div class="mgr-tab" onclick="changeMgr('sherdil',this)" style="flex:1;padding:10px 4px;text-align:center;font-size:10px;font-weight:700;color:var(--text3);border-bottom:2px solid transparent;cursor:pointer;transition:all .2s">Sherdil</div>
</div>

<div class="filter-bar" style="gap:8px">
  <select id="oy-select" onchange="changeOy(this.value)"></select>
  <select id="profil-select" onchange="changeProfil(this.value)" style="background:var(--bg2);color:var(--text);border:1px solid var(--border);border-radius:10px;padding:6px 10px;font-size:13px;font-family:inherit;cursor:pointer">

</div>

<div class="page" id="main">
  <div class="loading"><div class="spinner"></div>Yuklanmoqda...</div>
</div>

<!-- DEADLINE MODAL -->
<div id="dl-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:400;align-items:center;justify-content:center;padding:20px">

    </div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;padding:10px;background:var(--bg3);border-radius:10px">

    </div>
    <div style="margin-bottom:16px">
      <label style="font-size:11px;color:var(--text3);font-weight:700;text-transform:uppercase;display:block;margin-bottom:6px">Vaqt</label>

    </div>

</div>

<!-- OCHIQ BUYURTMALAR MODAL -->
<div id="det-ochiq-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;align-items:flex-end;justify-content:center">

<div class="det-panel" id="det-panel">

<script>
var CEO_API      = 'https://n8n.arosmarket.com/webhook/aros-cache-ceo';
var CALENDAR_API = 'https://n8n.arosmarket.com/webhook/aros-cache-calendar';
var FILIAL_API   = 'https://n8n.arosmarket.com/webhook/aros-cache-filial';
var STATS_API    = 'https://n8n.arosmarket.com/webhook/aros-cache-stats';
var ORDERS_API   = 'https://n8n.arosmarket.com/webhook/aros-orders';
var DEADLINE_API = 'https://n8n.arosmarket.com/webhook/aros-deadlines-get';
var DEADLINE_SET  = 'https://n8n.arosmarket.com/webhook/aros-deadline-set';
var DEADLINE_OK   = 'https://n8n.arosmarket.com/webhook/aros-deadline-ok';
var uid = new URLSearchParams(window.location.search).get('uid') || '';

// =====================================================
// AUTH CHECK
// =====================================================
(function authCheck(){
  if(uid) return; // Telegram Mini App
  var token = localStorage.getItem('aros-token');
  if(!token){ window.location.href = 'login.html'; return; }
  try {
    var userJson = localStorage.getItem('aros-user');
    if(userJson){
      var u = JSON.parse(userJson);
      if(u && u.telegram_id){
        uid = u.telegram_id;
        try{
          var newUrl = window.location.pathname + '?uid=' + encodeURIComponent(uid);
          window.history.replaceState({}, '', newUrl);
        }catch(e){}
      }
    }
  } catch(e){}
  fetch('https://n8n.arosmarket.com/webhook/aros-verify-token', {
    method:'POST',
    body: JSON.stringify({token: token})
  }).then(function(r){return r.json();}).then(function(d){
    var data = Array.isArray(d) ? d[0] : d;
    if(!data || !data.ok){
      localStorage.removeItem('aros-token');
      localStorage.removeItem('aros-user');
      window.location.href = 'login.html';
    }
  }).catch(function(){});
})();

function doLogout(){
  if(!confirm('Chiqmoqchimisiz?')) return;
  var token = localStorage.getItem('aros-token');
  if(token){
    fetch('https://n8n.arosmarket.com/webhook/aros-logout', {
      method:'POST',
      body: JSON.stringify({token: token})
    }).catch(function(){});
  }
  localStorage.removeItem('aros-token');
  localStorage.removeItem('aros-user');
  window.location.href = 'login.html';
}

var CEO_IDS = ['1255605633', '8236030365', '1432724', '1373701411', '331245247'];
var isCeo   = CEO_IDS.includes(String(uid));

var BUGALTER_IDS = ['1255605633','1432724','1373701411'];
var canSeeBugalter = BUGALTER_IDS.includes(String(uid));

function goBugalter(){

function fmt(n){
  return Math.round(Number(n)||0).toLocaleString('uz-UZ');
}
function fmtFull(n){return Math.round(Number(n)||0).toLocaleString('uz-UZ');}
function fmtShort(n){
  var v = Number(n)||0;
  if(v===0) return '0';
  var abs = Math.abs(v);
  if(abs>=1000000){
    var m = v/1000000;
    return (m>=10 ? Math.round(m) : Math.round(m*10)/10) + 'M';
  }
  if(abs>=1000){
    var k = v/1000;
    return (k>=10 ? Math.round(k) : Math.round(k*10)/10) + 'K';
  }
  return String(Math.round(v));
}
function ini(n){if(!n)return '?';return n.split(' ').map(function(w){return w[0]||'';}).join('').substring(0,2).toUpperCase();}
function fColor(f){return f>=80?'var(--green)':f>=50?'var(--amber)':'var(--red)';}

function parseSafe(txt){

function filterFiliallar(filiallar){
  var wids = MANAGER_WAREHOUSES[curMgr];
  var result = filiallar;
  if(wids){
    result = result.filter(function(f){
      return wids.indexOf(parseInt(f.warehouse_id)) !== -1;
    });
  }
  if(curProfil && curProfil !== 'all'){
    result = result.filter(function(f){
      var p = f.profil || (f.is_franchise ? 'Franshiza' : 'Zapchast');
      return p === curProfil;
    });

    result = result.filter(function(f){
      return (f.filial||'').toLowerCase().indexOf(q) !== -1;

}

function fetchFilial(wid,filialNomi,plan,oy,idx,allData){
  fetch(FILIAL_API+'?wid='+wid).then(function(r){return r.text();}).then(function(txt){
    var fd=parseSafe(txt);
    if(fd&&fd.plan!==undefined){
      fd.filial=fd.filial||filialNomi;
      fd.warehouse_id=String(wid);
      fd.muddati_utgan=fd.summary?fd.summary.muddati_utgan:0;
      allData[idx]=fd;
    } else {
      allData[idx]={filial:filialNomi,warehouse_id:String(wid),oy:oy,plan:plan,orders_summa:0,returns_summa:0,
        bajarildi:0,foiz:0,qoldi:plan,prognoz:0,prognoz_foiz:0,bugun:now.getDate(),
        oy_kunlari:new Date(curYil,curOy,0).getDate(),muddati_utgan:0,
        tugallanmagan_savdo:0,tugallanmagan_savdo_son:0};
    }
    renderCard(allData[idx],idx);
    updateJami(allData);
    if(curMgr==='all'){
      var loaded=allData.filter(function(x){return x&&x.foiz!==undefined;});
      if(loaded.length===allData.length){
        cachedAllData=allData.slice();
        cachedOy=curOy;
        cachedYil=curYil;
      }
    }
  }).catch(function(){
    allData[idx]={filial:filialNomi,warehouse_id:String(wid),plan:plan,bajarildi:0,foiz:0,qoldi:plan,
      orders_summa:0,returns_summa:0,prognoz_foiz:0,bugun:1,oy_kunlari:30,muddati_utgan:0,
      tugallanmagan_savdo:0,tugallanmagan_savdo_son:0};
    renderCard(allData[idx],idx);
  });
}

function loadDetTab(tab){
  if(!detUsers.length){
    document.getElementById('det-'+tab).innerHTML='<div class="empty"><div class="et">Qarz yo\'q</div></div>';
    return;
  }
  var resMap={},done=0,total=detUsers.length;
  function check(){
    done++;
    if(done<total) return;
    var final=Object.values(resMap);
    if(tab==='otgan'){
      detOtgan=final;
      renderDetList('det-otgan',final,'var(--red)','b-red','Muddati o\'tgan qarz yo\'q!',true);
      var otS=final.reduce(function(s,r){return s+Number(r.summa||0);},0);
      var el=document.getElementById('det-ots');
      var elS=document.getElementById('det-ots-son');
      if(el) el.textContent=fmt(otS);
      if(elS) elS.textContent=final.length+' ta';
    } else if(tab==='bugun'){
      detBugun=final;
      renderDetList('det-bugun',final,'var(--red)','b-red','Bugun to\'lanadigan qarz yo\'q',false);
    } else {
      detErtaga=final;
      renderDetList('det-ertaga',final,'var(--amber)','b-amber','Ertaga to\'lanadigan qarz yo\'q',false);
    }
  }
  detUsers.forEach(function(debtor){
    if(detOrders[debtor.user_id]!==undefined){
      procDet(debtor,detOrders[debtor.user_id],tab,resMap);check();return;
    }
    fetch(ORDERS_API+'?user_id='+debtor.user_id)
      .then(function(r){return r.json();})
      .then(function(data){
        var d=Array.isArray(data)?data[0]:data;
        detOrders[debtor.user_id]=d.orders||[];
        procDet(debtor,detOrders[debtor.user_id],tab,resMap);check();
      })
      .catch(function(){check();});
  });
}

function procDet(debtor,orders,tab,resMap){
  var filtered;
  if(tab==='otgan') filtered=orders.filter(function(o){return o.deadline&&o.deadline<bugunStr;});
  else if(tab==='bugun') filtered=orders.filter(function(o){return o.deadline===bugunStr;});
  else filtered=orders.filter(function(o){return o.deadline===ertagaStr;});
  if(!filtered.length) return;
  var tot=filtered.reduce(function(s,o){return s+Number(o.summa||0);},0);
  var wallet=Number(debtor.wallet_balance)||0;
  var net=Math.max(0,tot-wallet);

function toggleDetOrd(id,userId,walletBalance){
  var el=document.getElementById('ol-'+id),ar=document.getElementById('ar-'+id);
  if(!el) return;
  var open=el.classList.contains('exp');
  if(open){el.classList.remove('exp');if(ar){ar.textContent='▾';ar.classList.remove('open');}return;}
  if(ar){ar.textContent='▴';ar.classList.add('open');}
  if(detOrders[userId]!==undefined){
    fillDetOrd(el,detOrders[userId].filter(function(o){return o.deadline<bugunStr;}),walletBalance);

  }
  el.innerHTML='<div style="padding:12px 14px;font-size:12px;color:var(--text3)">Yuklanmoqda...</div>';

function showConfirmedModal(){
  if(!detFilialCache) return;
  var orders=(detFilialCache.confirmedOrders||[]).slice();
  if(!orders.length){alert("Ochiq buyurtma yo'q");return;}
  var nowUZB = new Date(new Date().getTime() + 5*60*60*1000);
  var bugunStr = nowUZB.toISOString().split('T')[0];
  function kunHisob(dateStr) {
    if (!dateStr) return 0;
    var d = new Date(dateStr.split('T')[0]);
    var today = new Date(bugunStr);
    return Math.floor((today - d) / 86400000);
  }
  function fmtDateTime(dt) {
    if (!dt) return '';
    var s = String(dt);
    var datePart = s.split('T')[0];
    var timePart = '';
    if (s.indexOf('T') !== -1) {
      var t = s.split('T')[1];
      timePart = t.substring(0,5);
    }
    var parts = datePart.split('-');
    if (parts.length === 3) {
      return parts[2]+'.'+parts[1]+'.'+parts[0]+(timePart ? ' '+timePart : '');
    }
    return s;
  }
  orders.forEach(function(o){ o._kun = kunHisob(o.created_datetime || o.sana); });
  orders.sort(function(a,b){ return (b._kun||0) - (a._kun||0); });
  var html='<div style="padding:16px">';
  html+='<div style="font-size:14px;font-weight:800;margin-bottom:12px">Ochiq buyurtmalar ('+orders.length+' ta)</div>';
  orders.forEach(function(o){
    var url='https://admin.aros.uz/orders/'+o.order_id+'/';
    var kun = o._kun || 0;
    var kunBadge = kun>0 ? '<span style="font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px;background:rgba(255,77,109,.15);color:#ff6b8a;margin-left:6px">'+kun+' kun</span>' : '';
    var dtStr = fmtDateTime(o.created_datetime || o.sana);
    html+='<a href="'+url+'" style="display:block;text-decoration:none;color:inherit;margin-bottom:8px">';
    html+='<div style="background:var(--bg3);border-radius:10px;padding:10px 12px;display:flex;justify-content:space-between;align-items:center">';
    html+='<div style="flex:1;min-width:0">';
    html+='<div style="display:flex;align-items:center;flex-wrap:wrap"><div style="font-size:13px;font-weight:700">'+(o.ism||"Noma\'lum")+'</div>'+kunBadge+'</div>';
    html+='<div style="font-size:11px;color:var(--text3);margin-top:2px">Order #'+o.order_id+' · '+dtStr+'</div></div>';
    html+='<div style="font-size:13px;font-weight:800;color:var(--green);flex-shrink:0;margin-left:8px">'+fmtFull(o.summa)+' so\'m</div>';
    html+='</div></a>';
  });
  html+='</div>';
  document.getElementById('det-ochiq-content').innerHTML=html;
  document.getElementById('det-ochiq-modal').style.display='flex';
}

  html += '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:6px">';
  haftaKunlari.forEach(function(h){
    html += '<div style="text-align:center;font-size:10px;color:var(--text3);font-weight:600;padding:4px 0">'+h+'</div>';
  });
  html += '</div>';
  html += '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px" id="cal-grid">';
  for(var i=0;i<offset;i++){ html += '<div></div>'; }
  for(var k=1;k<=oyKunlari;k++){
    var isDayOff = !!dayOffMap[k];
    var reason = dayOffMap[k] || '';
    var dayData = dayMap[k];
    if(isDayOff){
      var icon = dayOffIcon(reason);
      var bg = 'rgba(148,163,184,.18)';
      var txtColor = 'var(--text2)';
      html += '<div onclick="showDayDetail('+k+')" id="cd-'+k+'" style="aspect-ratio:1;background:'+bg+';border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;border:1px dashed var(--border);transition:border-color .15s">';
      html += '<div style="font-size:13px;font-weight:700;color:'+txtColor+'">'+k+'</div>';
      html += '<div style="font-size:13px;margin-top:1px">'+icon+'</div>';
      html += '</div>';
    } else if(dayData){
      var bg, txtColor;
      if(dayData.status==='green'){ bg='rgba(34,197,94,.18)'; txtColor='var(--green)'; }
      else if(dayData.status==='amber'){ bg='rgba(251,191,36,.18)'; txtColor='#fbbf24'; }
      else{ bg='rgba(255,77,109,.18)'; txtColor='#ff4d6d'; }
      html += '<div onclick="showDayDetail('+k+')" id="cd-'+k+'" style="aspect-ratio:1;background:'+bg+';border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;border:1px solid transparent;transition:border-color .15s" onmouseover="this.style.borderColor=\''+txtColor+'\'" onmouseout="this.style.borderColor=\'transparent\'">';
      html += '<div style="font-size:14px;font-weight:700;color:'+txtColor+'">'+k+'</div>';
      html += '<div style="font-size:9px;color:'+txtColor+';opacity:.8;margin-top:1px">'+(dayData.foiz||0)+'%</div>';
      html += '</div>';
    } else {
      html += '<div style="aspect-ratio:1;background:var(--bg3);border-radius:10px;display:flex;align-items:center;justify-content:center;opacity:.35"><div style="font-size:13px;color:var(--text3)">'+k+'</div></div>';
    }
  }
  html += '</div>';
  html += '<div style="display:flex;justify-content:center;gap:14px;margin-top:14px;font-size:10px;color:var(--text3);flex-wrap:wrap">';
  html += '<div style="display:flex;align-items:center;gap:4px"><div style="width:10px;height:10px;border-radius:3px;background:rgba(34,197,94,.4)"></div>100%+</div>';
  html += '<div style="display:flex;align-items:center;gap:4px"><div style="width:10px;height:10px;border-radius:3px;background:rgba(251,191,36,.4)"></div>70-99%</div>';
  html += '<div style="display:flex;align-items:center;gap:4px"><div style="width:10px;height:10px;border-radius:3px;background:rgba(255,77,109,.4)"></div>&lt;70%</div>';
  html += '<div style="display:flex;align-items:center;gap:4px">🎉 Bayram</div>';
  html += '<div style="display:flex;align-items:center;gap:4px">📊 Inventory</div>';
  html += '</div>';
  html += '<div id="cal-day-detail" style="margin-top:14px"></div>';

  body.innerHTML = html;
  window._calDays = dayMap;
  window._calKunlikPlan = kunlikPlan;
  window._calDayOffs = dayOffMap;
}

function showDayDetail(kun){
  var d = (window._calDays||{})[kun];
  var kp = window._calKunlikPlan || 0;
  var dayOffMap = window._calDayOffs || {};
  var isDayOff = !!dayOffMap[kun];
  var el = document.getElementById('cal-day-detail');
  if(!el) return;
  
  if(isDayOff){
    var reason = dayOffMap[kun];
    var icon = reason === 'inventory' ? '📊' : '🎉';
    var label = reason === 'inventory' ? 'Inventory kuni' : 'Bayram kuni';
    var html = '<div style="background:var(--bg3);border-radius:14px;padding:14px;border:1px dashed var(--border)">';
    html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">';
    html += '<div style="font-size:14px;font-weight:700">'+kun+'-kun</div>';
    html += '<div style="font-size:20px">'+icon+'</div>';
    html += '</div>';
    html += '<div style="font-size:12px;color:var(--text2);text-align:center;padding:8px 0">'+label+' — ish kuni emas</div>';
    html += '</div>';
    el.innerHTML = html;
    el.scrollIntoView({behavior:'smooth',block:'nearest'});
    return;
  }
  
  if(!d) return;
  var color = d.status==='green'?'var(--green)':d.status==='amber'?'#fbbf24':'#ff4d6d';
  var html = '<div style="background:var(--bg3);border-radius:14px;padding:14px;border:1px solid '+color+'40">';
  html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">';
  html += '<div style="font-size:14px;font-weight:700">'+kun+'-kun · '+d.sana+'</div>';
  html += '<div style="font-size:15px;font-weight:800;color:'+color+'">'+(d.foiz||0)+'%</div>';
  html += '</div>';
  html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:12px">';
  html += '<div><div style="color:var(--text3);font-size:10px;margin-bottom:2px">Tushum</div><div style="font-weight:700;color:var(--green)">'+fmt(d.tushum||0)+'</div></div>';
  html += '<div><div style="color:var(--text3);font-size:10px;margin-bottom:2px">Qaytarilgan</div><div style="font-weight:700;color:var(--red)">-'+fmt(d.qaytarilgan||0)+'</div></div>';
  html += '<div><div style="color:var(--text3);font-size:10px;margin-bottom:2px">Bajarilgan</div><div style="font-weight:700;color:'+color+'">'+fmt(d.bajarilgan||0)+'</div></div>';
  html += '<div><div style="color:var(--text3);font-size:10px;margin-bottom:2px">Kunlik plan</div><div style="font-weight:700;color:var(--text2)">'+fmt(kp)+'</div></div>';
  html += '</div></div>';
  el.innerHTML = html;
  el.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function showTransfersModal(transfers, filialNomi){
  var modal=document.getElementById('tr-modal');
  var list=document.getElementById('tr-list');
  var subtitle=document.getElementById('tr-subtitle');
  var sorted=(transfers||[]).slice().sort(function(a,b){
    if(a.status!==b.status){
      if(a.status==='on_way') return -1;
      if(b.status==='on_way') return 1;
      return 0;
    }
    return (b.kun_otgan||0)-(a.kun_otgan||0);
  });
  subtitle.textContent=(filialNomi||'')+' · '+sorted.length+' ta';
  var sLabels={created:'Yaratilgan',on_way:"Yo'lda"};
  var sColors={created:'#378ADD',on_way:'#ff9f0a'};
  var html='';
  sorted.forEach(function(t){
    var color=sColors[t.status]||'var(--text2)';
    var label=sLabels[t.status]||t.status;
    var pulseClass=t.status==='on_way'?'tr-onway':'tr-created';
    var link='https://admin.aros.uz/products-actions/product-transfer/'+t.id;
    var sana=t.status==='created'?t.created_date:t.send_date;
    var sanaLabel=t.status==='created'?'Yaratilgan':'Yuborilgan';
    var kun=t.kun_otgan||0;
    var masulTel=(t.masul_telefon||'').replace(/\D/g,'');
    html+='<a href="'+link+'" style="display:block;text-decoration:none;color:inherit;margin-bottom:6px">';
    html+='<div class="'+pulseClass+'" style="background:var(--bg3);border-radius:10px;padding:8px 10px;border:1px solid '+color+'4D">';
    html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">';
    html+='<div style="display:flex;align-items:center;gap:5px">';
    html+='<span style="font-size:12px;font-weight:700;color:var(--text)">#'+t.id+'</span>';
    html+=(kun>0?'<span style="font-size:9px;font-weight:600;padding:1px 5px;border-radius:4px;background:rgba(255,77,109,.15);color:#ff6b8a">'+kun+' kun</span>':'');
    html+='</div>';
    html+='<span style="font-size:9px;font-weight:600;padding:1px 6px;border-radius:5px;background:'+color+'26;color:'+color+'">'+label+'</span>';
    html+='</div>';
    html+='<div style="display:flex;align-items:center;gap:4px;margin-bottom:6px;font-size:10px">';
    html+='<span style="font-weight:600;flex:1;background:var(--bg2);padding:3px 5px;border-radius:5px;text-align:center;color:var(--text2)">'+(t.from_warehouse||'—')+'</span>';
    html+='<span style="color:var(--text3);flex-shrink:0;font-size:9px">→</span>';
    html+='<span style="font-weight:600;flex:1;background:var(--bg2);padding:3px 5px;border-radius:5px;text-align:center;color:var(--text2)">'+(t.to_warehouse||'—')+'</span>';
    html+='</div>';
    html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">';
    html+='<span style="font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.3px">Summa</span>';
    html+='<div style="display:flex;align-items:center;gap:6px">';
    html+='<span style="font-size:12px;font-weight:700;color:var(--text)">'+fmtFull(t.document_price)+'</span>';
    if(masulTel) html+='<a href="tel:+'+masulTel+'" onclick="event.stopPropagation()" style="background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.3);border-radius:10px;padding:2px 7px;font-size:10px;text-decoration:none;flex-shrink:0">📞</a>';
    html+='</div>';
    html+='</div>';
    if(t.comment) html+='<div style="margin-bottom:6px;padding:5px 8px;background:var(--bg2);border-radius:6px;font-size:10px;color:var(--text3);font-style:italic">💬 '+t.comment+'</div>';
    html+='<div style="padding-top:6px;border-top:0.5px solid var(--border);display:flex;justify-content:space-between;align-items:center">';
    html+='<span style="font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.3px">'+sanaLabel+'</span>';
    html+='<span style="font-size:10px;font-weight:600;color:var(--text2)">'+(sana||'—')+'</span>';
    html+='</div>';
    html+='</div></a>';
  });
  list.innerHTML=html||'<div style="text-align:center;color:var(--text3);padding:20px">Transfer yo\'q</div>';
  modal.style.display='flex';
}

</script>

  <div style="background:var(--bg2);border-radius:22px 22px 0 0;width:100%;max-height:85vh;overflow-y:auto;border-top:1px solid var(--border)">

</div>
